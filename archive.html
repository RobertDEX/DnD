<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive · Fairy Tail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --cy:#22d3ff; --cy-hi:#a6f0ff; --cy-deep:#0a6e9c;
  --bg:#05080f; --panel:rgba(12,20,34,.72);
  --line:rgba(60,200,255,.16);
  --text:#cfe0f2; --muted:#5e7390;
  --cyan:#9d8cff;
  --F1:'Orbitron',sans-serif; --F2:'Rajdhani',sans-serif; --F3:'Share Tech Mono',monospace; --F4:'EB Garamond',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{
  font-family:var(--F2); color:var(--text); font-size:16px; line-height:1.5;
  background:
    radial-gradient(ellipse 90% 50% at 50% -10%, rgba(34,211,255,.12), transparent 70%),
    radial-gradient(circle at 80% 90%, rgba(157,140,255,.05), transparent 50%),
    #04070e;
  overflow-x:hidden; min-height:100vh;
}
/* animated circuit backdrop */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.4;
  background-image:linear-gradient(rgba(34,211,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,255,.04) 1px,transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse 100% 70% at 50% 10%,#000,transparent 85%);
  animation:gridDrift 24s linear infinite;
}
@keyframes gridDrift{from{background-position:0 0}to{background-position:40px 40px}}
.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:1.2rem 1.2rem 5rem}

/* ── TOP BAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1.4rem;padding-bottom:1.2rem;border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:1rem}
.brand-glyph{font-size:2.4rem;color:var(--cy-hi);filter:drop-shadow(0 0 14px rgba(34,211,255,.7));animation:spin 8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.brand-title{font-family:var(--F1);font-weight:900;font-size:1.7rem;letter-spacing:.28em;background:linear-gradient(180deg,#fff6dc,var(--cy) 55%,var(--cy-deep));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 16px rgba(34,211,255,.35))}
.brand-sub{font-family:var(--F3);font-size:.56rem;letter-spacing:.24em;color:rgba(34,211,255,.6);text-transform:uppercase;margin-top:.2rem}
.top-actions{display:flex;gap:.6rem;align-items:center}
.btn{font-family:var(--F3);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;padding:.6rem 1rem;border-radius:8px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;transition:all .15s;background:rgba(34,211,255,.08);border:1px solid rgba(34,211,255,.25);color:var(--cy-hi)}
.btn:hover{background:rgba(34,211,255,.18);border-color:rgba(34,211,255,.5);transform:translateY(-1px)}
.btn.ghost{background:transparent;border-color:rgba(255,255,255,.12);color:#b0a088}

/* ── CHARACTER PICKER ── */
.char-picker{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;margin-bottom:1.4rem;padding:.85rem 1rem;border-radius:12px;background:var(--panel);border:1px solid var(--line);backdrop-filter:blur(10px)}
.char-picker label{font-family:var(--F3);font-size:.6rem;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
.char-picker select{font-family:var(--F2);font-weight:600;font-size:1rem;color:var(--cy-hi);background:rgba(0,0,0,.5);border:1px solid rgba(34,211,255,.3);border-radius:8px;padding:.5rem .8rem;cursor:pointer}
.char-status{margin-left:auto;display:flex;align-items:center;gap:.5rem;font-family:var(--F3);font-size:.6rem;letter-spacing:.12em;color:var(--cy);text-transform:uppercase}
.char-status .dot{width:7px;height:7px;border-radius:50%;background:var(--cy-hi);box-shadow:0 0 8px var(--cy-hi);animation:blink 1.6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── MODE TABS (Archive / Bestiary) ── */
.mode-tabs{display:flex;gap:.5rem;margin-bottom:1.3rem}
.mode-tab{flex:1;font-family:var(--F1);font-size:.8rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;padding:.9rem;border-radius:10px;cursor:pointer;text-align:center;background:rgba(0,0,0,.3);border:1px solid rgba(34,211,255,.15);color:var(--muted);transition:all .2s;position:relative;overflow:hidden}
.mode-tab .mt-icon{font-size:1.1rem;margin-right:.4rem}
.mode-tab:hover{color:var(--text);border-color:rgba(34,211,255,.35)}
.mode-tab.active{color:#021018;background:linear-gradient(180deg,var(--cy-hi),var(--cy));border-color:var(--cy-hi);box-shadow:0 0 24px rgba(34,211,255,.35)}
.mode-tab.bestiary.active{background:linear-gradient(180deg,#ff7a9c,#ff2d62);border-color:#ff7a9c;color:#1a0410;box-shadow:0 0 24px rgba(255,61,113,.4)}

/* ── TOOLBAR ── */
.toolbar{display:flex;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap}
.search{flex:1;min-width:180px;font-family:var(--F3);font-size:.88rem;color:var(--cy-hi);background:rgba(0,0,0,.45);border:1px solid rgba(34,211,255,.25);border-radius:8px;padding:.65rem .9rem;letter-spacing:.04em}
.search:focus{outline:none;border-color:rgba(34,211,255,.6);box-shadow:0 0 0 2px rgba(34,211,255,.12),0 0 16px rgba(34,211,255,.12)}
.search::placeholder{color:rgba(34,211,255,.4)}
.filter{font-family:var(--F3);font-size:.68rem;letter-spacing:.05em;color:var(--cy-hi);background:rgba(0,0,0,.5);border:1px solid rgba(34,211,255,.25);border-radius:8px;padding:.65rem .7rem;cursor:pointer}
.collapse-all{font-family:var(--F3);font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;padding:.6rem .8rem;border-radius:8px;cursor:pointer;background:rgba(34,211,255,.08);border:1px solid rgba(34,211,255,.25);color:var(--cy-hi)}
.collapse-all:hover{background:rgba(34,211,255,.18)}

/* ── ADD FORM ── */
.add-form{padding:1rem;border-radius:12px;margin-bottom:1.3rem;background:linear-gradient(135deg,rgba(34,211,255,.07),rgba(0,0,0,.35));border:1px solid rgba(34,211,255,.25);position:relative}
.add-form.bestiary-form{background:linear-gradient(135deg,rgba(255,61,113,.08),rgba(0,0,0,.35));border-color:rgba(255,61,113,.3)}
.add-form::before{content:'';position:absolute;top:-1px;left:14px;right:14px;height:1px;background:linear-gradient(90deg,transparent,var(--cy-hi),transparent)}
.add-form.bestiary-form::before{background:linear-gradient(90deg,transparent,#ff7a9c,transparent)}
/* SMALLER dropdown: title gets the room */
.add-row{display:grid;grid-template-columns:1fr 130px;gap:.6rem;margin-bottom:.6rem}
.add-row .ai-title{width:100%;font-family:var(--F2);font-weight:600;font-size:1rem;color:var(--cy-hi);background:rgba(0,0,0,.5);border:1px solid rgba(34,211,255,.25);border-radius:8px;padding:.65rem .85rem}
.add-row .ai-title:focus{outline:none;border-color:rgba(34,211,255,.6);box-shadow:0 0 0 2px rgba(34,211,255,.1)}
.add-row .ai-type{font-family:var(--F3);font-size:.66rem;letter-spacing:.04em;color:var(--cy-hi);background:rgba(0,0,0,.55);border:1px solid rgba(34,211,255,.25);border-radius:8px;padding:.65rem .5rem;cursor:pointer;width:100%}
/* bestiary stat row */
.beast-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:.6rem}
.beast-stats input{font-family:var(--F3);font-size:.85rem;color:var(--text);background:rgba(0,0,0,.45);border:1px solid rgba(255,61,113,.25);border-radius:8px;padding:.55rem .6rem;text-align:center}
.beast-stats input:focus{outline:none;border-color:rgba(255,61,113,.5)}
.beast-stats .bs-label{font-family:var(--F3);font-size:.5rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;text-align:center;margin-bottom:.2rem}
.add-body{width:100%;min-height:120px;resize:vertical;font-family:var(--F4);font-size:1.08rem;line-height:1.7;color:#f0e0c0;background:rgba(0,0,0,.4);border:1px solid rgba(34,211,255,.2);border-radius:8px;padding:.85rem 1rem}
.add-body:focus{outline:none;border-color:rgba(34,211,255,.55);box-shadow:0 0 16px rgba(34,211,255,.1)}
.add-body::placeholder{color:rgba(34,211,255,.35);font-style:italic}
.commit-btn{margin-top:.7rem;width:100%;font-family:var(--F1);font-size:.72rem;font-weight:700;letter-spacing:.2em;padding:.85rem;border-radius:9px;cursor:pointer;color:#021018;background:linear-gradient(180deg,var(--cy-hi),var(--cy));border:1px solid var(--cy-hi);box-shadow:0 0 20px rgba(34,211,255,.3);transition:all .15s}
.commit-btn:hover{box-shadow:0 0 30px rgba(34,211,255,.5);transform:translateY(-1px)}
.bestiary-form .commit-btn{background:linear-gradient(180deg,#ff7a9c,#ff2d62);border-color:#ff7a9c;box-shadow:0 0 20px rgba(255,61,113,.3)}

/* ── RECORD LIST ── */
.rec-list{display:flex;flex-direction:column;gap:.6rem}
.empty{text-align:center;padding:3.5rem 1rem;color:rgba(34,211,255,.55);font-family:var(--F3);letter-spacing:.12em}
.empty-glyph{font-size:3rem;opacity:.4;margin-bottom:1rem;color:var(--cy-hi)}
.empty span{display:block;font-family:var(--F4);font-style:italic;font-size:.85rem;margin-top:.5rem;text-transform:none;letter-spacing:0;opacity:.7}

.rec{position:relative;border-radius:10px;overflow:hidden;background:linear-gradient(135deg,rgba(34,211,255,.05),rgba(0,0,0,.28));border:1px solid rgba(34,211,255,.18);transition:border-color .2s,transform .2s,box-shadow .2s;animation:recIn .35s ease backwards}
.rec::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--cy),transparent);opacity:0;transition:opacity .2s}
.rec.beast{background:linear-gradient(135deg,rgba(255,61,113,.06),rgba(0,0,0,.28));border-color:rgba(255,61,113,.2)}
.rec.beast::before{background:linear-gradient(180deg,#ff7a9c,transparent)}
@keyframes recIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.rec:hover{border-color:rgba(34,211,255,.4);box-shadow:0 8px 24px -16px rgba(34,211,255,.5)}
.rec:hover::before,.rec.open::before{opacity:1}
.rec.beast:hover{border-color:rgba(255,61,113,.45)}
/* header (always visible, click to collapse) */
.rec-head{display:flex;align-items:center;gap:.7rem;padding:.8rem 1rem;cursor:pointer;user-select:none}
.rec-icon{color:var(--cy-hi);font-size:1.05rem;filter:drop-shadow(0 0 6px rgba(34,211,255,.5));flex-shrink:0}
.rec.beast .rec-icon{color:#ff7a9c;filter:drop-shadow(0 0 6px rgba(255,61,113,.5))}
.rec-title{font-family:var(--F2);font-weight:600;font-size:1.1rem;color:#fff;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-type{font-family:var(--F3);font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;color:var(--cy-hi);padding:.25rem .55rem;border:1px solid rgba(34,211,255,.3);border-radius:999px;background:rgba(34,211,255,.08);flex-shrink:0}
.rec.beast .rec-type{color:#ff7a9c;border-color:rgba(255,61,113,.3);background:rgba(255,61,113,.08)}
.rec-chev{color:rgba(34,211,255,.5);font-size:.8rem;transition:transform .2s;flex-shrink:0}
.rec.open .rec-chev{transform:rotate(180deg)}
.rec-body{display:none;padding:0 1rem 1rem;animation:bodyIn .2s ease}
.rec.open .rec-body{display:block}
@keyframes bodyIn{from{opacity:0}to{opacity:1}}
.rec-text{font-family:var(--F4);font-size:1.05rem;line-height:1.7;color:#e0d0b0;white-space:pre-wrap;padding-top:.5rem;border-top:1px solid rgba(34,211,255,.12)}
.rec.beast .rec-text{border-top-color:rgba(255,61,113,.15)}
.beast-statline{display:flex;flex-wrap:wrap;gap:.5rem;margin:.7rem 0}
.beast-stat{font-family:var(--F3);font-size:.62rem;letter-spacing:.06em;padding:.3rem .6rem;border-radius:7px;background:rgba(255,61,113,.1);border:1px solid rgba(255,61,113,.25);color:#ffb088}
.beast-stat b{color:#fff;margin-left:.3rem}
.rec-foot{display:flex;align-items:center;justify-content:space-between;gap:.8rem;margin-top:.8rem}
.rec-date{font-family:var(--F3);font-size:.54rem;letter-spacing:.08em;color:rgba(34,211,255,.5);text-transform:uppercase}
.rec-actions{display:flex;gap:.4rem}
.rec-btn{font-family:var(--F3);font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;padding:.35rem .65rem;border-radius:6px;cursor:pointer;transition:all .15s}
.rec-edit{background:rgba(34,211,255,.1);border:1px solid rgba(34,211,255,.3);color:var(--cy-hi)}
.rec-edit:hover{background:rgba(34,211,255,.2)}
.rec-move{background:rgba(157,140,255,.08);border:1px solid rgba(157,140,255,.28);color:var(--cyan)}
.rec-move:hover{background:rgba(157,140,255,.18);color:#fff}
.rec-del{background:rgba(255,40,60,.08);border:1px solid rgba(255,40,60,.25);color:#ff7080}
.rec-del:hover{background:rgba(255,40,60,.2);color:#fff}

/* edit mode */
.rec-edit-form{padding-top:.6rem}
.rec-edit-form .add-row{margin-bottom:.5rem}
.rec-edit-actions{display:flex;gap:.5rem;margin-top:.5rem}
.save-btn{font-family:var(--F1);font-size:.62rem;font-weight:700;letter-spacing:.12em;padding:.5rem 1rem;border-radius:8px;cursor:pointer;color:#021018;background:linear-gradient(180deg,var(--cy-hi),var(--cy));border:1px solid var(--cy-hi)}
.cancel-btn{font-family:var(--F3);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:.5rem 1rem;border-radius:8px;cursor:pointer;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:var(--muted)}
.cancel-btn:hover{color:#fff}

.readonly-note{font-family:var(--F3);font-size:.6rem;letter-spacing:.1em;color:var(--muted);text-align:center;padding:1rem;text-transform:uppercase}

@media(max-width:640px){
  .brand-title{font-size:1.3rem;letter-spacing:.18em}
  .add-row{grid-template-columns:1fr}
  .beast-stats{grid-template-columns:repeat(2,1fr)}
  .mode-tab{font-size:.66rem;padding:.7rem}
}
/* ═══ FILE EXPLORER — Archive Magic holo-index ═══ */
.explorer{display:grid;grid-template-columns:312px 1fr;gap:1.2rem;align-items:start}
@media(max-width:860px){.explorer{grid-template-columns:1fr}}

/* — Sidebar shell: a magic terminal panel — */
.ex-side{position:sticky;top:1rem;display:flex;flex-direction:column;gap:.7rem;max-height:calc(100vh - 2rem);
  background:linear-gradient(180deg,rgba(13,21,36,.92),rgba(7,12,22,.94));
  border:1px solid var(--line);border-radius:16px;padding:.85rem .8rem;backdrop-filter:blur(14px);
  box-shadow:0 18px 50px -22px #000, inset 0 1px 0 rgba(255,255,255,.04), inset 0 0 60px -40px var(--cy);
  position:sticky;overflow:hidden}
.ex-side::before{content:'';position:absolute;inset:0;pointer-events:none;border-radius:16px;
  background:linear-gradient(115deg,transparent 40%,rgba(157,140,255,.05) 50%,transparent 60%);
  background-size:300% 100%;animation:holoSweep 9s ease-in-out infinite}
@keyframes holoSweep{0%,100%{background-position:120% 0}50%{background-position:-20% 0}}
.ex-side-head{display:flex;align-items:center;justify-content:space-between;gap:.5rem;padding:.15rem .25rem .55rem;border-bottom:1px solid var(--line);position:relative}
.ex-side-head::after{content:'';position:absolute;left:0;bottom:-1px;width:40%;height:1px;background:linear-gradient(90deg,var(--cy),transparent)}
.ex-side-title{font-family:var(--F1);font-size:.6rem;font-weight:800;letter-spacing:.22em;color:var(--cy-hi);text-shadow:0 0 12px rgba(34,211,255,.4)}
.ex-side-actions{display:flex;gap:.4rem}
.ex-icon-btn{position:relative;width:32px;height:29px;border-radius:8px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,rgba(34,211,255,.12),rgba(34,211,255,.04));border:1px solid rgba(34,211,255,.3);color:var(--cy-hi);
  transition:transform .14s,box-shadow .14s,border-color .14s}
.ex-icon-btn:hover{transform:translateY(-1px);border-color:var(--cy-hi);box-shadow:0 4px 14px -6px rgba(34,211,255,.6),inset 0 0 12px -6px var(--cy-hi)}
.ex-icon-btn:active{transform:translateY(0)}
.ex-plus{position:absolute;top:0;right:1px;font-size:.52rem;color:#fff;font-weight:900;text-shadow:0 0 4px var(--cy)}

.ex-search{width:100%;font-family:var(--F3);font-size:.76rem;letter-spacing:.02em;color:var(--text);
  background:rgba(0,0,0,.45);border:1px solid var(--line);border-radius:9px;padding:.55rem .7rem;transition:border-color .15s,box-shadow .15s}
.ex-search::placeholder{color:var(--muted)}
.ex-search:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 2px rgba(157,140,255,.14),0 0 18px -8px var(--cyan)}
.ex-side-tools{display:flex;gap:.45rem}
.ex-filter{flex:1;font-family:var(--F3);font-size:.64rem;letter-spacing:.04em;color:var(--muted);background:rgba(0,0,0,.45);border:1px solid var(--line);border-radius:8px;padding:.42rem .55rem;cursor:pointer}
.ex-filter:focus{outline:none;border-color:var(--cy)}
.ex-collapse{width:34px;border-radius:8px;background:rgba(0,0,0,.45);border:1px solid var(--line);color:var(--muted);cursor:pointer;font-size:.8rem;transition:all .15s}
.ex-collapse:hover{border-color:var(--cy);color:var(--cy-hi)}

/* — The tree: holographic rune-index with indent guides — */
.ex-tree{flex:1;overflow-y:auto;overflow-x:hidden;padding:.35rem .15rem;display:flex;flex-direction:column;gap:1px;min-height:140px;--ind:.92rem;--pad:.5rem}
.ex-tree::-webkit-scrollbar{width:8px}
.ex-tree::-webkit-scrollbar-track{background:transparent}
.ex-tree::-webkit-scrollbar-thumb{background:linear-gradient(180deg,rgba(34,211,255,.3),rgba(34,211,255,.12));border-radius:5px;border:2px solid transparent;background-clip:padding-box}
.tn{position:relative;display:flex;align-items:center;gap:.42rem;height:30px;padding-right:.4rem;padding-left:calc(var(--pad) + var(--d,0) * var(--ind));
  border-radius:7px;cursor:pointer;font-family:var(--F2);font-size:.84rem;color:var(--text);white-space:nowrap;
  transition:background .13s,color .13s,box-shadow .13s}
/* indent guide lines — one hairline per ancestor depth */
.tn::before{content:'';position:absolute;left:var(--pad);top:0;bottom:0;width:calc(var(--d,0) * var(--ind));pointer-events:none;
  background-image:repeating-linear-gradient(90deg,rgba(34,211,255,.16) 0,rgba(34,211,255,.16) 1px,transparent 1px,transparent var(--ind));
  background-position:calc(var(--ind) * .5) 0}
.tn:hover{background:linear-gradient(90deg,rgba(34,211,255,.12),rgba(34,211,255,.03))}
.tn:hover::before{background-image:repeating-linear-gradient(90deg,rgba(34,211,255,.3) 0,rgba(34,211,255,.3) 1px,transparent 1px,transparent var(--ind))}
.tn-twist{width:14px;flex-shrink:0;font-size:.62rem;color:var(--muted);text-align:center;transition:transform .16s,color .16s;cursor:pointer}
.tn-twist.open{transform:rotate(90deg);color:var(--cy-hi)}
.tn-twist.closed{color:var(--cy)}
.tn-twist.leaf{opacity:.25;cursor:default}
.tn-ico{flex-shrink:0;font-size:.84rem;color:var(--cy);filter:drop-shadow(0 0 4px rgba(34,211,255,.35))}
.tn-ico.file{color:var(--muted);font-size:.78rem;filter:none}
.tn-label{overflow:hidden;text-overflow:ellipsis;letter-spacing:.01em}
.tn-root{height:34px;margin-bottom:.2rem;font-family:var(--F1);font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:var(--cy-hi);font-weight:700}
.tn-root .tn-ico{filter:drop-shadow(0 0 8px rgba(34,211,255,.6))}
.tn-root .tn-twist{color:var(--cy)}
/* active node: cyan holo-spine + glow */
.tn-folder.active,.tn-root.active{background:linear-gradient(90deg,rgba(157,140,255,.18),rgba(157,140,255,.02) 70%);color:#fff;
  box-shadow:inset 3px 0 0 var(--cyan),0 0 22px -11px var(--cyan)}
.tn-folder.active::before{opacity:.4}
.tn-folder.active .tn-ico{color:var(--cyan);filter:drop-shadow(0 0 6px var(--cyan))}
.tn-folder.active .tn-twist{color:var(--cyan)}
.tn-file:hover .tn-label{color:var(--cy-hi)}
.tn-file:hover .tn-ico{color:var(--cy)}

.ex-side-foot{display:flex;align-items:center;gap:.5rem;padding:.55rem .25rem .1rem;border-top:1px solid var(--line);
  font-family:var(--F3);font-size:.54rem;letter-spacing:.14em;color:var(--cy);text-transform:uppercase}

/* — Main panel — */
.ex-main{min-width:0}
.ex-breadcrumb{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;margin-bottom:1.1rem;padding:.65rem .9rem;
  background:linear-gradient(180deg,rgba(12,20,34,.6),rgba(7,12,22,.4));border:1px solid var(--line);border-radius:11px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
.crumb{font-family:var(--F2);font-size:.84rem;font-weight:600;background:none;border:none;color:var(--cy-hi);cursor:pointer;padding:.22rem .4rem;border-radius:6px;transition:background .14s,color .14s}
.crumb:hover{background:rgba(157,140,255,.1);color:#fff}
.crumb:last-of-type{color:#fff}
.crumb-sep{color:var(--muted);font-size:.7rem;opacity:.7}
.crumb-actions{margin-left:auto;display:flex;gap:.45rem}
.crumb-act{font-family:var(--F3);font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;background:rgba(34,211,255,.06);border:1px solid var(--line);color:var(--muted);padding:.32rem .6rem;border-radius:7px;cursor:pointer;transition:all .15s}
.crumb-act:hover{border-color:var(--cy);color:var(--cy-hi);background:rgba(34,211,255,.12)}

/* — Folder cards: holo data-tiles — */
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.7rem;margin-bottom:1.1rem}
.folder-card{position:relative;display:flex;align-items:center;gap:.7rem;padding:.85rem .9rem;cursor:pointer;overflow:hidden;
  background:linear-gradient(135deg,rgba(34,211,255,.08),rgba(0,0,0,.22));border:1px solid var(--line);border-radius:12px;
  clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%);
  transition:transform .15s,border-color .15s,box-shadow .15s}
.folder-card::after{content:'';position:absolute;top:0;right:0;width:12px;height:12px;background:linear-gradient(135deg,var(--cy),transparent);opacity:.5;transition:opacity .15s}
.folder-card:hover{transform:translateY(-3px);border-color:rgba(34,211,255,.55);box-shadow:0 12px 28px -14px rgba(34,211,255,.6),inset 0 0 30px -22px var(--cy-hi)}
.folder-card:hover::after{opacity:1}
.folder-card-icon{font-size:1.6rem;color:var(--cy);filter:drop-shadow(0 0 9px rgba(34,211,255,.5));flex-shrink:0;transition:transform .15s}
.folder-card:hover .folder-card-icon{transform:scale(1.06)}
.folder-card-main{display:flex;flex-direction:column;min-width:0;flex:1;gap:.15rem}
.folder-card-name{font-family:var(--F2);font-weight:700;font-size:.95rem;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.01em}
.folder-card-count{font-family:var(--F3);font-size:.55rem;letter-spacing:.1em;color:var(--cy);text-transform:uppercase;opacity:.75}
.folder-card-menu{position:absolute;top:.45rem;right:.5rem;width:23px;height:23px;border-radius:6px;background:rgba(0,0,0,.45);border:1px solid transparent;color:var(--muted);cursor:pointer;font-size:.85rem;line-height:1;opacity:0;transition:opacity .15s,color .15s,border-color .15s;z-index:2}
.folder-card:hover .folder-card-menu{opacity:1}
.folder-card-menu:hover{border-color:var(--cy);color:var(--cy-hi)}

.rec-loc{font-family:var(--F3);font-size:.55rem;color:var(--cyan);letter-spacing:.06em;margin-left:.4rem;opacity:.75}
.folder-empty .empty-glyph{color:rgba(34,211,255,.4)}


/* ── Action toolbar (replaces the always-on form) ── */
.ex-toolbar{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-bottom:1.1rem}
.tb-btn{font-family:var(--F2);font-weight:700;font-size:.86rem;letter-spacing:.02em;padding:.6rem 1.05rem;border-radius:10px;cursor:pointer;transition:transform .14s,box-shadow .14s,border-color .14s,background .14s;display:inline-flex;align-items:center;gap:.45rem}
.tb-primary{background:linear-gradient(180deg,var(--cy-hi),var(--cy));border:1px solid var(--cy-hi);color:#021018;box-shadow:0 6px 20px -10px rgba(34,211,255,.7)}
.tb-primary:hover{transform:translateY(-2px);box-shadow:0 10px 26px -10px rgba(34,211,255,.85)}
.tb-btn:not(.tb-primary){background:rgba(34,211,255,.07);border:1px solid var(--line);color:var(--cy-hi)}
.tb-btn:not(.tb-primary):hover{border-color:var(--cy);background:rgba(34,211,255,.14);transform:translateY(-1px)}
.tb-loc{margin-left:auto;font-family:var(--F3);font-size:.6rem;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:.4rem}
.tb-loc b{color:var(--cyan);font-weight:700}
.tb-loc-label{opacity:.7}
@media(max-width:520px){.tb-loc{width:100%;margin-left:0;order:3}}

/* ── Composer modal — the writing surface ── */
.composer-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:1.5rem;
  background:radial-gradient(ellipse at 50% 30%,rgba(12,20,34,.7),rgba(1,3,8,.86));backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity .22s}
.composer-overlay.open{opacity:1;pointer-events:auto}
.composer{width:min(760px,100%);max-height:calc(100vh - 3rem);display:flex;flex-direction:column;overflow:hidden;
  background:linear-gradient(180deg,rgba(14,22,38,.98),rgba(8,13,24,.99));
  border:1px solid rgba(34,211,255,.35);border-radius:18px;
  box-shadow:0 40px 100px -30px #000,0 0 0 1px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05),0 0 80px -50px var(--cy);
  transform:translateY(16px) scale(.985);transition:transform .24s cubic-bezier(.2,.8,.2,1)}
.composer-overlay.open .composer{transform:none}
.composer-head{display:flex;align-items:center;gap:.8rem;padding:1rem 1.2rem;border-bottom:1px solid var(--line);position:relative}
.composer-head::after{content:'';position:absolute;left:1.2rem;bottom:-1px;width:60px;height:1px;background:linear-gradient(90deg,var(--cy),transparent)}
.composer-head-l{display:flex;align-items:center;gap:.6rem}
.composer-glyph{font-size:1.2rem;color:var(--cy-hi);filter:drop-shadow(0 0 8px rgba(34,211,255,.5))}
.composer-head-label{font-family:var(--F1);font-size:.78rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--cy-hi)}
.composer-loc{margin-left:auto;display:flex;align-items:center;gap:.35rem;font-family:var(--F3);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--cyan);background:rgba(157,140,255,.08);border:1px solid rgba(157,140,255,.22);padding:.3rem .6rem;border-radius:999px}
.cmp-loc-ico{opacity:.8}
.composer-close{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--muted);cursor:pointer;font-size:.85rem;transition:all .14s;flex-shrink:0}
.composer-close:hover{border-color:#ff7080;color:#ff7080;background:rgba(255,40,60,.1)}
.composer-body{flex:1;overflow-y:auto;padding:1.2rem;display:flex;flex-direction:column;gap:.9rem}
.composer-row{display:flex;gap:.7rem}
.composer-title{flex:1;font-family:var(--F2);font-weight:700;font-size:1.35rem;color:#fff;background:transparent;border:none;border-bottom:1px solid var(--line);padding:.5rem .2rem;transition:border-color .15s}
.composer-title::placeholder{color:var(--muted);font-weight:400}
.composer-title:focus{outline:none;border-bottom-color:var(--cy)}
.composer-type{font-family:var(--F3);font-size:.72rem;letter-spacing:.06em;color:var(--cy-hi);background:rgba(0,0,0,.5);border:1px solid rgba(34,211,255,.3);border-radius:9px;padding:.4rem .7rem;cursor:pointer;align-self:flex-end}
.composer-type:focus{outline:none;border-color:var(--cy)}
.composer-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem}
@media(max-width:560px){.composer-stats{grid-template-columns:repeat(2,1fr)}}
.cmp-stat{display:flex;flex-direction:column;gap:.25rem}
.cmp-stat span{font-family:var(--F3);font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.cmp-stat input{font-family:var(--F2);font-size:.92rem;color:#fff;background:rgba(0,0,0,.4);border:1px solid var(--line);border-radius:8px;padding:.45rem .6rem;transition:border-color .15s}
.cmp-stat input:focus{outline:none;border-color:var(--cy)}
.composer-textarea{flex:1;min-height:42vh;resize:vertical;font-family:var(--F4);font-size:1.12rem;line-height:1.75;color:#ece0c6;
  background:rgba(0,0,0,.32);border:1px solid var(--line);border-radius:12px;padding:1rem 1.1rem;transition:border-color .15s,box-shadow .15s}
.composer-textarea::placeholder{color:var(--muted);font-style:italic}
.composer-textarea:focus{outline:none;border-color:rgba(34,211,255,.5);box-shadow:inset 0 0 30px -22px var(--cy-hi),0 0 0 2px rgba(34,211,255,.08)}
.composer-foot{display:flex;align-items:center;gap:1rem;padding:.9rem 1.2rem;border-top:1px solid var(--line);background:rgba(0,0,0,.25)}
.composer-hint{font-family:var(--F3);font-size:.6rem;letter-spacing:.04em;color:var(--muted)}
.composer-hint kbd{font-family:var(--F3);font-size:.56rem;color:var(--cy-hi);background:rgba(34,211,255,.1);border:1px solid var(--line);border-radius:4px;padding:.1rem .35rem;margin:0 .1rem}
.composer-actions{margin-left:auto;display:flex;gap:.6rem}
.composer-cancel{font-family:var(--F2);font-weight:600;font-size:.84rem;padding:.55rem 1.1rem;border-radius:9px;background:transparent;border:1px solid var(--line);color:var(--muted);cursor:pointer;transition:all .14s}
.composer-cancel:hover{border-color:rgba(255,255,255,.3);color:var(--text)}
.composer-save{font-family:var(--F2);font-weight:800;font-size:.84rem;letter-spacing:.02em;padding:.55rem 1.3rem;border-radius:9px;cursor:pointer;
  background:linear-gradient(180deg,var(--cy-hi),var(--cy));border:1px solid var(--cy-hi);color:#021018;
  box-shadow:0 6px 18px -8px rgba(34,211,255,.7);transition:transform .14s,box-shadow .14s}
.composer-save:hover{transform:translateY(-1px);box-shadow:0 10px 24px -8px rgba(34,211,255,.9)}
@media(max-width:560px){
  .composer-overlay{padding:0;align-items:stretch}
  .composer{width:100%;max-height:100vh;border-radius:0;border:none}
  .composer-foot{flex-wrap:wrap}
  .composer-hint{display:none}
  .composer-actions{width:100%}
  .composer-cancel,.composer-save{flex:1}
}
</style>

<body>
<div class="wrap">

  <header class="topbar">
    <div class="brand">
      <div class="brand-glyph">◈</div>
      <div>
        <div class="brand-title">ARCHIVE</div>
        <div class="brand-sub">Eidetic Memory Interface · Magic Network</div>
      </div>
    </div>
    <div class="top-actions">
      <a href="fairytail.html" class="btn ghost">← Sheet</a>
      <a href="index.html" class="btn ghost">⌂ Hub</a>
    </div>
  </header>

  <div class="char-picker">
    <label>Archive of</label>
    <select id="charSelect"></select>
    <div class="char-status"><span class="dot"></span><span id="charStatusLabel">ONLINE</span></div>
  </div>

  <div class="mode-tabs">
    <div class="mode-tab active" data-mode="archive"><span class="mt-icon">◈</span>Archive</div>
    <div class="mode-tab bestiary" data-mode="bestiary"><span class="mt-icon">⬣</span>Bestiary</div>
  </div>

  <div class="explorer">
    <aside class="ex-side">
      <div class="ex-side-head">
        <span class="ex-side-title" id="treeTitle">VAULT</span>
        <div class="ex-side-actions">
          <button id="newFolderBtn" class="ex-icon-btn" title="New folder">▤<span class="ex-plus">+</span></button>
          <button id="newFileBtn" class="ex-icon-btn" title="New record">▢<span class="ex-plus">+</span></button>
        </div>
      </div>
      <div class="ex-search-wrap">
        <input id="search" class="ex-search" type="text" placeholder="⌕ Search vault…">
      </div>

          <input id="cmpTitle" class="composer-title" type="text" placeholder="Title…">

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getFirestore, doc, getDoc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

const FB_CONFIG = {
  apiKey:"AIzaSyCfEtfiU5swXvVkqt4shp8i6h4JYI8ES7U",authDomain:"dand-3c76a.firebaseapp.com",
  projectId:"dand-3c76a",storageBucket:"dand-3c76a.firebasestorage.app",
  messagingSenderId:"27455098509",appId:"1:27455098509:web:432929f697da9a947d5cc4",measurementId:"G-D1TQM5WJT8"
};
const app = initializeApp(FB_CONFIG, 'ft-archive');
const db  = getFirestore(app);
const CAMPAIGN = doc(db, 'campaigns', 'ft-campaign');

const $ = id => document.getElementById(id);
const esc = s => String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

const ARCHIVE_TYPES = ['Person','Place','Event','Item','Knowledge','Spell','Other'];
const ARCHIVE_ICONS = { Person:'◉', Place:'⬡', Event:'◈', Item:'◇', Knowledge:'❖', Spell:'✦', Other:'▪' };
const BEAST_TYPES = ['Beast','Demon','Dragon','Undead','Construct','Humanoid','Spirit','Aberration','Other'];
const BEAST_ICONS = { Beast:'🐾', Demon:'😈', Dragon:'🐉', Undead:'💀', Construct:'⚙', Humanoid:'🗡', Spirit:'👻', Aberration:'🌀', Other:'⬣' };

let state = null;          // full campaign state
let charIdx = 0;           // which character we're viewing
let mode = 'archive';      // 'archive' | 'bestiary'
let search = '';
let filter = 'all';
let _editId = null;
let _composingId = null;
let _isEditing = false;    // guard against snapshot clobber while typing
let _lastRaw = null;
let _cwd = null;           // current folder id (null = root)
let _openFolders = new Set(); // expanded folder ids in the tree
let _renamingFolder = null;
// My presence id (set if this browser has claimed a character on the sheet)
const MY_PID = localStorage.getItem('ft-pid');
// Spectators can't write. Treat as read-only if not the owner of the selected char (and not DM).
let dmUnlocked = sessionStorage.getItem('ft-dm') === '1';

function recordsArr(c){ return mode==='archive' ? (c.archive||(c.archive=[])) : (c.bestiary||(c.bestiary=[])); }
function foldersArr(c){
  if(mode==='archive'){ if(!Array.isArray(c.archiveFolders)) c.archiveFolders=[]; return c.archiveFolders; }
  if(!Array.isArray(c.bestiaryFolders)) c.bestiaryFolders=[]; return c.bestiaryFolders;
}
function folderById(c,id){ return foldersArr(c).find(f=>f.id===id)||null; }
function childFolders(c,parent){ return foldersArr(c).filter(f=>(f.parent||null)===(parent||null)); }
function childRecords(c,parent){ return recordsArr(c).filter(r=>(r.parent||null)===(parent||null)); }
function folderPath(c,id){
  const path=[]; let cur=folderById(c,id);
  let guard=0;
  while(cur && guard++<50){ path.unshift(cur); cur=cur.parent?folderById(c,cur.parent):null; }
  return path;
}
function descendantFolderIds(c,id){
  const out=[]; const stack=[id];
  let guard=0;
  while(stack.length && guard++<999){
    const cur=stack.pop();
    childFolders(c,cur).forEach(f=>{ out.push(f.id); stack.push(f.id); });
  }
  return out;
}

function hasArchiveMagic(c){ return /archive/i.test(c?.magicType||''); }
function canEdit(){
  if (dmUnlocked) return true;
  if (sessionStorage.getItem('ft-spectator')==='1') return false;
  const c = state?.characters?.[charIdx];
  return !!c && c.claimedBy === MY_PID;  // only the owner edits their own archive
}

// ── load + live sync ──
function start(){
  onSnapshot(CAMPAIGN, snap=>{
    if(!snap.exists()) return;
    const raw = snap.data().data;
    if(raw===_lastRaw){ return; }            // flicker guard
    if(_isEditing){ _lastRaw=raw; return; }  // don't clobber while typing
    _lastRaw = raw;
    try { state = JSON.parse(raw); } catch(e){ return; }
    populateCharSelect();
    render();
  }, e=>console.error(e));
}

async function pushState(){
  if(!state) return;
  try { await setDoc(CAMPAIGN, { data: JSON.stringify(state) }); }
  catch(e){ console.error('push failed', e); }
}

function populateCharSelect(){
  const sel = $('charSelect'); if(!sel) return;
  const chars = state.characters||[];
  // Prefer characters that actually have Archive Magic; otherwise show all active
  const archivers = chars.map((c,i)=>({c,i})).filter(({c})=>hasArchiveMagic(c) && c.state!=='dead');
  const list = archivers.length ? archivers : chars.map((c,i)=>({c,i})).filter(({c})=>c.state!=='dead');
  // default to my claimed char if it's in the list
  if(_firstLoad){
    const mineIdx = chars.findIndex(c=>c.claimedBy===MY_PID && hasArchiveMagic(c));
    if(mineIdx>=0) charIdx = mineIdx;
    else if(list.length) charIdx = list[0].i;
    _firstLoad = false;
  }
  sel.innerHTML = list.map(({c,i})=>`<option value="${i}" ${i===charIdx?'selected':''}>${esc(c.name||`Player ${i+1}`)}${hasArchiveMagic(c)?' ◈':''}</option>`).join('')
    || '<option>No characters</option>';
}
let _firstLoad = true;

// ── render ──
function render(){
  if(!state) return;
  const c = state.characters?.[charIdx];
  if(!c){ $('recList').innerHTML='<div class="empty"><div class="empty-glyph">◈</div>NO CHARACTER</div>'; $('tree').innerHTML=''; return; }
  if(!Array.isArray(c.archive)) c.archive=[];
  if(!Array.isArray(c.bestiary)) c.bestiary=[];

  const types = mode==='archive' ? ARCHIVE_TYPES : BEAST_TYPES;
  const icons = mode==='archive' ? ARCHIVE_ICONS : BEAST_ICONS;
  const recs = recordsArr(c), folders = foldersArr(c);

  if(_cwd && !folderById(c,_cwd)) _cwd=null;

  $('recCount').textContent = `${recs.length} ${mode==='archive'?(recs.length===1?'RECORD':'RECORDS'):(recs.length===1?'ENTRY':'ENTRIES')}`;
  $('treeTitle').textContent = mode==='archive' ? 'ARCHIVE VAULT' : 'BESTIARY VAULT';
  const fil = $('filter');
  fil.innerHTML = `<option value="all">All ${mode==='archive'?'Types':'Classes'}</option>` + types.map(t=>`<option value="${t}">${t}</option>`).join('');
  fil.value = filter;

  renderTree(c, icons);
  renderBreadcrumb(c);
  renderAddForm(types);

  // Search mode: flat results across the whole vault. Otherwise: current folder.
  const editable = canEdit();
  const list = $('recList');
  const searching = !!search.trim() || filter!=='all';

  let display;
  if(searching){
    display = recs.map((r,i)=>({r,i}));
    if(filter!=='all') display = display.filter(({r})=>r.type===filter);
    if(search.trim()){ const q=search.toLowerCase(); display = display.filter(({r})=>(r.title||'').toLowerCase().includes(q)||(r.body||'').toLowerCase().includes(q)||(r.type||'').toLowerCase().includes(q)); }
    display.sort((a,b)=>(b.r.ts||0)-(a.r.ts||0));
  } else {
    display = childRecords(c,_cwd).map(r=>({r})).sort((a,b)=>(b.r.ts||0)-(a.r.ts||0));
  }

  const subFolders = searching ? [] : childFolders(c,_cwd).sort((a,b)=>(a.name||'').localeCompare(b.name||''));

  if(!recs.length && !folders.length){
    list.innerHTML = `<div class="empty"><div class="empty-glyph">${mode==='archive'?'◈':'⬣'}</div>${mode==='archive'?'THE ARCHIVE IS EMPTY':'NO CREATURES CATALOGUED'}<span>${editable?'Create a folder or record to begin. Build your vault like a library.':'Nothing has been recorded yet.'}</span></div>`;
    return;
  }
  if(searching && !display.length){ list.innerHTML = `<div class="empty"><div class="empty-glyph">⌕</div>NO MATCHES<span>Adjust your search or filter.</span></div>`; return; }
  if(!searching && !subFolders.length && !display.length){
    list.innerHTML = `<div class="empty folder-empty"><div class="empty-glyph">▤</div>EMPTY FOLDER<span>${editable?'Add a record or subfolder here, or move items in.':'Nothing filed here yet.'}</span></div>`;
    return;
  }

  let html = '';

  if(subFolders.length){
    html += `<div class="folder-grid">` + subFolders.map(f=>{
      const childCount = childFolders(c,f.id).length + childRecords(c,f.id).length;
      return `<div class="folder-card" data-folder="${f.id}">
        <span class="folder-card-icon">▤</span>
        <div class="folder-card-main">
          <span class="folder-card-name">${esc(f.name||'Folder')}</span>
          <span class="folder-card-count">${childCount} item${childCount===1?'':'s'}</span>
        </div>
        ${editable?`<button class="folder-card-menu" data-fmenu="${f.id}" title="Folder options">⋯</button>`:''}
      </div>`;
    }).join('') + `</div>`;
  }

  html += display.map(({r})=>{
    const icon = icons[r.type]||'▪';
    const date = r.ts ? new Date(r.ts).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}) : '';
    const open = _openIds.has(r.id);
    const loc = searching && (r.parent) ? `<span class="rec-loc">in ${esc((folderById(c,r.parent)||{}).name||'?')}</span>` : '';
    let statLine = '';
    if(mode==='bestiary'){
      const stats=[];
      if(r.hp) stats.push(`<span class="beast-stat">HP<b>${esc(r.hp)}</b></span>`);
      if(r.ac) stats.push(`<span class="beast-stat">AC<b>${esc(r.ac)}</b></span>`);
      if(r.threat) stats.push(`<span class="beast-stat">THREAT<b>${esc(r.threat)}</b></span>`);
      if(r.weakness) stats.push(`<span class="beast-stat">WEAK<b>${esc(r.weakness)}</b></span>`);
      if(stats.length) statLine = `<div class="beast-statline">${stats.join('')}</div>`;
    }
    if(false){ return ''; }
    return `
    <div class="rec ${mode==='bestiary'?'beast':''} ${open?'open':''}" data-id="${r.id}">
      <div class="rec-head" data-toggle="${r.id}">
        <span class="rec-icon">${icon}</span>
        <span class="rec-title">${esc(r.title||'Untitled')}</span>
        ${loc}
        <span class="rec-type">${esc(r.type||'Other')}</span>
        <span class="rec-chev">▾</span>
      </div>
      <div class="rec-body">
        ${statLine}
        <div class="rec-text">${esc(r.body||'')}</div>
        <div class="rec-foot">
          <span class="rec-date">⌖ ${date}</span>
          ${editable?`<div class="rec-actions"><button class="rec-btn rec-move" data-move="${r.id}">⇄ Move</button><button class="rec-btn rec-edit" data-edit="${r.id}">✎ Amend</button><button class="rec-btn rec-del" data-del="${r.id}">✕ Purge</button></div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');

  list.innerHTML = html;

  list.querySelectorAll('[data-folder]').forEach(card=>card.addEventListener('click',e=>{
    if(e.target.closest('[data-fmenu]')) return;
    _cwd = card.dataset.folder; _openFolders.add(_cwd); search=''; $('search').value=''; render();
  }));
  list.querySelectorAll('[data-fmenu]').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); folderMenu(c, b.dataset.fmenu); }));
  list.querySelectorAll('[data-toggle]').forEach(h=>h.addEventListener('click',()=>{
    const id=h.dataset.toggle;
    if(_openIds.has(id)) _openIds.delete(id); else _openIds.add(id);
    render();
  }));
  list.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    if(!confirm('Purge this entry?'))return;
    const arr = recordsArr(c);
    const idx = arr.findIndex(x=>x.id===b.dataset.del);
    if(idx>=0) arr.splice(idx,1);
    pushState(); render();
  }));
  list.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    const r = recordsArr(c).find(x=>x.id===b.dataset.edit);
    if(r) openComposer(r);
  }));
  list.querySelectorAll('[data-move]').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); moveRecord(c, b.dataset.move); }));
}

function renderTree(c, icons){
  const host = $('tree'); if(!host) return;
  const editable = canEdit();
  function node(folder, depth){
    const id = folder ? folder.id : null;
    const isRoot = !folder;
    const expanded = isRoot || _openFolders.has(id);
    const subs = childFolders(c, id).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    const recs = childRecords(c, id).sort((a,b)=>(a.title||'').localeCompare(b.title||''));
    const hasKids = subs.length+recs.length>0;
    let h = '';
    if(!isRoot){
      const active = _cwd===id ? ' active' : '';
      h += `<div class="tn tn-folder${active}" data-tfolder="${id}" style="--d:${depth}">
        <span class="tn-twist ${hasKids?(expanded?'open':'closed'):'leaf'}" data-ttoggle="${id}">${hasKids?'▸':'·'}</span>
        <span class="tn-ico">▤</span>
        <span class="tn-label">${esc(folder.name||'Folder')}</span>
      </div>`;
    }
    if(expanded){
      subs.forEach(f=> h += node(f, depth+(isRoot?0:1)) );
      recs.forEach(r=>{
        const active = (!_cwd && false);
        h += `<div class="tn tn-file" data-tfile="${r.id}" data-tfileparent="${r.parent||''}" style="--d:${depth+(isRoot?0:1)}">
          <span class="tn-twist leaf">·</span>
          <span class="tn-ico file">${icons[r.type]||'▪'}</span>
          <span class="tn-label">${esc(r.title||'Untitled')}</span>
        </div>`;
      });
    }
    return h;
  }
  const rootActive = _cwd===null ? ' active' : '';
  host.innerHTML = `<div class="tn tn-root${rootActive}" data-troot="1"><span class="tn-twist open">▾</span><span class="tn-ico">◈</span><span class="tn-label">${mode==='archive'?'Archive':'Bestiary'}</span></div>` + node(null, 0);

  host.querySelector('[data-troot]')?.addEventListener('click',()=>{ _cwd=null; search=''; $('search').value=''; render(); });
  host.querySelectorAll('[data-ttoggle]').forEach(t=>t.addEventListener('click',e=>{
    e.stopPropagation();
    const id=t.dataset.ttoggle;
    if(_openFolders.has(id)) _openFolders.delete(id); else _openFolders.add(id);
    render();
  }));
  host.querySelectorAll('[data-tfolder]').forEach(n=>n.addEventListener('click',e=>{
    if(e.target.closest('[data-ttoggle]')) return;
    _cwd=n.dataset.tfolder; _openFolders.add(_cwd); search=''; $('search').value=''; render();
  }));
  host.querySelectorAll('[data-tfile]').forEach(n=>n.addEventListener('click',()=>{
    const r = recordsArr(c).find(x=>x.id===n.dataset.tfile); if(!r) return;
    _cwd = r.parent||null; search=''; $('search').value='';
    _openIds.add(r.id); render();
    setTimeout(()=>{ document.querySelector(`.rec[data-id="${r.id}"]`)?.scrollIntoView({behavior:'smooth',block:'center'}); },60);
  }));
}

function renderBreadcrumb(c){
  const host=$('ex-breadcrumb'); if(!host) return;
  const path = _cwd ? folderPath(c,_cwd) : [];
  let h = `<button class="crumb" data-croot="1">${mode==='archive'?'◈ Archive':'⬣ Bestiary'}</button>`;
  path.forEach(f=>{ h += `<span class="crumb-sep">›</span><button class="crumb" data-cfolder="${f.id}">${esc(f.name||'Folder')}</button>`; });
  if(canEdit() && _cwd){
    h += `<div class="crumb-actions"><button class="crumb-act" id="crumbRename">✎ Rename</button><button class="crumb-act" id="crumbDelete">✕ Delete folder</button></div>`;
  }
  host.innerHTML = h;
  host.querySelector('[data-croot]')?.addEventListener('click',()=>{ _cwd=null; render(); });
  host.querySelectorAll('[data-cfolder]').forEach(b=>b.addEventListener('click',()=>{ _cwd=b.dataset.cfolder; render(); }));
  $('crumbRename')?.addEventListener('click',()=>renameFolder(c,_cwd));
  $('crumbDelete')?.addEventListener('click',()=>deleteFolder(c,_cwd));
}

function createFolder(c){
  if(!canEdit()) return;
  const name = prompt('New folder name:'); if(name===null) return;
  const f = { id:'fld-'+Date.now()+'-'+Math.random().toString(36).slice(2,6), name:name.trim()||'New Folder', parent:_cwd||null, ts:Date.now() };
  foldersArr(c).push(f);
  if(_cwd) _openFolders.add(_cwd);
  pushState(); render();
}
function renameFolder(c,id){
  if(!canEdit()) return;
  const f=folderById(c,id); if(!f) return;
  const name=prompt('Rename folder:', f.name||''); if(name===null) return;
  f.name=name.trim()||f.name; pushState(); render();
}
function deleteFolder(c,id){
  if(!canEdit()) return;
  const f=folderById(c,id); if(!f) return;
  const ids=[id,...descendantFolderIds(c,id)];
  const recCount = recordsArr(c).filter(r=>ids.includes(r.parent)).length;
  const folderCount = ids.length;
  if(!confirm(`Delete "${f.name}"${folderCount>1?` and ${folderCount-1} subfolder(s)`:''}? ${recCount?`${recCount} record(s) inside will move to the parent.`:''}`)) return;
  // move records up to the deleted folder's parent
  const newParent = f.parent||null;
  recordsArr(c).forEach(r=>{ if(ids.includes(r.parent)) r.parent=newParent; });
  // remove the folders
  const arr=foldersArr(c);
  for(let i=arr.length-1;i>=0;i--){ if(ids.includes(arr[i].id)) arr.splice(i,1); }
  ids.forEach(x=>_openFolders.delete(x));
  _cwd = newParent;
  pushState(); render();
}
function folderMenu(c,id){
  if(!canEdit()) return;
  const f=folderById(c,id); if(!f) return;
  const act = prompt(`Folder "${f.name}":\nType  R  to rename,  D  to delete,  M  to move into another folder.`,'');
  if(act===null) return;
  const a=act.trim().toUpperCase();
  if(a==='R') renameFolder(c,id);
  else if(a==='D') deleteFolder(c,id);
  else if(a==='M') moveFolder(c,id);
}
function pickFolderTarget(c, label, excludeIds){
  const all = foldersArr(c).filter(f=>!excludeIds.includes(f.id));
  const opts = all.map((f,i)=>`${i+1}. ${folderPath(c,f.id).map(p=>p.name).join(' / ')}`);
  const choice = prompt(`${label}\n0. (Root)\n${opts.join('\n')}\n\nEnter a number:`,'0');
  if(choice===null) return undefined;
  const n=parseInt(choice);
  if(isNaN(n)||n<0||n>all.length) return undefined;
  return n===0 ? null : all[n-1].id;
}
function moveRecord(c,id){
  if(!canEdit()) return;
  const r=recordsArr(c).find(x=>x.id===id); if(!r) return;
  const target=pickFolderTarget(c,`Move "${r.title}" to which folder?`,[]);
  if(target===undefined) return;
  r.parent=target; pushState(); render();
}
function moveFolder(c,id){
  if(!canEdit()) return;
  const f=folderById(c,id); if(!f) return;
  const exclude=[id,...descendantFolderIds(c,id)];
  const target=pickFolderTarget(c,`Move folder "${f.name}" into:`,exclude);
  if(target===undefined) return;
  f.parent=target; pushState(); render();
}
let _openIds = new Set();

function renderAddForm(types){
  const zone = $('addZone');
  if(!canEdit()){ zone.innerHTML = `<div class="readonly-note">👁 Read-only — only ${esc(state.characters?.[charIdx]?.name||'the owner')} (or the DM) can add entries.</div>`; return; }
  const c = state.characters[charIdx];
  const locName = _cwd ? (folderById(c,_cwd)?.name||'…') : (mode==='archive'?'Archive root':'Bestiary root');
  zone.innerHTML = `
    <div class="ex-toolbar">
      <button id="tbNewRec" class="tb-btn tb-primary">＋ ${mode==='archive'?'New Record':'New Creature'}</button>
      <button id="tbNewFolder" class="tb-btn">▤ New Folder</button>
      <span class="tb-loc"><span class="tb-loc-label">Saving to</span> <b>${esc(locName)}</b></span>
    </div>`;
  $('tbNewRec')?.addEventListener('click',()=>openComposer(null));
  $('tbNewFolder')?.addEventListener('click',()=>createFolder(c));
}

function composerTypes(){ return mode==='archive' ? ARCHIVE_TYPES : BEAST_TYPES; }

function openComposer(rec){
  const c = state.characters?.[charIdx]; if(!c || !canEdit()) return;
  _composingId = rec ? rec.id : null;
  _isEditing = true;
  const types = composerTypes();
  const isBeast = mode==='bestiary';
  $('cmpHeadLabel').textContent = rec ? (isBeast?'Edit creature':'Edit record') : (isBeast?'New creature':'New record');
  const locName = (rec ? (rec.parent?folderById(c,rec.parent)?.name:null) : (_cwd?folderById(c,_cwd)?.name:null)) || (isBeast?'Bestiary root':'Archive root');
  $('cmpLoc').innerHTML = `<span class="cmp-loc-ico">▤</span>${esc(locName)}`;
  $('cmpType').innerHTML = types.map(t=>`<option value="${t}" ${rec&&rec.type===t?'selected':''}>${t}</option>`).join('');
  $('cmpTitle').value = rec ? (rec.title||'') : '';
  $('cmpTitle').placeholder = isBeast ? 'Creature name…' : 'Record title — name, place, thing…';
  $('cmpBody').value = rec ? (rec.body||'') : '';
  $('cmpBody').placeholder = isBeast ? 'Description, abilities, lore, tactics…' : 'Everything recorded… what was seen, heard, learned.';
  const stats = $('cmpStats');
  if(isBeast){
    stats.style.display='grid';
    stats.innerHTML = `
      <label class="cmp-stat"><span>HP</span><input id="cmpHp" value="${rec?esc(rec.hp||''):''}" placeholder="—"></label>
      <label class="cmp-stat"><span>AC</span><input id="cmpAc" value="${rec?esc(rec.ac||''):''}" placeholder="—"></label>
      <label class="cmp-stat"><span>Threat</span><input id="cmpThreat" value="${rec?esc(rec.threat||''):''}" placeholder="Low…"></label>
      <label class="cmp-stat"><span>Weakness</span><input id="cmpWeak" value="${rec?esc(rec.weakness||''):''}" placeholder="Fire…"></label>`;
  } else { stats.style.display='none'; stats.innerHTML=''; }
  $('cmpSave').textContent = rec ? 'Save changes' : (isBeast?'Catalogue creature':'Commit to archive');
  const ov = $('composer');
  ov.classList.add('open');
  document.body.style.overflow='hidden';
  setTimeout(()=>$('cmpTitle').focus(),60);
}
function closeComposer(){
  $('composer').classList.remove('open');
  document.body.style.overflow='';
  _composingId=null; _isEditing=false;
}
function saveComposer(){
  const c = state.characters?.[charIdx]; if(!c) return;
  const title=$('cmpTitle').value.trim();
  const type=$('cmpType').value;
  const body=$('cmpBody').value.trim();
  if(!title&&!body){ $('cmpTitle').focus(); return; }
  const isBeast = mode==='bestiary';
  const arr = recordsArr(c);
  if(_composingId){
    const r = arr.find(x=>x.id===_composingId);
    if(r){
      r.title=title||'Untitled'; r.type=type; r.body=body; r.edited=Date.now();
      if(isBeast){ r.hp=$('cmpHp')?.value.trim()||''; r.ac=$('cmpAc')?.value.trim()||''; r.threat=$('cmpThreat')?.value.trim()||''; r.weakness=$('cmpWeak')?.value.trim()||''; }
    }
  } else {
    const rec={ id:(isBeast?'beast':'arc')+'-'+Date.now(), title:title||'Untitled', type, body, ts:Date.now(), parent:_cwd||null };
    if(isBeast){ rec.hp=$('cmpHp')?.value.trim()||''; rec.ac=$('cmpAc')?.value.trim()||''; rec.threat=$('cmpThreat')?.value.trim()||''; rec.weakness=$('cmpWeak')?.value.trim()||''; }
    arr.unshift(rec);
    _openIds.add(rec.id);
  }
  closeComposer();
  pushState(); render();
}


// ── UI events ──
$('charSelect').addEventListener('change',e=>{ charIdx=Number(e.target.value); _editId=null; _openIds.clear(); _cwd=null; _openFolders.clear(); render(); });
document.querySelectorAll('.mode-tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.mode-tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  mode=t.dataset.mode; filter='all'; search=''; _editId=null; _openIds.clear(); _cwd=null; _openFolders.clear();
  $('search').value=''; render();
}));
$('search').addEventListener('input',e=>{ search=e.target.value; render(); });
$('filter').addEventListener('change',e=>{ filter=e.target.value; render(); });
$('newFolderBtn')?.addEventListener('click',()=>{ const c=state?.characters?.[charIdx]; if(c) createFolder(c); });
$('newFileBtn')?.addEventListener('click',()=>{ if(canEdit()) openComposer(null); });
$('collapseAll')?.addEventListener('click',()=>{
  const c=state?.characters?.[charIdx]; if(!c)return;
  if(_openFolders.size){ _openFolders.clear(); }
  else { foldersArr(c).forEach(f=>_openFolders.add(f.id)); }
  render();
});
$('cmpClose')?.addEventListener('click',closeComposer);
$('cmpCancel')?.addEventListener('click',closeComposer);
$('cmpSave')?.addEventListener('click',saveComposer);
$('composer')?.addEventListener('mousedown',e=>{ if(e.target===$('composer')) closeComposer(); });
document.addEventListener('keydown',e=>{
  if(!$('composer')?.classList.contains('open')) return;
  if(e.key==='Escape'){ e.preventDefault(); closeComposer(); }
  else if((e.ctrlKey||e.metaKey) && e.key==='Enter'){ e.preventDefault(); saveComposer(); }
});

start();
</script>
</body>
</html>
