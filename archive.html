<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getFirestore, doc, getDoc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

const FB_CONFIG = {
  apiKey:"AIzaSyCfEtfiU5swXvVkqt4shp8i6h4JYI8ES7U",authDomain:"dand-3c76a.firebaseapp.com",
  projectId:"dand-3c76a",storageBucket:"dand-3c76a.firebasestorage.app",
  messagingSenderId:"27455098509",appId:"1:27455098509:web:432929f697da9a947d5cc4",measurementId:"G-D1TQM5WJT8"
};
const app = initializeApp(FB_CONFIG, 'ft-archive');
const db  = getFirestore(app);
const CAMPAIGN = doc(db, 'campaigns', 'ft-campaign');

const $ = id => document.getElementById(id);
const esc = s => String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

const ARCHIVE_TYPES = ['People','History','Magic','Grimoires','Alchemy','Guilds','Notebook','Day to day Archive'];
const ARCHIVE_ICONS = { 'People':'◉', 'History':'◈', 'Magic':'✦', 'Grimoires':'❖', 'Alchemy':'⬢', 'Guilds':'⬡', 'Notebook':'▣', 'Day to day Archive':'◷' };
const BEAST_TYPES = ['Humanoid','Monster','Beast','Herb'];
const BEAST_ICONS = { 'Humanoid':'◉', 'Monster':'▲', 'Beast':'⬣', 'Herb':'❀' };

let state = null;          // full campaign state
let charIdx = 0;           // which character we're viewing
let mode = 'archive';      // 'archive' | 'bestiary'
let search = '';
let filter = 'all';
let _editId = null;
let _composingId = null;
let _isEditing = false;    // guard against snapshot clobber while typing
let _lastRaw = null;
let _cwd = null;           // current folder id (null = root)
let _openFolders = new Set(); // expanded folder ids in the tree
let _renamingFolder = null;
let _sort = 'name';
let _sortDir = 1;
let _view = (localStorage.getItem('fx-view')==='grid') ? 'grid' : 'details';
let _selId = null;
let _renaming = null;
let _dragKey = null;
let _clip = null;
let _navBack = [];
// My presence id (set if this browser has claimed a character on the sheet)
const MY_PID = localStorage.getItem('ft-pid');
// Spectators can't write. Treat as read-only if not the owner of the selected char (and not DM).
let dmUnlocked = sessionStorage.getItem('ft-dm') === '1';

function recordsArr(c){ return mode==='archive' ? (c.archive||(c.archive=[])) : (c.bestiary||(c.bestiary=[])); }
function foldersArr(c){
  if(mode==='archive'){ if(!Array.isArray(c.archiveFolders)) c.archiveFolders=[]; return c.archiveFolders; }
  if(!Array.isArray(c.bestiaryFolders)) c.bestiaryFolders=[]; return c.bestiaryFolders;
}
function folderById(c,id){ return foldersArr(c).find(f=>f.id===id)||null; }
function childFolders(c,parent){ return foldersArr(c).filter(f=>(f.parent||null)===(parent||null)); }
function childRecords(c,parent){ return recordsArr(c).filter(r=>(r.parent||null)===(parent||null)); }
function folderPath(c,id){
  const path=[]; let cur=folderById(c,id);
  let guard=0;
  while(cur && guard++<50){ path.unshift(cur); cur=cur.parent?folderById(c,cur.parent):null; }
  return path;
}
function descendantFolderIds(c,id){
  const out=[]; const stack=[id];
  let guard=0;
  while(stack.length && guard++<999){
    const cur=stack.pop();
    childFolders(c,cur).forEach(f=>{ out.push(f.id); stack.push(f.id); });
  }
  return out;
}

function allRecords(c){ return [].concat(Array.isArray(c.archive)?c.archive:[], Array.isArray(c.bestiary)?c.bestiary:[]); }
function findRecordById(c,id){ return allRecords(c).find(r=>r.id===id)||null; }
function recordModeOf(c,id){ if((c.archive||[]).some(r=>r.id===id)) return 'archive'; if((c.bestiary||[]).some(r=>r.id===id)) return 'bestiary'; return null; }
function recordLinks(rec){ return Array.isArray(rec.links)?rec.links:[]; }
function addLink(c,aId,bId){
  if(aId===bId) return;
  const a=findRecordById(c,aId), b=findRecordById(c,bId);
  if(!a||!b) return;
  if(!Array.isArray(a.links)) a.links=[];
  if(!Array.isArray(b.links)) b.links=[];
  if(!a.links.includes(bId)) a.links.push(bId);
  if(!b.links.includes(aId)) b.links.push(aId);
}
function removeLink(c,aId,bId){
  const a=findRecordById(c,aId), b=findRecordById(c,bId);
  if(a&&Array.isArray(a.links)) a.links=a.links.filter(x=>x!==bId);
  if(b&&Array.isArray(b.links)) b.links=b.links.filter(x=>x!==aId);
}
function revealRecord(c,id){
  const r=findRecordById(c,id); if(!r) return;
  const m=recordModeOf(c,id);
  if(m && m!==mode){
    mode=m;
    document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active', t.dataset.mode===m));
  }
  filter='all'; search=''; if($('search')) $('search').value='';
  _cwd = r.parent||null;
  render();
  setTimeout(()=>openComposer(r),30);
}

function hasArchiveMagic(c){ return /archive/i.test(c?.magicType||''); }
function canEdit(){
  if (dmUnlocked) return true;
  if (sessionStorage.getItem('ft-spectator')==='1') return false;
  const c = state?.characters?.[charIdx];
  return !!c && c.claimedBy === MY_PID;  // only the owner edits their own archive
}

// ── load + live sync ──
function start(){
  onSnapshot(CAMPAIGN, snap=>{
    if(!snap.exists()) return;
    const raw = snap.data().data;
    if(raw===_lastRaw){ return; }            // flicker guard
    if(_isEditing){ _lastRaw=raw; return; }  // don't clobber while typing
    _lastRaw = raw;
    try { state = JSON.parse(raw); } catch(e){ return; }
    populateCharSelect();
    render();
  }, e=>console.error(e));
}

async function pushState(){
  if(!state) return;
  try { await setDoc(CAMPAIGN, { data: JSON.stringify(state) }); }
  catch(e){ console.error('push failed', e); }
}

function populateCharSelect(){
  const sel = $('charSelect'); if(!sel) return;
  const chars = state.characters||[];
  // Prefer characters that actually have Archive Magic; otherwise show all active
  const archivers = chars.map((c,i)=>({c,i})).filter(({c})=>hasArchiveMagic(c) && c.state!=='dead');
  const list = archivers.length ? archivers : chars.map((c,i)=>({c,i})).filter(({c})=>c.state!=='dead');
  // default to my claimed char if it's in the list
  if(_firstLoad){
    const mineIdx = chars.findIndex(c=>c.claimedBy===MY_PID && hasArchiveMagic(c));
    if(mineIdx>=0) charIdx = mineIdx;
    else if(list.length) charIdx = list[0].i;
    _firstLoad = false;
  }
  sel.innerHTML = list.map(({c,i})=>`<option value="${i}" ${i===charIdx?'selected':''}>${esc(c.name||`Player ${i+1}`)}${hasArchiveMagic(c)?' ◈':''}</option>`).join('')
    || '<option>No characters</option>';
}
let _firstLoad = true;

// ── render ──
function render(){
  if(!state) return;
  const c = state.characters?.[charIdx];
  if(!c){ $('fxList').innerHTML='<div class="empty"><div class="empty-glyph">◈</div>NO CHARACTER</div>'; $('tree').innerHTML=''; return; }
  if(!Array.isArray(c.archive)) c.archive=[];
  if(!Array.isArray(c.bestiary)) c.bestiary=[];
  if(_cwd && !folderById(c,_cwd)) _cwd=null;

  const types = mode==='archive' ? ARCHIVE_TYPES : BEAST_TYPES;
  const icons = mode==='archive' ? ARCHIVE_ICONS : BEAST_ICONS;
  const recs = recordsArr(c);

  $('treeTitle').textContent = mode==='archive' ? 'ARCHIVE' : 'BESTIARY';
  const fil = $('filter');
  fil.innerHTML = `<option value="all">All ${mode==='archive'?'types':'classes'}</option>` + types.map(t=>`<option value="${t}">${t}</option>`).join('');
  fil.value = filter;

  renderTree(c, icons);
  renderBreadcrumb(c);
  renderExplorer(c, icons);
}

function entryKey(kind,id){ return (kind==='folder'?'f:':'r:')+id; }

function fxRows(c, icons){
  const searching = !!search.trim() || filter!=='all';
  let rows = [];
  if(searching){
    let recs = recordsArr(c).slice();
    if(filter!=='all') recs = recs.filter(r=>r.type===filter);
    if(search.trim()){ const q=search.toLowerCase(); recs = recs.filter(r=>(r.title||'').toLowerCase().includes(q)||(r.body||'').toLowerCase().includes(q)||(r.type||'').toLowerCase().includes(q)); }
    rows = recs.map(r=>({kind:'record', id:r.id, name:r.title||'Untitled', type:r.type||'Other', mod:r.edited||r.ts||0, rec:r, loc:r.parent?(folderById(c,r.parent)||{}).name:null}));
  } else {
    const folders = childFolders(c,_cwd).map(f=>({kind:'folder', id:f.id, name:f.name||'Folder', type:'Folder', mod:f.ts||0, count:childFolders(c,f.id).length+childRecords(c,f.id).length}));
    const records = childRecords(c,_cwd).map(r=>({kind:'record', id:r.id, name:r.title||'Untitled', type:r.type||'Other', mod:r.edited||r.ts||0, rec:r}));
    rows = folders.concat(records);
  }
  const dir = _sortDir;
  rows.sort((a,b)=>{
    // folders always first in non-search
    if(a.kind!==b.kind){ if(a.kind==='folder') return -1; if(b.kind==='folder') return 1; }
    let v=0;
    if(_sort==='name') v=(a.name||'').localeCompare(b.name||'');
    else if(_sort==='type') v=(a.type||'').localeCompare(b.type||'')|| (a.name||'').localeCompare(b.name||'');
    else if(_sort==='modified') v=(b.mod||0)-(a.mod||0);
    return _sort==='modified' ? v*dir*-1*-1 : v*dir;
  });
  if(_sort==='modified' && dir<0) rows.reverse();
  return rows;
}

function renderExplorer(c, icons){
  const editable = canEdit();
  const searching = !!search.trim() || filter!=='all';
  const list = $('fxList');
  list.className = 'fx-list ' + (_view==='grid'?'fx-grid':'fx-details');

  // command bar state
  $('fxUp').disabled = searching || !_cwd;
  $('fxBack').disabled = !_navBack.length;
  const hasSel = !!_selId;
  ['fxCut','fxCopy','fxRename','fxDelete'].forEach(id=>{ const b=$(id); if(b) b.disabled = !hasSel || !editable; });
  $('fxPaste').disabled = !_clip || !editable;
  $('fxSortBtn').querySelector('.cmd-caret')?.remove();
  $('fxSortBtn').innerHTML = `<span class="cmd-ico">⇅</span>Sort: ${_sort==='name'?'Name':_sort==='type'?'Type':'Modified'}<span class="cmd-caret">▾</span>`;
  $('fxViewBtn').innerHTML = `<span class="cmd-ico">${_view==='grid'?'≣':'▦'}</span>${_view==='grid'?'List':'Grid'}`;
  $('fxViewBtn').title = _view==='grid'?'Switch to list view':'Switch to grid view';
  $('fxNewBtn').style.display = editable?'':'none';
  // filter dropdown menu
  const fm=$('fxFilterMenu');
  if(fm){
    const types = mode==='archive'?ARCHIVE_TYPES:BEAST_TYPES;
    fm.innerHTML = [`<button data-filter="all" class="fx-dd-item${filter==='all'?' on':''}"><span class="fx-dd-ico">${filter==='all'?'●':'○'}</span>All ${mode==='archive'?'types':'classes'}</button>`]
      .concat(types.map(t=>`<button data-filter="${t}" class="fx-dd-item${filter===t?' on':''}"><span class="fx-dd-ico">${filter===t?'●':'○'}</span>${t}</button>`)).join('');
    fm.querySelectorAll('[data-filter]').forEach(b=>b.addEventListener('click',()=>{ filter=b.dataset.filter; fm.classList.remove('open'); render(); }));
  }

  const rows = fxRows(c, icons);
  const folders = rows.filter(r=>r.kind==='folder');
  const records = rows.filter(r=>r.kind==='record');

  // status bar
  $('fxStatus').textContent = searching
    ? `${rows.length} result${rows.length===1?'':'s'}`
    : `${folders.length} folder${folders.length===1?'':'s'}, ${records.length} record${records.length===1?'':'s'}`;
  updateSelInfo(c);

  if(!rows.length){
    const totalEmpty = !recordsArr(c).length && !foldersArr(c).length;
    if(searching){ list.innerHTML = `<div class="empty"><div class="empty-glyph">⌕</div>No matches<span>Nothing matches your search or filter.</span></div>`; }
    else if(totalEmpty){ list.innerHTML = `<div class="empty"><div class="empty-glyph">${mode==='archive'?'◈':'⬣'}</div>${mode==='archive'?'Empty archive':'Empty bestiary'}<span>${editable?'Right-click here or use + New to create your first folder or record.':'Nothing recorded yet.'}</span></div>`; }
    else { list.innerHTML = `<div class="empty"><div class="empty-glyph">▤</div>Empty folder<span>${editable?'Right-click or use + New to add something here.':'Nothing filed here.'}</span></div>`; }
    bindEmptyArea(c);
    return;
  }

  let html = '';
  if(_view==='details'){
    html += `<div class="fx-headrow">
      <span class="fx-col-name" data-sort="name">Name${sortCaret('name')}</span>
      <span class="fx-col-type" data-sort="type">Type${sortCaret('type')}</span>
      <span class="fx-col-mod" data-sort="modified">Modified${sortCaret('modified')}</span>
    </div>`;
  }
  html += `<div class="fx-rows">`;
  html += rows.map(row=>{
    const key = entryKey(row.kind,row.id);
    const sel = _selId===key ? ' selected' : '';
    const cut = (_clip && _clip.mode==='move' && _clip.key===key) ? ' cut' : '';
    const ic = row.kind==='folder' ? '▤' : (icons[row.type]||'▪');
    const modTxt = row.mod ? new Date(row.mod).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})+' · '+new Date(row.mod).toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'}) : '—';
    const renaming = _renaming===key;
    const nameCell = renaming
      ? `<input class="fx-rename" value="${esc(row.name)}" spellcheck="false">`
      : `<span class="fx-name">${esc(row.name)}</span>`;
    let subText = '';
    if(row.kind==='folder'){ subText = `${row.count} item${row.count===1?'':'s'}`; }
    else if(searching && row.loc){ subText = `in ${row.loc}`; }
    else if(row.rec && row.rec.body){ subText = row.rec.body.replace(/\s+/g,' ').trim().slice(0,90); }
    const sub = subText ? `<span class="fx-sub">${esc(subText)}</span>` : '';
    const dragAttr = editable && !renaming ? 'draggable="true"' : '';
    return `<div class="fx-row${sel}${cut} ${row.kind}" data-key="${key}" data-kind="${row.kind}" data-id="${row.id}" ${dragAttr}>
      <span class="fx-cell fx-c-name">
        <span class="fx-ico ${row.kind}">${ic}</span>
        <span class="fx-namewrap">${nameCell}${sub}</span>
      </span>
      <span class="fx-cell fx-c-type">${esc(row.type)}</span>
      <span class="fx-cell fx-c-mod">${modTxt}</span>
    </div>`;
  }).join('');
  html += `</div>`;
  list.innerHTML = html;

  // column sort
  list.querySelectorAll('[data-sort]').forEach(h=>h.addEventListener('click',()=>{
    const s=h.dataset.sort;
    if(_sort===s) _sortDir*=-1; else { _sort=s; _sortDir=1; }
    renderExplorer(c, icons);
  }));

  // rows
  list.querySelectorAll('.fx-row').forEach(rowEl=>{
    const kind=rowEl.dataset.kind, id=rowEl.dataset.id, key=rowEl.dataset.key;
    rowEl.addEventListener('click',e=>{ if(e.target.closest('.fx-rename'))return; selectEntry(key); });
    rowEl.addEventListener('dblclick',e=>{ if(e.target.closest('.fx-rename'))return; openEntry(c,kind,id); });
    rowEl.addEventListener('contextmenu',e=>{ e.preventDefault(); e.stopPropagation(); selectEntry(key); openEntryMenu(c,kind,id,e.clientX,e.clientY); });
    if(editable){
      rowEl.addEventListener('dragstart',e=>{ _dragKey=key; rowEl.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain',key);}catch(_){} });
      rowEl.addEventListener('dragend',()=>{ _dragKey=null; list.querySelectorAll('.drop-into').forEach(x=>x.classList.remove('drop-into')); rowEl.classList.remove('dragging'); });
      if(kind==='folder'){
        rowEl.addEventListener('dragover',e=>{ if(_dragKey&&_dragKey!==key){ e.preventDefault(); rowEl.classList.add('drop-into'); } });
        rowEl.addEventListener('dragleave',()=>rowEl.classList.remove('drop-into'));
        rowEl.addEventListener('drop',e=>{ e.preventDefault(); rowEl.classList.remove('drop-into'); if(_dragKey) dropOnto(c, _dragKey, id); });
      }
    }
  });

  // inline rename input
  const ri = list.querySelector('.fx-rename');
  if(ri){
    ri.focus(); ri.select();
    const finish=(save)=>{ const v=ri.value; const k=_renaming; _renaming=null; if(save) commitRename(c,k,v); else renderExplorer(c,icons); };
    ri.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();finish(true);} else if(e.key==='Escape'){e.preventDefault();finish(false);} });
    ri.addEventListener('blur',()=>finish(true));
  }

  bindEmptyArea(c);
}

function sortCaret(s){ return _sort===s ? `<span class="fx-caret">${_sortDir>0?'▲':'▼'}</span>` : ''; }

function bindEmptyArea(c){
  const list=$('fxList');
  list.oncontextmenu=e=>{ if(e.target.closest('.fx-row'))return; e.preventDefault(); _selId=null; openEmptyMenu(c,e.clientX,e.clientY); };
  list.onclick=e=>{ if(!e.target.closest('.fx-row')&&!e.target.closest('.fx-headrow')){ _selId=null; updateSelInfo(c); list.querySelectorAll('.fx-row.selected').forEach(r=>r.classList.remove('selected')); } };
  if(canEdit()){
    list.ondragover=e=>{ if(_dragKey){ e.preventDefault(); } };
    list.ondrop=e=>{ if(_dragKey && !e.target.closest('.fx-row.folder')){ e.preventDefault(); dropOnto(c,_dragKey,_cwd); } };
  }
}

function updateSelInfo(c){
  const el=$('fxSelInfo'); if(!el)return;
  if(!_selId){ el.textContent=''; return; }
  const [p,id]=_selId.split(':');
  if(p==='f'){ const f=folderById(c,id); el.textContent = f?`“${f.name}” selected`:''; }
  else { const r=recordsArr(c).find(x=>x.id===id); el.textContent = r?`“${r.title||'Untitled'}” selected`:''; }
}

function selectEntry(key){
  _selId=key;
  const list=$('fxList');
  list.querySelectorAll('.fx-row').forEach(r=>r.classList.toggle('selected', r.dataset.key===key));
  const c=state.characters?.[charIdx]; if(c) updateSelInfo(c);
}

function openEntry(c,kind,id){
  if(kind==='folder'){ _cwd=id; _openFolders.add(id); _selId=null; search=''; $('search').value=''; filter='all'; render(); }
  else { const r=recordsArr(c).find(x=>x.id===id); if(r) openComposer(r); }
}

function startRename(c,key){
  if(!canEdit())return; _renaming=key; renderExplorer(c, mode==='archive'?ARCHIVE_ICONS:BEAST_ICONS);
}
function commitRename(c,key,val){
  const name=(val||'').trim();
  const [p,id]=key.split(':');
  if(p==='f'){ const f=folderById(c,id); if(f && name) f.name=name; }
  else { const r=recordsArr(c).find(x=>x.id===id); if(r && name) r.title=name; r&&(r.edited=Date.now()); }
  pushState(); render();
}

function dropOnto(c, key, targetFolderId){
  const [p,id]=key.split(':');
  if(p==='f'){
    if(id===targetFolderId) return;
    const bad=[id,...descendantFolderIds(c,id)];
    if(targetFolderId && bad.includes(targetFolderId)) return; // no folder into itself/descendant
    const f=folderById(c,id); if(f) f.parent=targetFolderId||null;
  } else {
    const r=recordsArr(c).find(x=>x.id===id); if(r) r.parent=targetFolderId||null;
  }
  if(targetFolderId) _openFolders.add(targetFolderId);
  pushState(); render();
}

// ── Context menus ──
function closeMenus(){ $('ctxMenu').classList.remove('open'); $('moveMenu').classList.remove('open'); }
function showMenu(el,x,y,items){
  el.innerHTML = items.map(it=> it.sep
    ? `<div class="ctx-sep"></div>`
    : `<button class="ctx-item${it.danger?' danger':''}" data-act="${it.act}"><span class="ctx-ico">${it.ico||''}</span>${it.label}${it.key?`<span class="ctx-key">${it.key}</span>`:''}</button>`
  ).join('');
  el.classList.add('open');
  el.style.left='0px'; el.style.top='0px';
  const w=el.offsetWidth, h=el.offsetHeight;
  el.style.left=Math.min(x, innerWidth-w-8)+'px';
  el.style.top=Math.min(y, innerHeight-h-8)+'px';
  return el;
}
function openEntryMenu(c,kind,id,x,y){
  closeMenus();
  const items=[
    {act:'open', ico:'⤢', label: kind==='folder'?'Open':'Open / edit', key:'↵'},
    {act:'rename', ico:'✎', label:'Rename', key:'F2'},
    {act:'move', ico:'⇄', label:'Move to…'},
    {sep:true},
    {act:'delete', ico:'✕', label:'Delete', key:'Del', danger:true},
  ];
  const m=showMenu($('ctxMenu'),x,y,items);
  m.querySelectorAll('[data-act]').forEach(b=>b.addEventListener('click',()=>{
    const a=b.dataset.act; closeMenus();
    if(a==='open') openEntry(c,kind,id);
    else if(a==='rename') startRename(c, entryKey(kind,id));
    else if(a==='delete') deleteEntry(c,kind,id);
    else if(a==='move') openMoveMenu(c,kind,id,x,y);
  }));
}
function openEmptyMenu(c,x,y){
  if(!canEdit()) return;
  const items=[
    {act:'newrec', ico:'✦', label: mode==='archive'?'New record':'New creature', key:'N'},
    {act:'newfolder', ico:'▤', label:'New folder', key:'⇧N'},
    {sep:true},
    {act:'paste', ico:'⎘', label:'Paste'+(_clip?` “${_clip.name}”`:''), disabled:!_clip},
  ].filter(it=>!(it.act==='paste'&&!_clip));
  const m=showMenu($('ctxMenu'),x,y,items);
  m.querySelectorAll('[data-act]').forEach(b=>b.addEventListener('click',()=>{
    const a=b.dataset.act; closeMenus();
    if(a==='newrec') openComposer(null);
    else if(a==='newfolder') createFolder(c);
    else if(a==='paste') pasteClip(c);
  }));
}
function openMoveMenu(c,kind,id,x,y){
  closeMenus();
  const exclude = kind==='folder' ? [id,...descendantFolderIds(c,id)] : [];
  const dests = [{id:null,name:mode==='archive'?'Archive (root)':'Bestiary (root)',depth:0}]
    .concat(foldersArr(c).filter(f=>!exclude.includes(f.id)).map(f=>({id:f.id,name:f.name||'Folder',depth:folderPath(c,f.id).length})));
  const m=$('moveMenu');
  m.innerHTML = `<div class="ctx-head">Move to</div>` + dests.map(d=>
    `<button class="ctx-item" data-dest="${d.id||''}"><span class="ctx-ico">${d.id?'▤':'◈'}</span><span style="padding-left:${(d.depth)*10}px">${esc(d.name)}</span></button>`
  ).join('');
  m.classList.add('open');
  m.style.left='0px'; m.style.top='0px';
  const w=m.offsetWidth,h=m.offsetHeight;
  m.style.left=Math.min(x+10, innerWidth-w-8)+'px';
  m.style.top=Math.min(y, innerHeight-h-8)+'px';
  m.querySelectorAll('[data-dest]').forEach(b=>b.addEventListener('click',()=>{
    const dest=b.dataset.dest||null; closeMenus();
    dropOnto(c, entryKey(kind,id), dest);
  }));
}

function deleteEntry(c,kind,id){
  if(!canEdit())return;
  if(kind==='folder'){ deleteFolder(c,id); }
  else {
    const r=recordsArr(c).find(x=>x.id===id);
    if(!confirm(`Delete “${r?r.title:'this record'}”? This cannot be undone.`)) return;
    recordLinks(r||{}).slice().forEach(other=>removeLink(c,id,other));
    const arr=recordsArr(c); const i=arr.findIndex(x=>x.id===id); if(i>=0) arr.splice(i,1);
    if(_selId===entryKey('record',id)) _selId=null;
    pushState(); render();
  }
}

function renderTree(c, icons){
  const host = $('tree'); if(!host) return;
  const editable = canEdit();
  function node(folder, depth){
    const id = folder ? folder.id : null;
    const isRoot = !folder;
    const expanded = isRoot || _openFolders.has(id);
    const subs = childFolders(c, id).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    const recs = childRecords(c, id).sort((a,b)=>(a.title||'').localeCompare(b.title||''));
    const hasKids = subs.length+recs.length>0;
    let h = '';
    if(!isRoot){
      const active = _cwd===id ? ' active' : '';
      const drop = editable ? `data-tdrop="${id}"` : '';
      h += `<div class="tn tn-folder${active}" data-tfolder="${id}" ${drop} style="--d:${depth}">
        <span class="tn-twist ${hasKids?(expanded?'open':'closed'):'leaf'}" data-ttoggle="${id}">${hasKids?'▸':'·'}</span>
        <span class="tn-ico">▤</span>
        <span class="tn-label">${esc(folder.name||'Folder')}</span>
      </div>`;
    }
    if(expanded){
      subs.forEach(f=> h += node(f, depth+(isRoot?0:1)) );
      recs.forEach(r=>{
        h += `<div class="tn tn-file" data-tfile="${r.id}" style="--d:${depth+(isRoot?0:1)}">
          <span class="tn-twist leaf">·</span>
          <span class="tn-ico file">${icons[r.type]||'▪'}</span>
          <span class="tn-label">${esc(r.title||'Untitled')}</span>
        </div>`;
      });
    }
    return h;
  }
  const rootActive = _cwd===null ? ' active' : '';
  const rootDrop = editable ? 'data-tdrop=""' : '';
  host.innerHTML = `<div class="tn tn-root${rootActive}" data-troot="1" ${rootDrop}><span class="tn-twist open">▾</span><span class="tn-ico">◈</span><span class="tn-label">${mode==='archive'?'Archive':'Bestiary'}</span></div>` + node(null, 0);

  host.querySelector('[data-troot]')?.addEventListener('click',()=>{ _cwd=null; search=''; $('search').value=''; filter='all'; render(); });
  host.querySelectorAll('[data-ttoggle]').forEach(t=>t.addEventListener('click',e=>{
    e.stopPropagation();
    const id=t.dataset.ttoggle;
    if(_openFolders.has(id)) _openFolders.delete(id); else _openFolders.add(id);
    render();
  }));
  host.querySelectorAll('[data-tfolder]').forEach(n=>n.addEventListener('click',e=>{
    if(e.target.closest('[data-ttoggle]')) return;
    _cwd=n.dataset.tfolder; _openFolders.add(_cwd); search=''; $('search').value=''; filter='all'; render();
  }));
  host.querySelectorAll('[data-tfolder]').forEach(n=>n.addEventListener('contextmenu',e=>{ e.preventDefault(); openEntryMenu(c,'folder',n.dataset.tfolder,e.clientX,e.clientY); }));
  host.querySelectorAll('[data-tfile]').forEach(n=>n.addEventListener('click',()=>{
    const r = recordsArr(c).find(x=>x.id===n.dataset.tfile); if(!r) return;
    _cwd = r.parent||null; search=''; $('search').value=''; filter='all'; render();
    setTimeout(()=>{ openComposer(r); },40);
  }));
  // tree folders as drop targets
  if(editable){
    host.querySelectorAll('[data-tdrop]').forEach(n=>{
      n.addEventListener('dragover',e=>{ if(_dragKey){ e.preventDefault(); n.classList.add('drop-into'); } });
      n.addEventListener('dragleave',()=>n.classList.remove('drop-into'));
      n.addEventListener('drop',e=>{ e.preventDefault(); n.classList.remove('drop-into'); if(_dragKey) dropOnto(c,_dragKey, n.dataset.tdrop||null); });
    });
  }
}

function renderBreadcrumb(c){
  const host=$('ex-breadcrumb'); if(!host) return;
  const searching=!!search.trim()||filter!=='all';
  if(searching){
    host.innerHTML = `<span class="crumb-search">⌕ Search results</span>`;
    return;
  }
  const path = _cwd ? folderPath(c,_cwd) : [];
  let h = `<button class="crumb" data-croot="1">${mode==='archive'?'◈ Archive':'⬣ Bestiary'}</button>`;
  path.forEach(f=>{ h += `<span class="crumb-sep">›</span><button class="crumb" data-cfolder="${f.id}">${esc(f.name||'Folder')}</button>`; });
  host.innerHTML = h;
  host.querySelector('[data-croot]')?.addEventListener('click',()=>{ _cwd=null; render(); });
  host.querySelectorAll('[data-cfolder]').forEach(b=>b.addEventListener('click',()=>{ _cwd=b.dataset.cfolder; render(); }));
}

function createFolder(c){
  if(!canEdit()) return;
  const f = { id:'fld-'+Date.now()+'-'+Math.random().toString(36).slice(2,6), name:'New folder', parent:_cwd||null, ts:Date.now() };
  foldersArr(c).push(f);
  if(_cwd) _openFolders.add(_cwd);
  _selId=entryKey('folder',f.id);
  pushState(); render();
  setTimeout(()=>startRename(c, entryKey('folder',f.id)),40);
}
function renameFolder(c,id){ startRename(c, entryKey('folder',id)); }
function deleteFolder(c,id){
  if(!canEdit()) return;
  const f=folderById(c,id); if(!f) return;
  const ids=[id,...descendantFolderIds(c,id)];
  const recCount = recordsArr(c).filter(r=>ids.includes(r.parent)).length;
  const folderCount = ids.length;
  if(!confirm(`Delete “${f.name}”${folderCount>1?` and ${folderCount-1} subfolder(s)`:''}? ${recCount?`${recCount} record(s) inside will move to the parent.`:'It is empty.'}`)) return;
  const newParent = f.parent||null;
  recordsArr(c).forEach(r=>{ if(ids.includes(r.parent)) r.parent=newParent; });
  const arr=foldersArr(c);
  for(let i=arr.length-1;i>=0;i--){ if(ids.includes(arr[i].id)) arr.splice(i,1); }
  ids.forEach(x=>_openFolders.delete(x));
  if(_cwd && ids.includes(_cwd)) _cwd = newParent;
  _selId=null;
  pushState(); render();
}

function pasteClip(c){
  if(!_clip) return;
  if(_clip.mode==='copy'){
    const [p,id]=_clip.key.split(':');
    if(p==='r'){
      const r=recordsArr(c).find(x=>x.id===id);
      if(r){ const copy=JSON.parse(JSON.stringify(r)); copy.id=(mode==='archive'?'arc':'beast')+'-'+Date.now(); copy.title=(r.title||'Untitled')+' (copy)'; copy.parent=_cwd||null; copy.ts=Date.now(); copy.edited=Date.now(); recordsArr(c).unshift(copy); _selId=entryKey('record',copy.id); }
    } else {
      // duplicate folder shallow (name copy) — keep simple: copy folder + its direct records
      const f=folderById(c,id);
      if(f){ const nf={id:'fld-'+Date.now()+'-'+Math.random().toString(36).slice(2,6),name:(f.name||'Folder')+' (copy)',parent:_cwd||null,ts:Date.now()}; foldersArr(c).push(nf); _selId=entryKey('folder',nf.id); }
    }
    pushState(); render();
  } else {
    dropOnto(c, _clip.key, _cwd);
    _clip=null;
  }
}
function setClip(c, mode){
  if(!_selId) return;
  const [p,id]=_selId.split(':');
  const name = p==='f' ? folderById(c,id)?.name : recordsArr(c).find(x=>x.id===id)?.title;
  _clip={key:_selId, name:name||'item', mode};
  render();
}

let _openIds = new Set();
function renderAddForm(){}

function composerTypes(){ return mode==='archive' ? ARCHIVE_TYPES : BEAST_TYPES; }

function openComposer(rec){
  const c = state.characters?.[charIdx]; if(!c || !canEdit()) return;
  _composingId = rec ? rec.id : null;
  _isEditing = true;
  const types = composerTypes();
  const isBeast = mode==='bestiary';
  $('cmpHeadLabel').textContent = rec ? (isBeast?'Edit creature':'Edit record') : (isBeast?'New creature':'New record');
  const locName = (rec ? (rec.parent?folderById(c,rec.parent)?.name:null) : (_cwd?folderById(c,_cwd)?.name:null)) || (isBeast?'Bestiary root':'Archive root');
  $('cmpLoc').innerHTML = `<span class="cmp-loc-ico">▤</span>${esc(locName)}`;
  $('cmpType').innerHTML = types.map(t=>`<option value="${t}" ${rec&&rec.type===t?'selected':''}>${t}</option>`).join('');
  $('cmpTitle').value = rec ? (rec.title||'') : '';
  $('cmpTitle').placeholder = isBeast ? 'Name of the creature…' : 'Record title — name, place, thing…';
  $('cmpBody').value = rec ? (rec.body||'') : '';
  $('cmpBody').placeholder = isBeast ? 'Description, behaviour, lore, tactics…' : 'Everything recorded… what was seen, heard, learned.';
  const stats = $('cmpStats');
  const imgWrap = $('cmpImagesWrap');
  if(isBeast){
    stats.style.display='grid';
    stats.innerHTML = `
      <label class="cmp-stat cmp-wide"><span>Classification</span><input id="cmpClass" value="${rec?esc(rec.classification||''):''}" placeholder="e.g. Lesser Fire Drake"></label>
      <label class="cmp-stat"><span>Amount Killed</span><input id="cmpKilled" value="${rec?esc(rec.killed||''):''}" placeholder="0"></label>
      <label class="cmp-stat"><span>Amount Defeated</span><input id="cmpDefeated" value="${rec?esc(rec.defeated||''):''}" placeholder="0"></label>
      <label class="cmp-stat cmp-wide"><span>Magic Used</span><input id="cmpMagic" value="${rec?esc(rec.magicUsed||''):''}" placeholder="Fire Dragon Slayer Magic…"></label>`;
    imgWrap.style.display='';
    $('cmpImages').value = rec && Array.isArray(rec.images) ? rec.images.join('\n') : '';
    renderImagePreview();
  } else { stats.style.display='none'; stats.innerHTML=''; imgWrap.style.display='none'; }
  $('cmpSave').textContent = rec ? 'Save changes' : (isBeast?'Catalogue creature':'Commit to archive');
  $('cmpLinkPicker').classList.remove('open'); $('cmpLinkPicker').innerHTML='';
  renderComposerLinks();
  const ov = $('composer');
  ov.classList.add('open');
  document.body.style.overflow='hidden';
  setTimeout(()=>$('cmpTitle').focus(),60);
}

function renderImagePreview(){
  const host=$('cmpImagesPreview'); if(!host) return;
  const urls=($('cmpImages')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);
  host.innerHTML = urls.map(u=>`<a href="${esc(u)}" target="_blank" rel="noopener" class="cmp-thumb"><img src="${esc(u)}" alt="" loading="lazy" onerror="this.parentElement.classList.add('broken')"></a>`).join('');
}

function renderComposerLinks(){
  const c=state.characters?.[charIdx]; if(!c) return;
  const host=$('cmpLinksList'); if(!host) return;
  if(!_composingId){ host.innerHTML=`<span class="cmp-links-empty">Save this record first, then link other files to it.</span>`; return; }
  const rec=findRecordById(c,_composingId);
  const links=rec?recordLinks(rec):[];
  if(!links.length){ host.innerHTML=`<span class="cmp-links-empty">No links yet. Use “+ Add link” to connect this to another file.</span>`; return; }
  host.innerHTML = links.map(id=>{
    const t=findRecordById(c,id); if(!t) return '';
    const m=recordModeOf(c,id);
    const ico=(m==='bestiary'?BEAST_ICONS:ARCHIVE_ICONS)[t.type]||'▪';
    return `<span class="cmp-link-chip" data-link="${id}"><span class="cmp-link-ico">${ico}</span><span class="cmp-link-name" data-goto="${id}">${esc(t.title||'Untitled')}</span><button class="cmp-link-x" data-unlink="${id}" title="Remove link">✕</button></span>`;
  }).join('');
  host.querySelectorAll('[data-goto]').forEach(b=>b.addEventListener('click',()=>{
    persistComposer(); const id=b.dataset.goto; revealRecord(state.characters[charIdx], id);
  }));
  host.querySelectorAll('[data-unlink]').forEach(b=>b.addEventListener('click',()=>{
    const c2=state.characters[charIdx]; removeLink(c2,_composingId,b.dataset.unlink); pushState(); renderComposerLinks();
  }));
}

function openLinkPicker(){
  const c=state.characters?.[charIdx]; if(!c) return;
  if(!_composingId){ persistComposer(); if(!_composingId) return; }
  const picker=$('cmpLinkPicker');
  const rec=findRecordById(c,_composingId);
  const linked=new Set(recordLinks(rec));
  const build=(q)=>{
    const ql=(q||'').toLowerCase();
    const opts=allRecords(c).filter(r=>r.id!==_composingId && !linked.has(r.id) && (!ql||(r.title||'').toLowerCase().includes(ql)));
    return opts.slice(0,40).map(r=>{
      const m=recordModeOf(c,r.id);
      const ico=(m==='bestiary'?BEAST_ICONS:ARCHIVE_ICONS)[r.type]||'▪';
      return `<button class="cmp-pick-item" data-pick="${r.id}"><span class="cmp-link-ico">${ico}</span><span class="cmp-pick-name">${esc(r.title||'Untitled')}</span><span class="cmp-pick-meta">${m==='bestiary'?'Bestiary':'Archive'} · ${esc(r.type||'')}</span></button>`;
    }).join('') || `<div class="cmp-pick-empty">No matching files.</div>`;
  };
  picker.innerHTML = `<input id="cmpPickSearch" class="cmp-pick-search" placeholder="Search files to link…" spellcheck="false"><div id="cmpPickList" class="cmp-pick-list">${build('')}</div>`;
  picker.classList.add('open');
  const si=$('cmpPickSearch'); si.focus();
  si.addEventListener('input',()=>{ $('cmpPickList').innerHTML=build(si.value); bindPick(); });
  const bindPick=()=>{ $('cmpPickList').querySelectorAll('[data-pick]').forEach(b=>b.addEventListener('click',()=>{
    const c2=state.characters[charIdx]; addLink(c2,_composingId,b.dataset.pick); pushState(); picker.classList.remove('open'); picker.innerHTML=''; renderComposerLinks();
  })); };
  bindPick();
}

function persistComposer(){
  const c = state.characters?.[charIdx]; if(!c) return null;
  const title=$('cmpTitle').value.trim();
  const type=$('cmpType').value;
  const body=$('cmpBody').value.trim();
  const isBeast = mode==='bestiary';
  if(!title&&!body && !_composingId) return null;
  const arr = recordsArr(c);
  let rec;
  if(_composingId){
    rec = findRecordById(c,_composingId);
    if(rec){ rec.title=title||'Untitled'; rec.type=type; rec.body=body; rec.edited=Date.now(); }
  } else {
    rec={ id:(isBeast?'beast':'arc')+'-'+Date.now(), title:title||'Untitled', type, body, ts:Date.now(), parent:_cwd||null };
    arr.unshift(rec);
    _openIds.add(rec.id);
    _composingId = rec.id;
  }
  if(rec && isBeast){
    rec.classification=$('cmpClass')?.value.trim()||'';
    rec.killed=$('cmpKilled')?.value.trim()||'';
    rec.defeated=$('cmpDefeated')?.value.trim()||'';
    rec.magicUsed=$('cmpMagic')?.value.trim()||'';
    rec.images=($('cmpImages')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);
  }
  pushState();
  return rec;
}
function closeComposer(){
  $('composer').classList.remove('open');
  document.body.style.overflow='';
  _composingId=null; _isEditing=false;
}
function saveComposer(){
  const c = state.characters?.[charIdx]; if(!c) return;
  const title=$('cmpTitle').value.trim();
  const body=$('cmpBody').value.trim();
  if(!title&&!body&&!_composingId){ $('cmpTitle').focus(); return; }
  persistComposer();
  closeComposer();
  render();
}


// ── UI events ──
const curChar=()=>state?.characters?.[charIdx];
$('charSelect').addEventListener('change',e=>{ charIdx=Number(e.target.value); _selId=null; _renaming=null; _openIds.clear(); _cwd=null; _openFolders.clear(); render(); });
document.querySelectorAll('.mode-tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.mode-tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  mode=t.dataset.mode; filter='all'; search=''; _selId=null; _renaming=null; _openIds.clear(); _cwd=null; _openFolders.clear();
  $('search').value=''; render();
}));
$('search').addEventListener('input',e=>{ search=e.target.value; render(); });
$('filter').addEventListener('change',e=>{ filter=e.target.value; render(); });
$('newFolderBtn')?.addEventListener('click',()=>{ const c=curChar(); if(c) createFolder(c); });
$('newFileBtn')?.addEventListener('click',()=>{ if(canEdit()) openComposer(null); });
$('collapseAll')?.addEventListener('click',()=>{
  const c=curChar(); if(!c)return;
  if(_openFolders.size){ _openFolders.clear(); } else { foldersArr(c).forEach(f=>_openFolders.add(f.id)); }
  render();
});

// command bar
function navTo(folderId){ const c=curChar(); if(!c)return; _navBack.push(_cwd); _cwd=folderId; _selId=null; render(); }
$('fxBack')?.addEventListener('click',()=>{ if(!_navBack.length)return; _cwd=_navBack.pop(); _selId=null; render(); });
$('fxUp')?.addEventListener('click',()=>{ const c=curChar(); if(!c||!_cwd)return; const f=folderById(c,_cwd); _navBack.push(_cwd); _cwd=f?f.parent||null:null; _selId=null; render(); });
$('fxViewBtn')?.addEventListener('click',()=>{ _view=_view==='grid'?'details':'grid'; localStorage.setItem('fx-view',_view); render(); });
$('fxSortBtn')?.addEventListener('click',()=>{ _sort = _sort==='name'?'type':_sort==='type'?'modified':'name'; _sortDir=1; render(); });
$('fxCut')?.addEventListener('click',()=>{ const c=curChar(); if(c) setClip(c,'move'); });
$('fxCopy')?.addEventListener('click',()=>{ const c=curChar(); if(c) setClip(c,'copy'); });
$('fxPaste')?.addEventListener('click',()=>{ const c=curChar(); if(c) pasteClip(c); });
$('fxRename')?.addEventListener('click',()=>{ const c=curChar(); if(c&&_selId) startRename(c,_selId); });
$('fxDelete')?.addEventListener('click',()=>{ const c=curChar(); if(!c||!_selId)return; const [p,id]=_selId.split(':'); deleteEntry(c,p==='f'?'folder':'record',id); });
const newMenu=$('fxNewMenu');
$('fxNewBtn')?.addEventListener('click',e=>{ e.stopPropagation(); $('fxFilterMenu')?.classList.remove('open'); newMenu.classList.toggle('open'); });
newMenu?.querySelectorAll('[data-new]').forEach(b=>b.addEventListener('click',()=>{
  newMenu.classList.remove('open'); const c=curChar(); if(!c)return;
  if(b.dataset.new==='folder') createFolder(c); else openComposer(null);
}));
$('fxFilterBtn')?.addEventListener('click',e=>{ e.stopPropagation(); newMenu?.classList.remove('open'); $('fxFilterMenu')?.classList.toggle('open'); });

// composer
$('cmpClose')?.addEventListener('click',closeComposer);
$('cmpCancel')?.addEventListener('click',closeComposer);
$('cmpSave')?.addEventListener('click',saveComposer);
$('cmpAddLink')?.addEventListener('click',()=>{ const p=$('cmpLinkPicker'); if(p.classList.contains('open')){ p.classList.remove('open'); p.innerHTML=''; } else openLinkPicker(); });
$('cmpImages')?.addEventListener('input',renderImagePreview);
$('composer')?.addEventListener('mousedown',e=>{ if(e.target===$('composer')) closeComposer(); });

// global: close menus / dropdown on outside click or scroll
document.addEventListener('click',e=>{ if(!e.target.closest('.ctx-menu')) closeMenus(); if(!e.target.closest('.fx-menuwrap')){ newMenu?.classList.remove('open'); $('fxFilterMenu')?.classList.remove('open'); } });
window.addEventListener('blur',closeMenus);
$('fxList')?.addEventListener('scroll',closeMenus,true);

// keyboard control
document.addEventListener('keydown',e=>{
  if($('composer')?.classList.contains('open')){
    if(e.key==='Escape'){ e.preventDefault(); closeComposer(); }
    else if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){ e.preventDefault(); saveComposer(); }
    return;
  }
  if(_renaming) return;
  const tag=(e.target.tagName||'').toLowerCase();
  if(tag==='input'||tag==='textarea'||tag==='select') return;
  const c=curChar(); if(!c) return;
  if(e.key==='Escape'){ closeMenus(); }
  if(!_selId) return;
  const [p,id]=_selId.split(':');
  const kind=p==='f'?'folder':'record';
  if(e.key==='F2'){ e.preventDefault(); startRename(c,_selId); }
  else if(e.key==='Delete'){ e.preventDefault(); deleteEntry(c,kind,id); }
  else if(e.key==='Enter'){ e.preventDefault(); openEntry(c,kind,id); }
  else if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='x'){ e.preventDefault(); setClip(c,'move'); }
  else if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='c'){ e.preventDefault(); setClip(c,'copy'); }
  else if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='v'){ e.preventDefault(); pasteClip(c); }
});

start();
</script>
</body>
</html>
