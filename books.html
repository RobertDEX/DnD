<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Library · RWBY DnD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800;900&family=Share+Tech+Mono&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --aura:#00d4ff;
  --aura-glow:rgba(0,212,255,.4);
  --red:#c0000a;
  --bg:#020106;
  --paper:#e8dcc0;
  --paper-dark:#d4c4a0;
  --ink:#2a2018;
  --ink-soft:#4a3c2c;
  --leather:#5a3420;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'EB Garamond',serif;
  background:
    radial-gradient(ellipse 100% 50% at 50% 0%, rgba(0,80,140,.12), transparent),
    radial-gradient(ellipse 80% 60% at 0% 100%, rgba(140,0,8,.15), transparent),
    radial-gradient(ellipse 60% 60% at 100% 100%, rgba(0,30,80,.2), transparent),
    #020106;
  color:#c4d8f4;
  min-height:100vh;
  overflow-x:hidden;
}

/* scanlines */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9997;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.06) 0,rgba(0,0,0,.06) 1px,transparent 1px,transparent 4px);
}

/* ─── TOP BAR ─── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.1rem 1.6rem;
  background:linear-gradient(90deg,rgba(8,4,14,.96),rgba(4,2,10,.96));
  border-bottom:1px solid rgba(0,210,255,.12);
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(10px);
}
.topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--aura),rgba(200,0,10,.4),var(--aura),transparent);
  opacity:.5;
}
.brand{display:flex;flex-direction:column;gap:.1rem}
.brand-title{
  font-family:'Orbitron',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:.08em;
  background:linear-gradient(135deg,#fff,var(--aura));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.brand-sub{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.25em;color:var(--aura);opacity:.6;text-transform:uppercase}
.top-actions{display:flex;gap:.7rem;align-items:center}

.btn{
  font-family:'Share Tech Mono',monospace;font-size:.68rem;letter-spacing:.1em;
  padding:.6rem 1rem;border-radius:8px;cursor:pointer;text-transform:uppercase;
  background:rgba(0,210,255,.06);border:1px solid rgba(0,210,255,.2);color:var(--aura);
  transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;
}
.btn:hover{background:rgba(0,210,255,.14);border-color:rgba(0,210,255,.5);transform:translateY(-1px)}
.btn.ghost{background:transparent;border-color:rgba(255,255,255,.12);color:#8aa0c0}
.btn.ghost:hover{border-color:rgba(255,255,255,.3);color:#c4d8f4}
.btn.red{background:rgba(140,0,8,.35);border-color:rgba(200,0,10,.4);color:#ff8088}
.btn.red:hover{background:rgba(140,0,8,.5);border-color:rgba(200,0,10,.7);color:#fff}
.btn.small{padding:.4rem .7rem;font-size:.6rem}

/* ─── DM dot ─── */
.dm-status{display:flex;align-items:center;gap:.4rem;font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.1em;color:#607080;text-transform:uppercase}
.dm-dot{width:8px;height:8px;border-radius:50%;background:#405060;transition:all .2s}
.dm-dot.on{background:#ff4060;box-shadow:0 0 8px rgba(255,40,60,.6)}

/* ─── SHELF ─── */
.shelf-intro{text-align:center;padding:2.5rem 1.5rem 1rem}
.shelf-intro h1{
  font-family:'Cinzel',serif;font-size:2rem;font-weight:700;letter-spacing:.06em;
  color:#e8dcc0;margin-bottom:.4rem;
  text-shadow:0 0 30px rgba(232,220,192,.15);
}
.shelf-intro p{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:#8090a0;font-style:italic}

.shelf{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:1.8rem;max-width:1200px;margin:0 auto;padding:2rem 1.5rem 4rem;
}

/* ─── BOOK SPINE / COVER ─── */
.book{
  position:relative;height:300px;border-radius:6px 10px 10px 6px;cursor:pointer;
  transition:transform .3s cubic-bezier(.2,1,.3,1),box-shadow .3s;
  overflow:hidden;
}
.book:hover{transform:translateY(-8px) rotateY(-4deg)}
.book.locked{cursor:not-allowed}

/* leather/paper book */
.book.tome{
  background:
    linear-gradient(90deg, rgba(0,0,0,.3) 0%, transparent 8%, transparent 92%, rgba(0,0,0,.25) 100%),
    linear-gradient(135deg, #6a3a22, #4a2414);
  border:1px solid #3a1c0e;
  box-shadow:0 12px 30px rgba(0,0,0,.5), inset 0 0 30px rgba(0,0,0,.3);
}
.book.tome::before{
  content:'';position:absolute;left:14px;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.4),transparent);
}
.book.tome .book-title{font-family:'Cinzel',serif;color:#e8d4a8;text-shadow:0 1px 2px rgba(0,0,0,.6)}
.book.tome .book-deco{color:rgba(232,212,168,.5)}

/* notebook variant — lighter, worn */
.book.notebook{
  background:
    linear-gradient(90deg, rgba(0,0,0,.25) 0%, transparent 8%, transparent 92%, rgba(0,0,0,.2) 100%),
    linear-gradient(135deg, #8a6a3a, #6a4a26);
  border:1px solid #4a3018;
  box-shadow:0 12px 30px rgba(0,0,0,.5), inset 0 0 30px rgba(0,0,0,.25);
}
.book.notebook .book-title{font-family:'Cormorant Garamond',serif;font-weight:600;color:#f0e0c0;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.book.notebook .book-deco{color:rgba(240,224,192,.5)}

/* grimm/holo variant — cyberpunk */
.book.holo{
  background:
    linear-gradient(135deg, rgba(0,40,60,.9), rgba(0,10,20,.95)),
    repeating-linear-gradient(0deg, transparent 0 3px, rgba(0,210,255,.04) 3px 4px);
  border:1px solid rgba(0,210,255,.4);
  box-shadow:0 12px 30px rgba(0,0,0,.5), 0 0 24px rgba(0,210,255,.15), inset 0 0 30px rgba(0,210,255,.06);
}
.book.holo::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg, transparent, rgba(0,210,255,.06), transparent);
  animation:holoScan 3s linear infinite;
}
@keyframes holoScan{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
.book.holo .book-title{font-family:'Orbitron',sans-serif;font-weight:700;color:var(--aura);text-shadow:0 0 12px rgba(0,210,255,.6)}
.book.holo .book-deco{color:rgba(0,210,255,.6)}

/* ═══════ GRIMM STUDIES — bestiary threat-terminal (enhanced) ═══════ */
.book.grimm{
  grid-column:1 / -1;            /* span the whole shelf width — it's the centerpiece */
  height:380px;border-radius:4px;overflow:hidden;
  background:
    radial-gradient(ellipse 70% 50% at 50% -5%, rgba(0,210,255,.16), transparent 62%),
    radial-gradient(ellipse 65% 65% at 100% 105%, rgba(255,40,70,.12), transparent 58%),
    radial-gradient(ellipse 50% 60% at 0% 100%, rgba(0,210,255,.08), transparent 55%),
    linear-gradient(135deg, rgba(2,18,30,.97), rgba(0,5,11,.99)),
    repeating-linear-gradient(0deg, transparent 0 3px, rgba(0,210,255,.045) 3px 4px);
  border:1px solid rgba(0,210,255,.5);
  box-shadow:0 24px 70px rgba(0,0,0,.65), 0 0 70px rgba(0,210,255,.2), inset 0 0 90px rgba(0,210,255,.05), inset 0 0 0 1px rgba(0,210,255,.1);
}
/* hex-grid threat texture */
.grimm-hexbg{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.5;
  background-image:
    radial-gradient(circle at 50% 50%, rgba(0,210,255,.05) 1px, transparent 1.5px),
    repeating-linear-gradient(60deg, rgba(0,210,255,.035) 0 1px, transparent 1px 26px),
    repeating-linear-gradient(-60deg, rgba(0,210,255,.035) 0 1px, transparent 1px 26px);
  background-size:30px 30px, auto, auto;
  mask:radial-gradient(ellipse 90% 80% at 50% 50%, #000, transparent 85%);}
/* sweeping vertical scan beam */
.grimm-beam{position:absolute;top:0;bottom:0;width:140px;z-index:2;pointer-events:none;
  background:linear-gradient(90deg, transparent, rgba(0,210,255,.12), rgba(120,240,255,.18), rgba(0,210,255,.12), transparent);
  filter:blur(2px);animation:grimmBeam 5.5s ease-in-out infinite}
@keyframes grimmBeam{0%{left:-160px;opacity:0}12%{opacity:1}50%{left:calc(100% + 20px);opacity:1}60%{opacity:0}100%{left:calc(100% + 20px);opacity:0}}
.grimm-vignette{position:absolute;inset:0;z-index:2;pointer-events:none;
  box-shadow:inset 0 0 120px rgba(0,0,0,.55);
  background:linear-gradient(180deg, rgba(0,0,0,.15), transparent 20%, transparent 80%, rgba(0,0,0,.25))}
.book.grimm::before{
  content:'';position:absolute;inset:10px;pointer-events:none;z-index:3;
  border:1px solid rgba(0,210,255,.22);border-radius:2px;
}
.book.grimm::after{
  content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:linear-gradient(180deg, transparent, rgba(0,210,255,.06), transparent);
  animation:holoScan 3.5s linear infinite;
}
/* side data rails (tick marks) */
.grimm-rail{position:absolute;top:46px;bottom:46px;width:3px;z-index:4;display:flex;flex-direction:column;justify-content:space-between}
.grimm-rail.left{left:26px}.grimm-rail.right{right:26px}
.grimm-rail span{display:block;width:100%;height:18px;background:linear-gradient(180deg,var(--aura),transparent);opacity:.4;border-radius:2px;animation:railPulse 2.6s ease-in-out infinite}
.grimm-rail span:nth-child(2){animation-delay:.5s}.grimm-rail span:nth-child(3){animation-delay:1s}
@keyframes railPulse{0%,100%{opacity:.25}50%{opacity:.7}}
.book.grimm .book-inner{justify-content:space-between;padding:2.2rem 3.4rem;align-items:stretch;text-align:left;position:relative;z-index:5}
.grimm-topbar{display:flex;align-items:center;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.24em;color:rgba(0,210,255,.7);text-transform:uppercase}
.grimm-topbar .gt-c{color:rgba(120,180,210,.5);letter-spacing:.3em}
.grimm-topbar .gt-id{color:rgba(255,70,100,.85);position:relative;padding-left:.9rem}
.grimm-topbar .gt-id::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:7px;height:7px;border-radius:50%;background:#ff4060;box-shadow:0 0 8px #ff4060;animation:grimmPulse 1.4s ease-in-out infinite}
.grimm-center{display:flex;flex-direction:column;align-items:center;gap:.85rem;text-align:center}
.grimm-sigil-wrap{position:relative;width:84px;height:84px;display:flex;align-items:center;justify-content:center;margin-bottom:.1rem}
.grimm-ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(0,210,255,.4);animation:grimmRing 3.4s linear infinite}
.grimm-ring.r2{inset:-12px;border-style:dashed;border-color:rgba(0,210,255,.22);animation:grimmRing 8s linear infinite reverse}
@keyframes grimmRing{to{transform:rotate(360deg)}}
.grimm-sigil{font-size:3.4rem;line-height:1;color:var(--aura);filter:drop-shadow(0 0 24px rgba(0,210,255,.8));animation:grimmPulse 3.6s ease-in-out infinite}
@keyframes grimmPulse{0%,100%{opacity:.85;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
.book.grimm .book-title{font-family:'Orbitron',sans-serif;font-weight:900;font-size:2.4rem;line-height:1.1;letter-spacing:.06em;
  color:#eaf9ff;text-shadow:0 0 24px rgba(0,210,255,.6), 0 0 2px rgba(120,240,255,.8);max-width:30ch;
  background:linear-gradient(180deg,#fff,#bfecff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.grimm-byline{font-family:'Share Tech Mono',monospace;font-size:.8rem;letter-spacing:.16em;color:rgba(0,210,255,.78);text-transform:uppercase}
.grimm-byline strong{color:#ff5a78;font-weight:400}
.grimm-tags{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-top:.3rem}
.grimm-tags span{font-family:'Share Tech Mono',monospace;font-size:.56rem;letter-spacing:.12em;color:rgba(140,210,235,.75);
  padding:.22rem .55rem;border:1px solid rgba(0,210,255,.28);border-radius:3px;background:rgba(0,210,255,.05);text-transform:uppercase}
.grimm-tags span.more{color:#ff8aa0;border-color:rgba(255,90,120,.35);background:rgba(255,40,70,.06)}
.grimm-botbar{display:flex;align-items:center;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.18em;color:rgba(120,180,210,.55);text-transform:uppercase}
.grimm-status{display:flex;align-items:center;gap:.4rem;color:rgba(0,255,160,.85)}
.grimm-status::before{content:'';width:7px;height:7px;border-radius:50%;background:#00ffa0;box-shadow:0 0 8px #00ffa0;animation:grimmPulse 1.8s ease-in-out infinite}
.grimm-ticker{overflow:hidden;max-width:200px;white-space:nowrap;color:rgba(0,210,255,.55)}
.grimm-ticker .gtk{display:inline-block;animation:grimmTicker 6s linear infinite}
@keyframes grimmTicker{0%{opacity:.3}50%{opacity:.8}100%{opacity:.3}}
.grimm-count{color:rgba(0,210,255,.85)}
/* corner brackets */
.book.grimm .gc{position:absolute;width:26px;height:26px;border:2px solid rgba(0,210,255,.7);z-index:6;pointer-events:none;filter:drop-shadow(0 0 4px rgba(0,210,255,.4))}
.book.grimm .gc.tl{top:16px;left:16px;border-right:0;border-bottom:0}
.book.grimm .gc.tr{top:16px;right:16px;border-left:0;border-bottom:0}
.book.grimm .gc.bl{bottom:16px;left:16px;border-right:0;border-top:0}
.book.grimm .gc.br{bottom:16px;right:16px;border-left:0;border-top:0}
.book.grimm:hover{transform:translateY(-7px);box-shadow:0 34px 84px rgba(0,0,0,.7), 0 0 100px rgba(0,210,255,.32), inset 0 0 90px rgba(0,210,255,.08)}
.book.grimm:hover .grimm-sigil{filter:drop-shadow(0 0 34px rgba(0,210,255,1))}
.book.grimm:hover .grimm-count{color:#aef0ff}

.book-inner{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem 1.2rem;text-align:center;gap:.8rem}
.book-deco{font-size:1.8rem;opacity:.7}
.book-title{font-size:1.15rem;line-height:1.25;letter-spacing:.03em}
.book-meta{font-family:'Share Tech Mono',monospace;font-size:.55rem;letter-spacing:.1em;opacity:.5;text-transform:uppercase;position:absolute;bottom:1rem;left:0;right:0;text-align:center}

/* locked overlay */
.book-lock{
  position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;
  background:rgba(0,0,0,.72);backdrop-filter:blur(2px);
  font-family:'Share Tech Mono',monospace;
}
.book-lock-icon{font-size:2rem;opacity:.7}
.book-lock-text{font-size:.6rem;letter-spacing:.15em;color:#a08080;text-transform:uppercase}
.book.holo .book-lock{background:rgba(0,10,20,.8)}
.book.holo .book-lock-icon{color:#ff4060;filter:drop-shadow(0 0 8px rgba(255,40,60,.5))}

/* DM badge on book */
.book-access-badge{
  position:absolute;top:.6rem;right:.6rem;z-index:6;
  font-family:'Share Tech Mono',monospace;font-size:.5rem;letter-spacing:.08em;
  padding:.2rem .45rem;border-radius:4px;text-transform:uppercase;
}
.book-access-badge.open{background:rgba(0,200,100,.2);color:#5ed4a0;border:1px solid rgba(0,200,100,.3)}
.book-access-badge.restricted{background:rgba(200,0,10,.2);color:#ff8088;border:1px solid rgba(200,0,10,.3)}
.book-access-badge.private{background:rgba(180,120,255,.2);color:#c8a0ff;border:1px solid rgba(180,120,255,.35)}
.book.private-book{box-shadow:0 12px 30px rgba(0,0,0,.5),0 0 20px rgba(180,120,255,.12),inset 0 0 30px rgba(0,0,0,.25)}

/* ═══════════ READER MODAL ═══════════ */
.reader-overlay{
  position:fixed;inset:0;z-index:9000;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.9);backdrop-filter:blur(12px);
  opacity:0;pointer-events:none;transition:opacity .4s;padding:2rem;
}
.reader-overlay.open{opacity:1;pointer-events:all}

.reader{
  width:min(1040px,100%);height:min(88vh,840px);
  display:grid;grid-template-rows:auto 1fr auto;
  border-radius:14px;overflow:hidden;position:relative;
  transform:scale(.92);transition:transform .4s cubic-bezier(.2,1,.3,1);
}
.reader-overlay.open .reader{transform:scale(1)}

/* reader main = TOC + body */
.reader-main{display:grid;grid-template-columns:230px 1fr;overflow:hidden;position:relative;z-index:3}
.reader-toc{overflow-y:auto;padding:1rem .8rem;display:flex;flex-direction:column;gap:.25rem}
.reader.paper .reader-toc{background:rgba(160,130,90,.12);border-right:1px solid rgba(120,90,50,.25)}
.reader.holo-reader .reader-toc{background:rgba(0,40,60,.3);border-right:1px solid rgba(0,210,255,.18)}
.reader-toc::-webkit-scrollbar{width:5px}
.reader.paper .reader-toc::-webkit-scrollbar-thumb{background:rgba(120,90,50,.35);border-radius:999px}
.reader.holo-reader .reader-toc::-webkit-scrollbar-thumb{background:rgba(0,210,255,.3);border-radius:999px}
.reader-toc-title{
  font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:.5rem;padding:0 .4rem;
}
.reader.paper .reader-toc-title{font-family:'Share Tech Mono',monospace;color:#7a5a30}
.reader.holo-reader .reader-toc-title{font-family:'Share Tech Mono',monospace;color:var(--aura);opacity:.7}
.toc-item{
  display:flex;gap:.5rem;align-items:baseline;padding:.5rem .6rem;border-radius:7px;cursor:pointer;
  text-align:left;border:1px solid transparent;background:transparent;width:100%;transition:all .12s;font:inherit;
}
.toc-num{font-family:'Share Tech Mono',monospace;font-size:.58rem;opacity:.5;flex-shrink:0;min-width:20px}
.toc-name{font-size:.92rem;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toc-name.untitled{opacity:.4;font-style:italic}
.reader.paper .toc-item{color:#5a4530}
.reader.paper .toc-name{font-family:'Cormorant Garamond',serif;font-weight:500}
.reader.paper .toc-item:hover{background:rgba(120,90,50,.12)}
.reader.paper .toc-item.active{background:rgba(120,90,50,.22);border-color:rgba(120,90,50,.4);color:#3a2c1c}
.reader.holo-reader .toc-item{color:#7aa8c0}
.reader.holo-reader .toc-name{font-family:'Share Tech Mono',monospace;font-size:.82rem}
.reader.holo-reader .toc-item:hover{background:rgba(0,210,255,.08);color:#bfe8f8}
.reader.holo-reader .toc-item.active{background:rgba(0,210,255,.15);border-color:rgba(0,210,255,.35);color:var(--aura)}

.reader-toc-toggle{
  width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:1.1rem;display:none;
  align-items:center;justify-content:center;border:1px solid;margin-right:.6rem;background:transparent;
}
.reader.paper .reader-toc-toggle{border-color:rgba(120,90,50,.3);color:#5a4530}
.reader.holo-reader .reader-toc-toggle{border-color:rgba(0,210,255,.3);color:var(--aura)}

/* paper reader */
.reader.paper{
  background:
    radial-gradient(ellipse at top, rgba(255,250,235,.5), transparent 60%),
    linear-gradient(135deg, #e8dcc0, #d8c8a8);
  border:1px solid #b8a480;
  box-shadow:0 40px 100px rgba(0,0,0,.7), inset 0 0 80px rgba(180,150,100,.2);
}
.reader.paper::before{
  content:'';position:absolute;inset:0;pointer-events:none;opacity:.4;
  background:
    repeating-linear-gradient(90deg, transparent 0 40px, rgba(160,130,90,.02) 40px 41px),
    radial-gradient(circle at 20% 30%, rgba(140,110,70,.08), transparent 25%),
    radial-gradient(circle at 80% 70%, rgba(140,110,70,.1), transparent 25%);
}

/* holo reader */
.reader.holo-reader{
  background:
    linear-gradient(135deg, rgba(0,30,50,.97), rgba(0,8,18,.98)),
    repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,210,255,.03) 2px 3px);
  border:1px solid rgba(0,210,255,.4);
  box-shadow:0 40px 100px rgba(0,0,0,.7), 0 0 60px rgba(0,210,255,.15), inset 0 0 60px rgba(0,210,255,.05);
}
.reader.holo-reader::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg, transparent, rgba(0,210,255,.04), transparent);
  animation:holoScan 4s linear infinite;
}

/* reader header */
.reader-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.2rem 1.6rem;position:relative;z-index:3;
}
.reader.paper .reader-head{border-bottom:1px solid rgba(120,90,50,.3)}
.reader.holo-reader .reader-head{border-bottom:1px solid rgba(0,210,255,.2)}
.reader-book-title{font-size:1.5rem;letter-spacing:.03em}

/* reader page body */

.page-title{font-size:1.6rem;margin-bottom:1.2rem;letter-spacing:.02em}

.reader.holo-reader .page-title{font-family:'Orbitron',sans-serif;color:#fff;font-weight:600;border-bottom:1px solid rgba(0,210,255,.25);padding-bottom:.6rem;text-shadow:0 0 10px rgba(0,210,255,.3)}

.page-text{font-size:1.15rem;line-height:1.85;white-space:pre-wrap}

.page-img{max-width:100%;border-radius:8px;margin:1.2rem 0;display:block}

.page-empty{text-align:center;padding:3rem 1rem;opacity:.5;font-style:italic;font-size:1.1rem}

/* ═══════════ TORN PAPER EFFECT ═══════════ */
/* Applied to .reader-body when page has torn:true */
.page-body-wrap{position:relative}
.page-body-wrap.torn-top::before,
.page-body-wrap.torn-bottom::after,
.page-body-wrap.torn-both::before,
.page-body-wrap.torn-both::after{
  content:'';display:block;width:100%;
  height:28px;position:relative;
  background:var(--page-bg,#f5ede0);
  flex-shrink:0;
}
/* Top tear — jagged SVG mask as background */
.page-body-wrap.torn-top::before,
.page-body-wrap.torn-both::before{
  background:var(--page-bg,#f5ede0);
  clip-path:polygon(
    0% 100%,2% 65%,4% 82%,6% 55%,8% 78%,10% 48%,12% 70%,14% 52%,16% 74%,
    18% 44%,20% 68%,22% 50%,24% 72%,26% 42%,28% 66%,30% 50%,32% 76%,
    34% 46%,36% 68%,38% 52%,40% 74%,42% 44%,44% 70%,46% 48%,48% 72%,
    50% 40%,52% 66%,54% 50%,56% 76%,58% 44%,60% 68%,62% 54%,64% 72%,
    66% 42%,68% 66%,70% 48%,72% 74%,74% 46%,76% 70%,78% 52%,80% 76%,
    82% 44%,84% 68%,86% 50%,88% 74%,90% 42%,92% 68%,94% 54%,96% 72%,98% 48%,100% 66%,
    100% 100%
  );
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.18));
  margin-bottom:-2px;
}
/* Bottom tear */
.page-body-wrap.torn-bottom::after,
.page-body-wrap.torn-both::after{
  background:var(--page-bg,#f5ede0);
  clip-path:polygon(
    0% 0%,100% 0%,
    100% 42%,98% 62%,96% 38%,94% 58%,92% 34%,90% 56%,88% 38%,86% 60%,
    84% 36%,82% 58%,80% 40%,78% 62%,76% 36%,74% 54%,72% 38%,70% 60%,
    68% 34%,66% 58%,64% 38%,62% 60%,60% 32%,58% 56%,56% 38%,54% 58%,
    52% 32%,50% 56%,48% 38%,46% 60%,44% 34%,42% 58%,40% 36%,38% 58%,
    36% 32%,34% 56%,32% 38%,30% 60%,28% 34%,26% 56%,24% 38%,22% 60%,
    20% 34%,18% 58%,16% 36%,14% 58%,12% 32%,10% 56%,8% 38%,6% 60%,4% 36%,2% 58%,0% 38%
  );
  filter:drop-shadow(0 -2px 3px rgba(0,0,0,.18));
  margin-top:-2px;
}
/* Shadow on the content itself between the tears */
.page-body-wrap.torn-top .page-text,
.page-body-wrap.torn-bottom .page-text,
.page-body-wrap.torn-both .page-text,
.page-body-wrap.torn-top .page-title,
.page-body-wrap.torn-bottom .page-title,
.page-body-wrap.torn-both .page-title{
  background:var(--page-bg,#f5ede0);
  box-shadow:2px 0 6px rgba(0,0,0,.1),-2px 0 6px rgba(0,0,0,.1);
}
/* DM torn toggle in page fold */
.torn-toggle-row{display:flex;align-items:center;gap:.5rem;margin-top:.4rem;font-size:.75rem;color:#7a6248}
.torn-toggle-row label{display:flex;align-items:center;gap:.35rem;cursor:pointer;font-family:monospace}

/* ═══════════ PRIVATE NOTEBOOK — ENHANCED ═══════════ */

/* ═══════════ ADD-BOOK DIALOG ═══════════ */

/* ═══════ GRIMM READER — bigger, cinematic threat-terminal ═══════ */
.reader.grimm-reader{
  width:min(1240px,100%);height:min(92vh,960px);
  background:
    radial-gradient(ellipse 60% 30% at 50% 0%, rgba(0,210,255,.12), transparent 60%),
    radial-gradient(ellipse 50% 40% at 100% 100%, rgba(255,40,70,.08), transparent 60%),
    linear-gradient(135deg, rgba(2,20,32,.98), rgba(1,5,11,.99)),
    repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,210,255,.025) 2px 3px);
  border:1px solid rgba(0,210,255,.5);
  box-shadow:0 50px 130px rgba(0,0,0,.75), 0 0 90px rgba(0,210,255,.2), inset 0 0 90px rgba(0,210,255,.05);
}
.reader.grimm-reader::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:6;
  border:1px solid transparent;
  background:
    linear-gradient(90deg,var(--aura),transparent 16%) top left/40px 2px no-repeat,
    linear-gradient(0deg,var(--aura),transparent 16%) top left/2px 40px no-repeat,
    linear-gradient(270deg,var(--aura),transparent 16%) top right/40px 2px no-repeat,
    linear-gradient(180deg,var(--aura),transparent 16%) top right/2px 40px no-repeat,
    linear-gradient(90deg,var(--aura),transparent 16%) bottom left/40px 2px no-repeat,
    linear-gradient(360deg,var(--aura),transparent 16%) bottom left/2px 40px no-repeat,
    linear-gradient(270deg,var(--aura),transparent 16%) bottom right/40px 2px no-repeat,
    linear-gradient(180deg,var(--aura),transparent 16%) bottom right/2px 40px no-repeat;
  opacity:.6;
}
.reader.grimm-reader .reader-head{
  padding:1.4rem 2rem;background:linear-gradient(90deg, rgba(0,210,255,.1), transparent 70%);
  border-bottom:1px solid rgba(0,210,255,.3);position:relative}
.reader.grimm-reader .reader-head::after{content:'';position:absolute;left:2rem;bottom:-1px;width:120px;height:2px;background:linear-gradient(90deg,var(--aura),transparent);box-shadow:0 0 10px var(--aura)}
.reader.grimm-reader .reader-book-title{font-family:'Orbitron',sans-serif;font-size:1.75rem;font-weight:800;letter-spacing:.04em;color:#eaf9ff;text-shadow:0 0 16px rgba(0,210,255,.55)}
.reader.grimm-reader .reader-head::before{
  content:'◈ GRIMM DATABASE · CLASSIFIED';position:absolute;top:.5rem;left:2rem;
  font-family:'Share Tech Mono',monospace;font-size:.56rem;letter-spacing:.22em;color:rgba(255,90,120,.7)}
.reader.grimm-reader .reader-book-title{margin-top:.7rem;display:inline-block}
.reader.grimm-reader .reader-toc{background:rgba(0,30,46,.45);border-right:1px solid rgba(0,210,255,.22);padding:1.4rem 1rem}
.reader.grimm-reader .reader-main{grid-template-columns:280px 1fr}
.reader.grimm-reader .reader-toc-title{font-family:'Share Tech Mono',monospace;color:var(--aura);opacity:.8;font-size:.62rem;letter-spacing:.2em;margin-bottom:.8rem}
.reader.grimm-reader .toc-item{color:#86b6cc;border:1px solid transparent;border-radius:6px;padding:.6rem .7rem;transition:all .15s}

.reader.grimm-reader .toc-item::before{content:'▸ ';color:rgba(0,210,255,.4)}
.reader.grimm-reader .toc-item:hover{background:rgba(0,210,255,.1);color:#d6f3ff;border-color:rgba(0,210,255,.2)}
.reader.grimm-reader .toc-item.active{background:linear-gradient(90deg,rgba(0,210,255,.18),rgba(0,210,255,.04));border-color:rgba(0,210,255,.45);color:var(--aura);box-shadow:inset 2px 0 0 var(--aura)}
.reader.grimm-reader .reader-body{padding:2.6rem 3.4rem;color:#c8ecfa}
.reader.grimm-reader .page-title{font-family:'Orbitron',sans-serif;font-size:2.1rem;font-weight:700;color:#fff;
  border-bottom:1px solid rgba(0,210,255,.3);padding-bottom:.8rem;margin-bottom:1.6rem;letter-spacing:.02em;
  text-shadow:0 0 14px rgba(0,210,255,.4)}
.reader.grimm-reader .page-title::before{content:'THREAT FILE // ';font-family:'Share Tech Mono',monospace;font-size:.7rem;color:rgba(255,90,120,.65);letter-spacing:.18em;display:block;margin-bottom:.4rem;text-shadow:none}
.reader.grimm-reader .page-text{font-family:'Share Tech Mono',monospace;font-size:1.08rem;line-height:2.05;color:#b6e2f4;letter-spacing:.01em}
.reader.grimm-reader .page-img{border:1px solid rgba(0,210,255,.35);border-radius:6px;box-shadow:0 0 28px rgba(0,210,255,.18);margin:1.6rem 0}
.reader.grimm-reader .reader-close{width:42px;height:42px;font-size:1.3rem;background:rgba(0,210,255,.08);border-color:rgba(0,210,255,.35);color:var(--aura)}

.reader.grimm-reader::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:2;
  background:linear-gradient(180deg, transparent, rgba(0,210,255,.045), transparent);
  animation:holoScan 4.5s linear infinite;
}
@media(max-width:760px){

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";

const db  = getFirestore(app);

// ── default books ──
function defaultBooks() {
  return [
    { id:'rowan',   name:"Rowan Rose's Notebook",          style:'notebook', deco:'📓', access:['all'], pages:[] },
    { id:'soul',    name:'Soul-Calming',                   style:'tome',     deco:'📖', access:['all'], pages:[] },
    { id:'intent',  name:'Intent-Carving',                 style:'tome',     deco:'📖', access:['all'], pages:[] },
    { id:'world',   name:'World-Will',                     style:'tome',     deco:'📖', access:['all'], pages:[] },
    { id:'yield',   name:'Yielding',                       style:'tome',     deco:'📖', access:['all'], pages:[] },
    { id:'human',   name:'Scripture of Human Will',        style:'tome',     deco:'📖', access:['all'], pages:[] },
    { id:'void',    name:'Void-Severing',                  style:'tome',     deco:'📖', access:['all'], pages:[] },
    { id:'grimm',   name:'Grimm Studies · By The Grimm Reaper, Peter Port', style:'grimm', deco:'☠', access:['all'], pages:[] },
  ];
}

// players list pulled from campaign doc (for access control)
let players = []; // [{idx, name}]
let library = { books: defaultBooks() };
let dmUnlocked = sessionStorage.getItem('books-dm') === '1';

const $ = id => document.getElementById(id);

function splitNotePages(text){
  if(!text || !text.trim()) return [''];
  const norm = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const parts = norm.split(/^[ \t]*-{3,}[ \t]*$/m).map(s=>s.replace(/^\n+|\n+$/g,''));
  const filtered = parts.filter(p=>p.trim().length>0);
  return filtered.length ? filtered : [''];
}
const esc = s => String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

// Safe rich-text: escapes first, then applies a small, injection-proof markup set.
// Block: # / ## / ###  headers, > quote, --- divider, • or - bullet list.
// Inline: **bold**  *italic*  __underline__  ~~strike~~  `code`
function renderRichText(raw){
  const lines = String(raw||'').split('\n');
  const inline = (t)=>{
    t = esc(t);
    // code first (so its contents aren't re-formatted)
    t = t.replace(/`([^`]+)`/g, (m,x)=>`<code class="rt-code">${x}</code>`);
    t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/__([^_]+)__/g, '<u>$1</u>');
    t = t.replace(/~~([^~]+)~~/g, '<s>$1</s>');
    // italic: single * not adjacent to another * (avoid clashing with bold)
    t = t.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
    return t;
  };
  let html='', listOpen=false;
  const closeList=()=>{ if(listOpen){ html+='</ul>'; listOpen=false; } };
  for(let ln of lines){
    const t = ln.trimEnd();
    if(/^\s*(-{3,}|_{3,}|\*{3,})\s*$/.test(t)){ closeList(); html+='<hr class="rt-hr">'; continue; }
    let m;
    if((m=t.match(/^###\s+(.*)$/))){ closeList(); html+=`<h3 class="rt-h3">${inline(m[1])}</h3>`; }
    else if((m=t.match(/^##\s+(.*)$/))){ closeList(); html+=`<h2 class="rt-h2">${inline(m[1])}</h2>`; }
    else if((m=t.match(/^#\s+(.*)$/))){ closeList(); html+=`<h1 class="rt-h1">${inline(m[1])}</h1>`; }
    else if((m=t.match(/^>\s+(.*)$/))){ closeList(); html+=`<blockquote class="rt-quote">${inline(m[1])}</blockquote>`; }
    else if((m=t.match(/^\s*[-•*]\s+(.*)$/))){ if(!listOpen){ html+='<ul class="rt-list">'; listOpen=true; } html+=`<li>${inline(m[1])}</li>`; }
    else if(t===''){ closeList(); html+='<div class="rt-gap"></div>'; }
    else { closeList(); html+=`<p class="rt-p">${inline(t)}</p>`; }
  }
  closeList();
  return html;
}

// ── load players from campaign ──
async function loadPlayers() {
  try {
    const snap = await getDoc(doc(db,'campaigns','rwby-campaign'));
    if (snap.exists()) {
      const data = JSON.parse(snap.data().data);
      players = (data.characters||[])
        .map((c,idx)=>({idx, name:c.name||`Player ${idx+1}`, active:c.state==='active'}))
        .filter(p=>p.active);
    }
  } catch(e) { console.warn('Could not load players', e); }
}

// ── library sync ──
let _isEditing = false;       // true while DM is actively typing
let _pendingRemoteRender = false;
async function pushLibrary() {
  try { await setDoc(BOOKS_DOC, { data: JSON.stringify(library) }); }
  catch(e){ console.error('pushLibrary', e); }
}
function mergeLibrary(saved){
  // The book DEFINITIONS (name, deco, style, order) always come from defaultBooks()
  // in code. Only the per-book pages and access come from Firebase. This way,
  // editing names/decos/styles in defaultBooks() takes effect even after a save.
  const defs = defaultBooks();
  const savedById = {};
  (saved?.books || []).forEach(b => { savedById[b.id] = b; });
  return {
    books: defs.map(def => {
      const s = savedById[def.id];
      return {
        ...def,
        pages:  s?.pages  || def.pages  || [],
        access: s?.access || def.access || ['all'],
      };
    })
  };
}

function startLibraryListener() {
  onSnapshot(BOOKS_DOC, snap => {
    if (snap.exists()) {
      try {
        const parsed = JSON.parse(snap.data().data);
        if (parsed.books) {
          if (_isEditing) { _pendingRemoteRender = true; return; }
          library = mergeLibrary(parsed);
        }
      } catch(e){}
    } else {
      library = { books: defaultBooks() };
    }
    renderShelf();
    if (dmUnlocked && !_isEditing) { renderBookList(); renderWorkspace(); }
  }, ()=>{});
}

// which "player slot" am I? Books page doesn't claim characters,
// so a player sees books open to 'all' OR to any active character.
// (Access is enforced by the DM via the 'all' flag or per-character.)
// For simplicity: a non-DM viewer can open a book if access includes 'all'
// or if access includes ANY player index (DM decides per book who can see).
// Real per-player gating happens because each player knows which character is theirs;
// here we treat 'all' as open and specific lists as restricted-to-those-named.
let myCharIdx = (()=>{ const v = localStorage.getItem('rwby-my-idx'); return v!==null?Number(v):null; })();
const MY_PID = localStorage.getItem('rwby-pid'); // this browser's identity

// Personal private notes book (only this browser can load it)
let _privateBook = null;
async function loadPrivateNotes() {
  if (!MY_PID) return;
  let text = '';
  let bookName = 'My Notes';
  try {
    const snap = await getDoc(doc(db, 'rwby-private', MY_PID));
    if (snap.exists()) {
      const d = snap.data();
      text = d.text || '';
      bookName = d.bookName || 'My Notes';
    }
  } catch(e){ console.warn('loadPrivateNotes', e); }
  // Always create the private book so it can be edited even when empty.
  const chunks = splitNotePages(text);
  _privateBook = {
    id:'__private_notes__',
    name: bookName,
    style:'notebook',
    deco:'🔖',
    private:true,
    access:['__me__'],
    pages: chunks.map((t,i)=>({ id:'pn-'+i, title: i===0?'Notes':`Notes (cont. ${i+1})`, text:t.trim(), image:'' }))
  };
}

function canAccess(book) {
  if (book.private) return true; // your own private book — always readable by you
  if (dmUnlocked) return true;
  if (!book.access || book.access.includes('all')) return true;
  if (book.access.length === 0) return false; // locked to nobody
  if (myCharIdx !== null && book.access.includes(myCharIdx)) return true;
  return false;
}

        <div class="grimm-rail right"><span></span><span></span><span></span></div>
        <div class="book-inner">
          <div class="grimm-topbar">
            <span class="gt-l">◈ GRIMM DATABASE</span>
            <span class="gt-c">REMNANT BESTIARY ARCHIVE</span>
            <span class="gt-id">CLASSIFIED // VYTAL</span>
          </div>
          <div class="grimm-center">
            <div class="grimm-sigil-wrap"><span class="grimm-ring"></span><span class="grimm-ring r2"></span><div class="grimm-sigil">${book.deco}</div></div>
            <div class="book-title" data-text="${esc(mainTitle)}">${esc(mainTitle)}</div>
            ${byline ? `<div class="grimm-byline">${esc(byline.replace(/^By\s+/i,'Compiled by '))}</div>` : ''}
            <div class="grimm-tags"><span>BEOWOLF</span><span>URSA</span><span>NEVERMORE</span><span>GOLIATH</span><span class="more">+${Math.max(0,entryCount)} FILES</span></div>
          </div>
          <div class="grimm-botbar">
            <span class="grimm-status">ARCHIVE LINKED</span>
            <span class="grimm-ticker"><span class="gtk">SCANNING REMNANT</span></span>
            <span class="grimm-count">${entryCount} ENTR${entryCount===1?'Y':'IES'} · OPEN ▸</span>
          </div>
        </div>

    } else {
      el.innerHTML = `
        ${book.private ? `<div class="book-access-badge private">🔒 Private</div>` : (dmUnlocked ? `<div class="book-access-badge ${restricted?'restricted':'open'}">${restricted?'Restricted':'Open'}</div>` : '')}
        <div class="book-inner">
          <div class="book-deco">${book.deco}</div>
          <div class="book-title">${esc(book.name)}</div>
          <div class="book-meta">${book.pages.length} page${book.pages.length===1?'':'s'}</div>
        </div>

// ════════════ READER ════════════
let _readerBook = null;
let _readerPage = 0;
let _privateMode = 'edit';
function openReader(book) {
  _readerBook = book; _readerPage = 0;
  _privateMode = 'edit';
  const reader = $('reader');
  reader.className = `reader ${(book.style==='holo'||book.style==='grimm')?'holo-reader':'paper'}${book.style==='grimm'?' grimm-reader':''}`;
  $('readerTitle').textContent = book.name;
  renderReaderToc();
  renderReaderPage();
  $('readerOverlay').classList.add('open');
}
function renderReaderToc() {
  const book = _readerBook; if(!book) return;
  const toc = $('readerToc');
  if (!book.pages.length) { toc.innerHTML = '<div class="reader-toc-title">No entries</div>'; return; }
  toc.innerHTML = `<div class="reader-toc-title">Contents · ${book.pages.length}</div>` +
    book.pages.map((pg,i)=>`
      <button class="toc-item ${i===_readerPage?'active':''}" data-toc="${i}">
        <span class="toc-num">${i+1}</span>
        <span class="toc-name ${pg.title?'':'untitled'}">${pg.title?esc(pg.title):'Untitled'}</span>
      </button>`).join('');
  toc.querySelectorAll('[data-toc]').forEach(b=>{
    b.addEventListener('click',()=>{ _readerPage=Number(b.dataset.toc); renderReaderPage(); $('reader').classList.remove('toc-open'); });
  });
}
function renderReaderPage() {
  const book = _readerBook; if(!book) return;
  const body = $('readerBody');
  const isPrivate = !!book.private;

  if (!book.pages.length && !isPrivate) {
    body.innerHTML = `<div class="page-empty">These pages are blank…</div>`;
    $('pageDots').innerHTML=''; $('prevPage').disabled=true; $('nextPage').disabled=true;
    return;
  }

  if (isPrivate && _privateMode === 'edit') {
    const fullText = book.pages.map(p=>p.text).join('\n\n---\n\n');
    body.innerHTML = `
      <div class="notes-edit-head">
        <span class="notes-edit-title">✎ My Personal Notes</span>
        <span class="notes-edit-toolbar">
          <span class="notes-save-status" id="notesSaveStatus">Editable</span>
          <button class="notes-mode-btn" id="notesReadBtn">📖 Read as pages</button>
        </span>
      </div>
      <div class="notes-security-bar">Stored in your private player vault · Encrypted to your device ID · Nobody else can open this</div>
      <textarea id="privateNotesEditor" class="private-notes-editor" placeholder="Write anything here… your private notes, theories, secrets. Use a line with just --- to split into pages.">${esc(fullText)}</textarea>
      <div class="notes-edit-hint">Tip: type a line containing only <code>---</code> on its own to break your notes into separate pages, then hit <strong>Read as pages</strong> to flip through them.</div>`;
    const ta = $('privateNotesEditor');
    ta.addEventListener('input', () => schedulePrivateSave(ta.value));
    $('notesReadBtn').addEventListener('click', ()=>{
      flushPrivateSave(ta.value);
      _privateMode = 'read'; _readerPage = 0; renderReaderPage();
    });
    $('pageDots').innerHTML=''; $('prevPage').disabled=true; $('nextPage').disabled=true;
    $('readerToc').innerHTML = `<div class="reader-toc-title">Personal Notes</div><div class="toc-item active"><span class="toc-num">✎</span><span class="toc-name">Editing</span></div>`;
    return;
  }

  _readerPage = Math.max(0, Math.min(_readerPage, book.pages.length-1));
  const page = book.pages[_readerPage];
  const tornClass = page.torn === 'top' ? 'torn-top' : page.torn === 'bottom' ? 'torn-bottom' : page.torn === 'both' ? 'torn-both' : '';
  body.innerHTML = `
    ${isPrivate ? `<div class="notes-read-bar"><span class="notes-read-label">📖 My Personal Notes · page ${_readerPage+1} of ${book.pages.length}</span><button class="notes-mode-btn" id="notesEditBtn">✎ Edit</button></div>` : ''}
    <div class="page-body-wrap ${tornClass}">
      ${page.title ? `<div class="page-title">${esc(page.title)}</div>` : ''}
      ${page.image ? `<img src="${page.image}" class="page-img" onerror="this.style.display='none'">` : ''}
      <div class="page-text rt-content">${renderRichText(page.text||'')}</div>
    </div>`;
  body.scrollTop = 0;
  if (isPrivate) $('notesEditBtn')?.addEventListener('click', ()=>{ _privateMode='edit'; renderReaderPage(); });
  $('pageDots').innerHTML = book.pages.map((_,i)=>
    `<button class="page-dot ${i===_readerPage?'active':''}" data-i="${i}"></button>`).join('');
  $('pageDots').querySelectorAll('.page-dot').forEach(d=>
    d.addEventListener('click',()=>{ _readerPage=Number(d.dataset.i); renderReaderPage(); }));
  $('prevPage').disabled = _readerPage===0;
  $('nextPage').disabled = _readerPage===book.pages.length-1;
  if (isPrivate) {
    $('readerToc').innerHTML = `<div class="reader-toc-title">Personal Notes</div>` + book.pages.map((p,i)=>
      `<button class="toc-item ${i===_readerPage?'active':''}" data-toc="${i}"><span class="toc-num">${i+1}</span><span class="toc-name">${esc(p.title||('Page '+(i+1)))}</span></button>`).join('');
    $('readerToc').querySelectorAll('[data-toc]').forEach(b=>
      b.addEventListener('click',()=>{ _readerPage=Number(b.dataset.toc); renderReaderPage(); $('reader').classList.remove('toc-open'); }));
  } else {
    $('readerToc').querySelectorAll('[data-toc]').forEach(b=>
      b.classList.toggle('active', Number(b.dataset.toc)===_readerPage));
  }
}

// Save private notes back to Firestore (debounced)
let _privateSaveTimer = null;
function schedulePrivateSave(text) {
  const st = $('notesSaveStatus');
  if (st) { st.textContent = '✎ Unsaved…'; st.style.color = '#e0a830'; }
  clearTimeout(_privateSaveTimer);
  _privateSaveTimer = setTimeout(() => savePrivateNotes(text), 1000);
}
function flushPrivateSave(text) {
  clearTimeout(_privateSaveTimer);
  const chunks = splitNotePages(text);
  if (_privateBook) _privateBook.pages = chunks.map((t,i)=>({ id:'pn-'+i, title: i===0?'Notes':`Notes (cont. ${i+1})`, text:t.trim(), image:'' }));
  savePrivateNotes(text);
}
async function savePrivateNotes(text) {
  if (!MY_PID) return;
  try {
    const charName = (_privateBook?.name || 'My Notes').replace(/ · Notes$/,'');
    await setDoc(doc(db, 'rwby-private', MY_PID), {
      owner: MY_PID,
      bookName: _privateBook?.name || 'My Notes',
      character: charName,
      text: text,
      updated: Date.now()
    });
    // rebuild local pages so the shelf reflects new splits
    const chunks = splitNotePages(text);
    if (_privateBook) _privateBook.pages = chunks.map((t,i)=>({ id:'pn-'+i, title: i===0?'Notes':`Notes (cont. ${i+1})`, text:t.trim(), image:'' }));
    const st = $('notesSaveStatus');
    if (st) { st.textContent = '✓ Saved'; st.style.color = '#5ed4a0'; }
    renderShelf();
  } catch(e) {
    console.error('savePrivateNotes', e);
    const st = $('notesSaveStatus');
    if (st) { st.textContent = '⚠ Save failed'; st.style.color = '#ff8088'; }
  }
}

$('nextPage').addEventListener('click',()=>{ _readerPage++; renderReaderPage(); });

// Sidebar list of books
function renderBookList(){
  const list = $('dmBookList'); if(!list) return;

// Main workspace for the selected book
function renderWorkspace(){
  const ws = $('dmWorkspace'); if(!ws) return;
  const book = library.books[_selectedBook];
  if (!book){ ws.innerHTML = '<div class="ws-empty">Select a book.</div>'; return; }
  const isAll = !book.access || book.access.includes('all');

  ws.innerHTML = `
    <div class="ws-head">
      <div class="ws-title"><span class="wsdeco">${book.deco}</span><input class="ws-name-input" id="wsBookName" value="${esc(book.name)}" placeholder="Book title…"></div>
      <div style="display:flex;gap:.4rem">
        <button class="btn small ghost" id="wsDeleteBook" title="Delete this book" style="color:#ff8088;border-color:rgba(255,80,80,.3)">🗑 Delete</button>
        <button class="btn small" id="wsAddPage">+ Page</button>
      </div>
    </div>

    <div class="access-section">
      <div class="access-title">Who can open this book?</div>
      <div class="access-grid">
        <label class="access-pill everyone"><input type="checkbox" id="wsAccessAll" ${isAll?'checked':''}> ✦ Everyone</label>
        ${players.map(p=>`<label class="access-pill"><input type="checkbox" class="ws-access-cb" data-idx="${p.idx}" ${(!isAll && book.access.includes(p.idx))?'checked':''} ${isAll?'disabled':''}> ${esc(p.name)}</label>`).join('') || '<div class="dm-empty" style="grid-column:1/-1">No active players found</div>'}
      </div>

    <div class="ws-pages-head">
      <div class="ws-pages-title">Pages (${book.pages.length})</div>
    </div>
    <div id="wsPages"></div>
  `;

  // rename book
  $('wsBookName')?.addEventListener('input', e=>{
    book.name = e.target.value || book.name;
    pushLibrary(); renderBookList();
  });
  // delete book
  $('wsDeleteBook')?.addEventListener('click',()=>{
    if(!confirm(`Delete "${book.name}" and all its pages? This cannot be undone.`)) return;
    library.books.splice(_selectedBook, 1);
    _selectedBook = Math.max(0, _selectedBook - 1);
    pushLibrary(); renderBookList(); renderWorkspace();
  });
  // add page
  $('wsAccessAll').addEventListener('change', e=>{
    book.access = e.target.checked ? ['all'] : [];

  ws.querySelectorAll('.ws-access-cb').forEach(cb=>{
    cb.addEventListener('change',()=>{

  });

  renderPageFolds();
}

          <textarea data-f="text" data-pi="${pi}" placeholder="Write the page… select text and use the buttons above, or type **bold**, *italic*, __underline__, # Header">${esc(pg.text)}</textarea>
        </div>
        <div class="dm-field"><label>Image URL (optional)</label><input type="text" data-f="image" data-pi="${pi}" value="${esc(pg.image)}" placeholder="https://…"></div>
        <div style="display:flex;gap:.5rem;margin-top:.5rem">
          <button class="btn ghost small" data-movepage="up" data-pi="${pi}" ${pi===0?'disabled':''}>↑ Move Up</button>
          <button class="btn ghost small" data-movepage="down" data-pi="${pi}" ${pi===book.pages.length-1?'disabled':''}>↓ Move Down</button>
          <button class="btn red small" data-delpage="${pi}" style="margin-left:auto">Delete Page</button>
        </div>
      </div>`;
    cont.appendChild(fold);
  });

  // fold toggles
  cont.querySelectorAll('[data-foldhead]').forEach(h=>{
    h.addEventListener('click',()=>{
      const pi = Number(h.dataset.foldhead);
      _openPage = (_openPage === pi) ? null : pi;
      renderPageFolds();
    });
  });

  // field edits
  cont.querySelectorAll('[data-f]').forEach(inp=>{
    inp.addEventListener('focus', ()=>{ _isEditing = true; });
    inp.addEventListener('blur',  ()=>{
      _isEditing = false;
      if (_pendingRemoteRender){ _pendingRemoteRender = false; renderShelf(); }
      // refresh the fold title text if title changed
      if (inp.dataset.f === 'title'){
        const head = inp.closest('.page-fold')?.querySelector('.pf-title');
        if (head){ head.textContent = inp.value || 'Untitled page'; head.classList.toggle('untitled', !inp.value); }
      }
    });
    inp.addEventListener('input',()=>{
      const pi = Number(inp.dataset.pi), f = inp.dataset.f;
      book.pages[pi][f] = inp.value;
      schedulePush();
    });
  });

  // torn paper toggle
  cont.querySelectorAll('[data-tornsel]').forEach(sel=>{
    sel.addEventListener('change',()=>{
      const pi=Number(sel.dataset.pi);
      book.pages[pi].torn = sel.value || '';
      pushLibrary();
    });
  });

  // rich-text toolbar
  cont.querySelectorAll('[data-rttoolbar]').forEach(bar=>{
    const pi = Number(bar.dataset.rttoolbar);
    const ta = bar.parentElement.querySelector('textarea[data-f="text"]');
    if(!ta) return;
    const apply=(type)=>{
      const s=ta.selectionStart, e=ta.selectionEnd, v=ta.value;
      const sel=v.slice(s,e);
      const inlineWrap=(pre,post,placeholder)=>{
        const inner = sel || placeholder;
        const out = pre+inner+post;
        ta.value = v.slice(0,s)+out+v.slice(e);
        const caret = s+pre.length;
        ta.setSelectionRange(caret, caret+inner.length);
      };
      const linePrefix=(prefix)=>{
        // find start of the first selected line
        let ls=v.lastIndexOf('\n',s-1)+1;
        // strip an existing header/bullet/quote prefix on that line, then add
        let le=v.indexOf('\n',ls); if(le<0) le=v.length;
        let lineText=v.slice(ls,le).replace(/^(#{1,3}\s+|>\s+|[-•]\s+)/,'');
        const newLine=prefix+lineText;
        ta.value=v.slice(0,ls)+newLine+v.slice(le);
        const caret=ls+newLine.length;
        ta.setSelectionRange(caret,caret);
      };
      switch(type){
        case 'bold': inlineWrap('**','**','bold text'); break;
        case 'italic': inlineWrap('*','*','italic text'); break;
        case 'underline': inlineWrap('__','__','underlined'); break;
        case 'strike': inlineWrap('~~','~~','struck'); break;
        case 'code': inlineWrap('`','`','code'); break;
        case 'h1': linePrefix('# '); break;
        case 'h2': linePrefix('## '); break;
        case 'h3': linePrefix('### '); break;
        case 'bullet': linePrefix('- '); break;
        case 'quote': linePrefix('> '); break;
        case 'hr': { const s2=ta.selectionStart; const needNL = s2>0 && ta.value[s2-1]!=='\n'; const ins=(needNL?'\n':'')+'---\n'; ta.value=ta.value.slice(0,s2)+ins+ta.value.slice(s2); const c=s2+ins.length; ta.setSelectionRange(c,c); break; }
      }
      book.pages[pi].text = ta.value;
      ta.focus();
      schedulePush();
    };
    bar.querySelectorAll('[data-rt]').forEach(btn=>{
      btn.addEventListener('mousedown',e=>e.preventDefault()); // keep textarea selection
      btn.addEventListener('click',()=>apply(btn.dataset.rt));
    });
    // keyboard shortcuts inside the textarea
    ta.addEventListener('keydown',e=>{
      if(e.ctrlKey||e.metaKey){
        const k=e.key.toLowerCase();
        if(k==='b'){ e.preventDefault(); apply('bold'); }
        else if(k==='i'){ e.preventDefault(); apply('italic'); }
        else if(k==='u'){ e.preventDefault(); apply('underline'); }
      }
    });
  });

  // delete
  cont.querySelectorAll('[data-delpage]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const pi = Number(btn.dataset.delpage);
      if (!confirm('Delete this page?')) return;
      book.pages.splice(pi,1);
      _openPage = null;
      pushLibrary(); renderBookList(); renderPageFolds();
      // update count
      const t = $('.ws-pages-title'); 
      const titleEl = document.querySelector('.ws-pages-title');
      if (titleEl) titleEl.textContent = `Pages (${book.pages.length})`;
    });
  });

  // reorder
  cont.querySelectorAll('[data-movepage]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const pi = Number(btn.dataset.pi);
      const dir = btn.dataset.movepage;
      const swap = dir==='up' ? pi-1 : pi+1;
      if (swap < 0 || swap >= book.pages.length) return;
      [book.pages[pi], book.pages[swap]] = [book.pages[swap], book.pages[pi]];
      _openPage = swap;
      pushLibrary(); renderPageFolds();
    });
  });
}

let _pushTimer=null;
function schedulePush(){
  clearTimeout(_pushTimer);
  showSaveStatus('typing');
  _pushTimer=setTimeout(async ()=>{ await pushLibrary(); showSaveStatus('saved'); }, 1200);
}
function showSaveStatus(state){
  let el = document.getElementById('saveStatus');
  if (!el) {
    el = document.createElement('div');
    el.id = 'saveStatus';
    el.style.cssText = 'position:fixed;bottom:1rem;right:1rem;z-index:9999;font-family:"Share Tech Mono",monospace;font-size:.62rem;letter-spacing:.1em;padding:.5rem .9rem;border-radius:8px;text-transform:uppercase;transition:opacity .3s;pointer-events:none';
    document.body.appendChild(el);
  }
  if (state==='typing'){ el.textContent='✎ Unsaved…'; el.style.background='rgba(60,40,10,.9)'; el.style.color='#e0a830'; el.style.border='1px solid rgba(200,140,40,.4)'; el.style.opacity='1'; }
  else { el.textContent='✓ Saved'; el.style.background='rgba(0,40,20,.9)'; el.style.color='#5ed4a0'; el.style.border='1px solid rgba(0,200,100,.4)'; el.style.opacity='1'; clearTimeout(el._t); el._t=setTimeout(()=>el.style.opacity='0',1500); }
}

// ════════════ INIT ════════════
updateDmDot();
loadPlayers().then(()=>{
  startLibraryListener();
});
loadPrivateNotes().then(()=> renderShelf());
</script>
