<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Library · RWBY DnD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800;900&family=Share+Tech+Mono&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --aura:#00d4ff;
  --aura-glow:rgba(0,212,255,.4);
  --red:#c0000a;
  --bg:#020106;
  --paper:#e8dcc0;
  --paper-dark:#d4c4a0;
  --ink:#2a2018;
  --ink-soft:#4a3c2c;
  --leather:#5a3420;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'EB Garamond',serif;
  background:
    radial-gradient(ellipse 100% 50% at 50% 0%, rgba(0,80,140,.12), transparent),
    radial-gradient(ellipse 80% 60% at 0% 100%, rgba(140,0,8,.15), transparent),
    radial-gradient(ellipse 60% 60% at 100% 100%, rgba(0,30,80,.2), transparent),
    #020106;
  color:#c4d8f4;
  min-height:100vh;
  overflow-x:hidden;
}

/* scanlines */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9997;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.06) 0,rgba(0,0,0,.06) 1px,transparent 1px,transparent 4px);
}

/* ─── TOP BAR ─── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.1rem 1.6rem;
  background:linear-gradient(90deg,rgba(8,4,14,.96),rgba(4,2,10,.96));
  border-bottom:1px solid rgba(0,210,255,.12);
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(10px);
}
.topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--aura),rgba(200,0,10,.4),var(--aura),transparent);
  opacity:.5;
}
.brand{display:flex;flex-direction:column;gap:.1rem}
.brand-title{
  font-family:'Orbitron',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:.08em;
  background:linear-gradient(135deg,#fff,var(--aura));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.brand-sub{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.25em;color:var(--aura);opacity:.6;text-transform:uppercase}
.top-actions{display:flex;gap:.7rem;align-items:center}

.btn{
  font-family:'Share Tech Mono',monospace;font-size:.68rem;letter-spacing:.1em;
  padding:.6rem 1rem;border-radius:8px;cursor:pointer;text-transform:uppercase;
  background:rgba(0,210,255,.06);border:1px solid rgba(0,210,255,.2);color:var(--aura);
  transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;
}
.btn:hover{background:rgba(0,210,255,.14);border-color:rgba(0,210,255,.5);transform:translateY(-1px)}
.btn.ghost{background:transparent;border-color:rgba(255,255,255,.12);color:#8aa0c0}
.btn.ghost:hover{border-color:rgba(255,255,255,.3);color:#c4d8f4}
.btn.red{background:rgba(140,0,8,.35);border-color:rgba(200,0,10,.4);color:#ff8088}
.btn.red:hover{background:rgba(140,0,8,.5);border-color:rgba(200,0,10,.7);color:#fff}
.btn.small{padding:.4rem .7rem;font-size:.6rem}

/* ─── DM dot ─── */
.dm-status{display:flex;align-items:center;gap:.4rem;font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.1em;color:#607080;text-transform:uppercase}
.dm-dot{width:8px;height:8px;border-radius:50%;background:#405060;transition:all .2s}
.dm-dot.on{background:#ff4060;box-shadow:0 0 8px rgba(255,40,60,.6)}

/* ─── SHELF ─── */
.shelf-intro{text-align:center;padding:2.5rem 1.5rem 1rem}
.shelf-intro h1{
  font-family:'Cinzel',serif;font-size:2rem;font-weight:700;letter-spacing:.06em;
  color:#e8dcc0;margin-bottom:.4rem;
  text-shadow:0 0 30px rgba(232,220,192,.15);
}
.shelf-intro p{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:#8090a0;font-style:italic}

.shelf{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:1.8rem;max-width:1200px;margin:0 auto;padding:2rem 1.5rem 4rem;
}

/* ─── BOOK SPINE / COVER ─── */
.book{
  position:relative;height:300px;border-radius:6px 10px 10px 6px;cursor:pointer;
  transition:transform .3s cubic-bezier(.2,1,.3,1),box-shadow .3s;
  overflow:hidden;
}
.book:hover{transform:translateY(-8px) rotateY(-4deg)}
.book.locked{cursor:not-allowed}

/* leather/paper book */
.book.tome{
  background:
    linear-gradient(90deg, rgba(0,0,0,.3) 0%, transparent 8%, transparent 92%, rgba(0,0,0,.25) 100%),
    linear-gradient(135deg, #6a3a22, #4a2414);
  border:1px solid #3a1c0e;
  box-shadow:0 12px 30px rgba(0,0,0,.5), inset 0 0 30px rgba(0,0,0,.3);
}
.book.tome::before{
  content:'';position:absolute;left:14px;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.4),transparent);
  z-index:3;
}
/* the page block: real paper edges showing along the fore-edge */
.book.tome::after{
  content:'';position:absolute;right:0;top:5px;bottom:5px;width:7px;z-index:2;
  border-radius:0 3px 3px 0;
  background:
    repeating-linear-gradient(0deg,
      #e8dcc0 0 1px, #cdbb96 1px 2px, #ded0ad 2px 3px);
  box-shadow:inset 2px 0 5px rgba(0,0,0,.5), 1px 0 2px rgba(0,0,0,.35);
}
/* leather grain on the cover */
.book.tome{
  background-image:
    repeating-linear-gradient(41deg, rgba(0,0,0,.05) 0 1px, transparent 1px 4px),
    repeating-linear-gradient(-37deg, rgba(255,255,255,.03) 0 1px, transparent 1px 5px),
    linear-gradient(90deg, rgba(0,0,0,.3) 0%, transparent 8%, transparent 92%, rgba(0,0,0,.25) 100%),
    linear-gradient(135deg, #6a3a22, #4a2414);
}
.book.tome .book-title{font-family:'Cinzel',serif;color:#e8d4a8;text-shadow:0 1px 2px rgba(0,0,0,.6)}
.book.tome .book-deco{color:rgba(232,212,168,.5)}

/* notebook variant — lighter, worn */
.book.notebook{
  background:
    linear-gradient(90deg, rgba(0,0,0,.25) 0%, transparent 8%, transparent 92%, rgba(0,0,0,.2) 100%),
    linear-gradient(135deg, #8a6a3a, #6a4a26);
  border:1px solid #4a3018;
  box-shadow:0 12px 30px rgba(0,0,0,.5), inset 0 0 30px rgba(0,0,0,.25);
}
.book.notebook .book-title{font-family:'Cormorant Garamond',serif;font-weight:600;color:#f0e0c0;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.book.notebook .book-deco{color:rgba(240,224,192,.5)}

/* grimm/holo variant — cyberpunk */
.book.holo{
  background:
    linear-gradient(135deg, rgba(0,40,60,.9), rgba(0,10,20,.95)),
    repeating-linear-gradient(0deg, transparent 0 3px, rgba(0,210,255,.04) 3px 4px);
  border:1px solid rgba(0,210,255,.4);
  box-shadow:0 12px 30px rgba(0,0,0,.5), 0 0 24px rgba(0,210,255,.15), inset 0 0 30px rgba(0,210,255,.06);
}
.book.holo::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg, transparent, rgba(0,210,255,.06), transparent);
  animation:holoScan 3s linear infinite;
}
@keyframes holoScan{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
.book.holo .book-title{font-family:'Orbitron',sans-serif;font-weight:700;color:var(--aura);text-shadow:0 0 12px rgba(0,210,255,.6)}
.book.holo .book-deco{color:rgba(0,210,255,.6)}

/* ═══════ GRIMM STUDIES — bestiary threat-terminal (enhanced) ═══════ */
.book.grimm{
  grid-column:1 / -1;            /* span the whole shelf width — it's the centerpiece */
  height:380px;border-radius:4px;overflow:hidden;
  background:
    radial-gradient(ellipse 70% 50% at 50% -5%, rgba(0,210,255,.16), transparent 62%),
    radial-gradient(ellipse 65% 65% at 100% 105%, rgba(255,40,70,.12), transparent 58%),
    radial-gradient(ellipse 50% 60% at 0% 100%, rgba(0,210,255,.08), transparent 55%),
    linear-gradient(135deg, rgba(2,18,30,.97), rgba(0,5,11,.99)),
    repeating-linear-gradient(0deg, transparent 0 3px, rgba(0,210,255,.045) 3px 4px);
  border:1px solid rgba(0,210,255,.5);
  box-shadow:0 24px 70px rgba(0,0,0,.65), 0 0 70px rgba(0,210,255,.2), inset 0 0 90px rgba(0,210,255,.05), inset 0 0 0 1px rgba(0,210,255,.1);
}
/* hex-grid threat texture */
.grimm-hexbg{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.5;
  background-image:
    radial-gradient(circle at 50% 50%, rgba(0,210,255,.05) 1px, transparent 1.5px),
    repeating-linear-gradient(60deg, rgba(0,210,255,.035) 0 1px, transparent 1px 26px),
    repeating-linear-gradient(-60deg, rgba(0,210,255,.035) 0 1px, transparent 1px 26px);
  background-size:30px 30px, auto, auto;
  mask:radial-gradient(ellipse 90% 80% at 50% 50%, #000, transparent 85%);}
/* sweeping vertical scan beam */
.grimm-beam{position:absolute;top:0;bottom:0;width:140px;z-index:2;pointer-events:none;
  background:linear-gradient(90deg, transparent, rgba(0,210,255,.12), rgba(120,240,255,.18), rgba(0,210,255,.12), transparent);
  filter:blur(2px);animation:grimmBeam 5.5s ease-in-out infinite}
@keyframes grimmBeam{0%{left:-160px;opacity:0}12%{opacity:1}50%{left:calc(100% + 20px);opacity:1}60%{opacity:0}100%{left:calc(100% + 20px);opacity:0}}
.grimm-vignette{position:absolute;inset:0;z-index:2;pointer-events:none;
  box-shadow:inset 0 0 120px rgba(0,0,0,.55);
  background:linear-gradient(180deg, rgba(0,0,0,.15), transparent 20%, transparent 80%, rgba(0,0,0,.25))}
.book.grimm::before{
  content:'';position:absolute;inset:10px;pointer-events:none;z-index:3;
  border:1px solid rgba(0,210,255,.22);border-radius:2px;
}
.book.grimm::after{
  content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:linear-gradient(180deg, transparent, rgba(0,210,255,.06), transparent);
  animation:holoScan 3.5s linear infinite;
}
/* side data rails (tick marks) */
.grimm-rail{position:absolute;top:46px;bottom:46px;width:3px;z-index:4;display:flex;flex-direction:column;justify-content:space-between}
.grimm-rail.left{left:26px}.grimm-rail.right{right:26px}
.grimm-rail span{display:block;width:100%;height:18px;background:linear-gradient(180deg,var(--aura),transparent);opacity:.4;border-radius:2px;animation:railPulse 2.6s ease-in-out infinite}
.grimm-rail span:nth-child(2){animation-delay:.5s}.grimm-rail span:nth-child(3){animation-delay:1s}
@keyframes railPulse{0%,100%{opacity:.25}50%{opacity:.7}}
.book.grimm .book-inner{justify-content:space-between;padding:2.2rem 3.4rem;align-items:stretch;text-align:left;position:relative;z-index:5}
.grimm-topbar{display:flex;align-items:center;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.24em;color:rgba(0,210,255,.7);text-transform:uppercase}
.grimm-topbar .gt-c{color:rgba(120,180,210,.5);letter-spacing:.3em}
.grimm-topbar .gt-id{color:rgba(255,70,100,.85);position:relative;padding-left:.9rem}
.grimm-topbar .gt-id::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:7px;height:7px;border-radius:50%;background:#ff4060;box-shadow:0 0 8px #ff4060;animation:grimmPulse 1.4s ease-in-out infinite}
.grimm-center{display:flex;flex-direction:column;align-items:center;gap:.85rem;text-align:center}
.grimm-sigil-wrap{position:relative;width:84px;height:84px;display:flex;align-items:center;justify-content:center;margin-bottom:.1rem}
.grimm-ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(0,210,255,.4);animation:grimmRing 3.4s linear infinite}
.grimm-ring.r2{inset:-12px;border-style:dashed;border-color:rgba(0,210,255,.22);animation:grimmRing 8s linear infinite reverse}
@keyframes grimmRing{to{transform:rotate(360deg)}}
.grimm-sigil{font-size:3.4rem;line-height:1;color:var(--aura);filter:drop-shadow(0 0 24px rgba(0,210,255,.8));animation:grimmPulse 3.6s ease-in-out infinite}
@keyframes grimmPulse{0%,100%{opacity:.85;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
.book.grimm .book-title{font-family:'Orbitron',sans-serif;font-weight:900;font-size:2.4rem;line-height:1.1;letter-spacing:.06em;
  color:#eaf9ff;text-shadow:0 0 24px rgba(0,210,255,.6), 0 0 2px rgba(120,240,255,.8);max-width:30ch;
  background:linear-gradient(180deg,#fff,#bfecff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.grimm-byline{font-family:'Share Tech Mono',monospace;font-size:.8rem;letter-spacing:.16em;color:rgba(0,210,255,.78);text-transform:uppercase}
.grimm-byline strong{color:#ff5a78;font-weight:400}
.grimm-tags{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-top:.3rem}
.grimm-tags span{font-family:'Share Tech Mono',monospace;font-size:.56rem;letter-spacing:.12em;color:rgba(140,210,235,.75);
  padding:.22rem .55rem;border:1px solid rgba(0,210,255,.28);border-radius:3px;background:rgba(0,210,255,.05);text-transform:uppercase}
.grimm-tags span.more{color:#ff8aa0;border-color:rgba(255,90,120,.35);background:rgba(255,40,70,.06)}
.grimm-botbar{display:flex;align-items:center;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.18em;color:rgba(120,180,210,.55);text-transform:uppercase}
.grimm-status{display:flex;align-items:center;gap:.4rem;color:rgba(0,255,160,.85)}
.grimm-status::before{content:'';width:7px;height:7px;border-radius:50%;background:#00ffa0;box-shadow:0 0 8px #00ffa0;animation:grimmPulse 1.8s ease-in-out infinite}
.grimm-ticker{overflow:hidden;max-width:200px;white-space:nowrap;color:rgba(0,210,255,.55)}
.grimm-ticker .gtk{display:inline-block;animation:grimmTicker 6s linear infinite}
@keyframes grimmTicker{0%{opacity:.3}50%{opacity:.8}100%{opacity:.3}}
.grimm-count{color:rgba(0,210,255,.85)}
/* corner brackets */
.book.grimm .gc{position:absolute;width:26px;height:26px;border:2px solid rgba(0,210,255,.7);z-index:6;pointer-events:none;filter:drop-shadow(0 0 4px rgba(0,210,255,.4))}
.book.grimm .gc.tl{top:16px;left:16px;border-right:0;border-bottom:0}
.book.grimm .gc.tr{top:16px;right:16px;border-left:0;border-bottom:0}
.book.grimm .gc.bl{bottom:16px;left:16px;border-right:0;border-top:0}
.book.grimm .gc.br{bottom:16px;right:16px;border-left:0;border-top:0}
.book.grimm:hover{transform:translateY(-7px);box-shadow:0 34px 84px rgba(0,0,0,.7), 0 0 100px rgba(0,210,255,.32), inset 0 0 90px rgba(0,210,255,.08)}
.book.grimm:hover .grimm-sigil{filter:drop-shadow(0 0 34px rgba(0,210,255,1))}
.book.grimm:hover .grimm-count{color:#aef0ff}

.book-inner{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem 1.2rem;text-align:center;gap:.8rem}
.book-deco{font-size:1.8rem;opacity:.7}
.book-title{font-size:1.15rem;line-height:1.25;letter-spacing:.03em}
.book-meta{font-family:'Share Tech Mono',monospace;font-size:.55rem;letter-spacing:.1em;opacity:.5;text-transform:uppercase;position:absolute;bottom:1rem;left:0;right:0;text-align:center}

/* locked overlay */
.book-lock{
  position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;
  background:rgba(0,0,0,.72);backdrop-filter:blur(2px);
  font-family:'Share Tech Mono',monospace;
}
.book-lock-icon{font-size:2rem;opacity:.7}
.book-lock-text{font-size:.6rem;letter-spacing:.15em;color:#a08080;text-transform:uppercase}
.book.holo .book-lock{background:rgba(0,10,20,.8)}
.book.holo .book-lock-icon{color:#ff4060;filter:drop-shadow(0 0 8px rgba(255,40,60,.5))}

/* DM badge on book */
.book-access-badge{
  position:absolute;top:.6rem;right:.6rem;z-index:6;
  font-family:'Share Tech Mono',monospace;font-size:.5rem;letter-spacing:.08em;
  padding:.2rem .45rem;border-radius:4px;text-transform:uppercase;
}
.book-access-badge.open{background:rgba(0,200,100,.2);color:#5ed4a0;border:1px solid rgba(0,200,100,.3)}
.book-access-badge.restricted{background:rgba(200,0,10,.2);color:#ff8088;border:1px solid rgba(200,0,10,.3)}
.book-access-badge.private{background:rgba(180,120,255,.2);color:#c8a0ff;border:1px solid rgba(180,120,255,.35)}
.book.private-book{box-shadow:0 12px 30px rgba(0,0,0,.5),0 0 20px rgba(180,120,255,.12),inset 0 0 30px rgba(0,0,0,.25)}

/* ═══════════ READER MODAL ═══════════ */
.reader-overlay{
  position:fixed;inset:0;z-index:9000;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.9);backdrop-filter:blur(12px);
  opacity:0;pointer-events:none;transition:opacity .4s;padding:2rem;
}
.reader-overlay.open{opacity:1;pointer-events:all}

.reader{
  width:min(1040px,100%);height:min(88vh,840px);
  display:grid;grid-template-rows:auto 1fr auto;
  border-radius:14px;overflow:hidden;position:relative;
  transform:scale(.92);transition:transform .4s cubic-bezier(.2,1,.3,1);
}
.reader-overlay.open .reader{transform:scale(1)}

/* reader main = TOC + body */
.reader-main{display:grid;grid-template-columns:230px 1fr;overflow:hidden;position:relative;z-index:3}
.reader-toc{overflow-y:auto;padding:1rem .8rem;display:flex;flex-direction:column;gap:.25rem}
.reader.paper .reader-toc{background:rgba(160,130,90,.12);border-right:1px solid rgba(120,90,50,.25)}
.reader.holo-reader .reader-toc{background:rgba(0,40,60,.3);border-right:1px solid rgba(0,210,255,.18)}
.reader-toc::-webkit-scrollbar{width:5px}
.reader.paper .reader-toc::-webkit-scrollbar-thumb{background:rgba(120,90,50,.35);border-radius:999px}
.reader.holo-reader .reader-toc::-webkit-scrollbar-thumb{background:rgba(0,210,255,.3);border-radius:999px}
.reader-toc-title{
  font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:.5rem;padding:0 .4rem;
}
.reader.paper .reader-toc-title{font-family:'Share Tech Mono',monospace;color:#7a5a30}
.reader.holo-reader .reader-toc-title{font-family:'Share Tech Mono',monospace;color:var(--aura);opacity:.7}
.toc-item{
  display:flex;gap:.5rem;align-items:baseline;padding:.5rem .6rem;border-radius:7px;cursor:pointer;
  text-align:left;border:1px solid transparent;background:transparent;width:100%;transition:all .12s;font:inherit;
}
.toc-num{font-family:'Share Tech Mono',monospace;font-size:.58rem;opacity:.5;flex-shrink:0;min-width:20px}
.toc-name{font-size:.92rem;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toc-name.untitled{opacity:.4;font-style:italic}
.reader.paper .toc-item{color:#5a4530}
.reader.paper .toc-name{font-family:'Cormorant Garamond',serif;font-weight:500}
.reader.paper .toc-item:hover{background:rgba(120,90,50,.12)}
.reader.paper .toc-item.active{background:rgba(120,90,50,.22);border-color:rgba(120,90,50,.4);color:#3a2c1c}
.reader.holo-reader .toc-item{color:#7aa8c0}
.reader.holo-reader .toc-name{font-family:'Share Tech Mono',monospace;font-size:.82rem}
.reader.holo-reader .toc-item:hover{background:rgba(0,210,255,.08);color:#bfe8f8}
.reader.holo-reader .toc-item.active{background:rgba(0,210,255,.15);border-color:rgba(0,210,255,.35);color:var(--aura)}

.reader-toc-toggle{
  width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:1.1rem;display:none;
  align-items:center;justify-content:center;border:1px solid;margin-right:.6rem;background:transparent;
}
.reader.paper .reader-toc-toggle{border-color:rgba(120,90,50,.3);color:#5a4530}
.reader.holo-reader .reader-toc-toggle{border-color:rgba(0,210,255,.3);color:var(--aura)}

/* paper reader */
/* ── AGED TOME PAPER ──────────────────────────────────────────
   Real parchment: warm variegated base + irregular foxing spots
   (age-brown flecks) + soft tea stains + heavier organic vignette.
   No repeating fiber lines — those read as scanlines up close. */
.reader.paper{
  background:
    /* foxing — small irregular brown age spots, scattered organically */
    radial-gradient(ellipse 2.8% 2.2% at 17% 23%, rgba(122,66,26,.32), transparent 68%),
    radial-gradient(ellipse 1.6% 2.4% at 71% 14%, rgba(104,58,22,.26), transparent 70%),
    radial-gradient(ellipse 3.6% 2.6% at 42% 61%, rgba(132,72,30,.28), transparent 68%),
    radial-gradient(ellipse 1.8% 1.8% at 89% 43%, rgba(118,64,24,.24), transparent 70%),
    radial-gradient(ellipse 2.6% 3.2% at 26% 82%, rgba(110,60,22,.30), transparent 70%),
    radial-gradient(ellipse 1.9% 1.6% at 63% 91%, rgba(122,66,26,.24), transparent 72%),
    radial-gradient(ellipse 2.2% 2.0% at 8%  46%, rgba(114,60,20,.22), transparent 72%),
    radial-gradient(ellipse 1.4% 1.8% at 54% 32%, rgba(126,72,32,.20), transparent 72%),
    /* tea/water stain rings — soft brown haloes */
    radial-gradient(ellipse 24% 20% at 78% 68%, rgba(110,60,22,.18), rgba(110,60,22,.06) 55%, transparent 82%),
    radial-gradient(ellipse 18% 15% at 22% 30%, rgba(120,70,28,.10), transparent 72%),
    /* organic vignette — edge darkening from decades of handling */
    radial-gradient(ellipse 100% 96% at 50% 50%, transparent 52%, rgba(84,46,18,.16) 78%, rgba(46,24,8,.44) 100%),
    /* warm variegated parchment base — lighter where the reader "looks", darker elsewhere */
    radial-gradient(ellipse 62% 50% at 30% 22%, rgba(250,236,204,.55), transparent 70%),
    radial-gradient(ellipse 58% 46% at 72% 78%, rgba(214,184,132,.30), transparent 66%),
    linear-gradient(168deg, #ecdbb2 0%, #dcc696 44%, #cbb27e 78%, #beaa72 100%);
  border:none;
  filter:
    drop-shadow(0 26px 46px rgba(0,0,0,.65))
    drop-shadow(0 8px 16px rgba(0,0,0,.45));
}
/* Paper fibers — SVG turbulence gives organic randomness that a
   linear-gradient never can. No two spots look identical. */
.reader.paper::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:1;opacity:.42;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='360' height='360'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='11'/><feColorMatrix values='0 0 0 0 0.30  0 0 0 0 0.20  0 0 0 0 0.09  0 0 0 0.55 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  mix-blend-mode:multiply;
}
/* Ink specks + heavier vignette, on top of the fibers */
.reader.paper::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:2;
  background:
    radial-gradient(circle at 14% 21%, rgba(96,60,28,.28) .7px, transparent 1.4px),
    radial-gradient(circle at 63% 12%, rgba(96,60,28,.24) .6px, transparent 1.2px),
    radial-gradient(circle at 37% 47%, rgba(96,60,28,.26) .8px, transparent 1.5px),
    radial-gradient(circle at 84% 39%, rgba(96,60,28,.22) .6px, transparent 1.2px),
    radial-gradient(circle at 22% 68%, rgba(96,60,28,.25) .7px, transparent 1.4px),
    radial-gradient(circle at 71% 74%, rgba(96,60,28,.24) .65px, transparent 1.3px),
    radial-gradient(circle at 48% 89%, rgba(96,60,28,.22) .55px, transparent 1.1px),
    radial-gradient(circle at 91% 84%, rgba(96,60,28,.25) .7px, transparent 1.4px),
    /* extra deep vignette to sell the age */
    radial-gradient(ellipse 96% 96% at 50% 50%, transparent 58%, rgba(90,50,20,.20) 84%, rgba(60,32,12,.36) 100%);
  background-size:200px 200px,240px 240px,180px 180px,260px 260px,220px 220px,210px 210px,230px 230px,190px 190px,100% 100%;
  mix-blend-mode:multiply;
}
/* NO grid lines on old paper — the rule pattern belongs to the notebook.
   Old tomes were never ruled; they had freeform text on rough sheets. */
.reader.paper .reader-body{
  position:relative;
  background:none;
}

/* ── NOTEBOOK: cooler, newer stock with real ruled lines + a margin ── */
.reader.paper.notebook-reader{
  background:
    radial-gradient(ellipse 80% 60% at 22% 8%, rgba(255,255,252,.8), transparent 58%),
    radial-gradient(ellipse 30% 24% at 82% 26%, rgba(200,205,196,.16), transparent 62%),
    radial-gradient(ellipse 24% 30% at 14% 76%, rgba(196,202,192,.14), transparent 60%),
    linear-gradient(168deg, #fbfaf4 0%, #f4f3ea 45%, #eceadf 80%, #e4e2d5 100%);
}
.reader.paper.notebook-reader::after{
  /* lighter aging than the tome — this is newer paper */
  opacity:.6;
}
.reader.paper.notebook-reader .reader-body{
  /* ruled lines the text actually sits on, plus a red margin rule */
  background-image:
    linear-gradient(90deg, transparent 0 2.1rem, rgba(190,90,90,.32) 2.1rem 2.15rem, transparent 2.15rem),
    repeating-linear-gradient(0deg, transparent 0 1.9rem, rgba(70,110,150,.16) 1.9rem 1.94rem);
  background-position:0 0, 0 1.15rem;
  padding-left:3.1rem;
}
.reader.paper.notebook-reader .page-text{
  font-family:'Cormorant Garamond', serif;
  font-size:1.16rem;
  line-height:1.9rem;          /* locked to the rule spacing so text rides the lines */
  text-align:left;
  hyphens:none;
  color:#2f3a4a;                /* blue-black biro, not brown ink */
  text-shadow:0 .4px .3px rgba(47,58,74,.14);
}
.reader.paper.notebook-reader .page-text::first-letter{
  font-family:'Cormorant Garamond', serif;
  font-size:1.16rem;
  float:none;
  line-height:inherit;
  padding:0;
  margin:0;
  color:inherit;
  text-shadow:inherit;
}
.reader.paper.notebook-reader .page-title{
  font-family:'Cormorant Garamond', serif;
  color:#2f3a4a;
  border-bottom:1px solid rgba(70,110,150,.28);
}
.reader.paper.notebook-reader .reader-book-title{
  font-family:'Cormorant Garamond', serif;
  color:#2f3a4a;
}

/* holo reader */
.reader.holo-reader{
  background:
    linear-gradient(135deg, rgba(0,30,50,.97), rgba(0,8,18,.98)),
    repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,210,255,.03) 2px 3px);
  border:1px solid rgba(0,210,255,.4);
  box-shadow:0 40px 100px rgba(0,0,0,.7), 0 0 60px rgba(0,210,255,.15), inset 0 0 60px rgba(0,210,255,.05);
}
.reader.holo-reader::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg, transparent, rgba(0,210,255,.04), transparent);
  animation:holoScan 4s linear infinite;
}

/* reader header */
.reader-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.2rem 1.6rem;position:relative;z-index:3;
}
/* paper is a sheet, not a UI card: kill the rounded corners and give it a
   faintly irregular deckle edge instead */
.reader.paper{
  border-radius:2px;
  clip-path:polygon(
    0% .4%, 12% 0%, 27% .5%, 41% .1%, 58% .6%, 73% .1%, 88% .5%, 100% .2%,
    99.7% 14%, 100% 31%, 99.6% 48%, 100% 66%, 99.7% 82%, 100% 99.5%,
    87% 100%, 71% 99.4%, 55% 100%, 38% 99.5%, 23% 100%, 9% 99.4%, 0% 99.8%,
    .3% 83%, 0% 67%, .4% 50%, 0% 33%, .3% 16%
  );
}
/* a printed rule under the title, not a UI divider */
.reader.paper .reader-head{
  border-bottom:none;
  position:relative;
}
.reader.paper .reader-head::after{
  content:'';position:absolute;left:1.6rem;right:1.6rem;bottom:0;height:2px;
  background:
    linear-gradient(90deg, transparent, rgba(90,66,34,.5) 6%, rgba(90,66,34,.5) 94%, transparent),
    linear-gradient(90deg, transparent, rgba(90,66,34,.22) 4%, rgba(90,66,34,.22) 96%, transparent);
  background-size:100% 1px, 100% 1px;
  background-position:0 0, 0 3px;
  background-repeat:no-repeat;
  opacity:.75;
}
.reader.holo-reader .reader-head{border-bottom:1px solid rgba(0,210,255,.2)}
.reader-book-title{font-size:1.5rem;letter-spacing:.03em}
.reader.paper .reader-book-title{font-family:'Cinzel',serif;color:#3a2c1c;font-weight:700}
.reader.holo-reader .reader-book-title{font-family:'Orbitron',sans-serif;color:var(--aura);font-weight:700;text-shadow:0 0 14px rgba(0,210,255,.5)}
.reader-close{
  width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:1.2rem;
  display:flex;align-items:center;justify-content:center;transition:all .15s;border:1px solid;
}
.reader.paper .reader-close{background:rgba(120,90,50,.1);border-color:rgba(120,90,50,.3);color:#5a4530}
.reader.paper .reader-close:hover{background:rgba(120,90,50,.25)}
.reader.holo-reader .reader-close{background:rgba(0,210,255,.08);border-color:rgba(0,210,255,.3);color:var(--aura)}
.reader.holo-reader .reader-close:hover{background:rgba(0,210,255,.18)}

/* reader page body */
.reader-body{overflow-y:auto;padding:2rem 2.6rem;position:relative;z-index:3}
.reader.paper .reader-body{color:var(--ink)}
.reader.holo-reader .reader-body{color:#bfe8f8}
.reader-body::-webkit-scrollbar{width:6px}
.reader.paper .reader-body::-webkit-scrollbar-thumb{background:rgba(120,90,50,.35);border-radius:999px}
.reader.holo-reader .reader-body::-webkit-scrollbar-thumb{background:rgba(0,210,255,.3);border-radius:999px}

.page-title{font-size:1.6rem;margin-bottom:1.2rem;letter-spacing:.02em}
.reader.paper .page-title{
  font-family:'Cinzel',serif;color:#2a1a08;font-weight:600;
  border-bottom:none;padding-bottom:.7rem;
  /* printed rule, not a UI line: heavier center, fading ends, slight ink variance */
  background-image:
    linear-gradient(90deg, transparent, rgba(80,44,16,.55) 8%, rgba(80,44,16,.55) 92%, transparent),
    linear-gradient(90deg, transparent, rgba(80,44,16,.22) 4%, rgba(80,44,16,.22) 96%, transparent);
  background-size:100% 1.4px, 100% .8px;
  background-position:0 100%, 0 calc(100% - 3px);
  background-repeat:no-repeat;
  text-shadow:0 1px 1px rgba(60,32,10,.22);
}
.reader.holo-reader .page-title{font-family:'Orbitron',sans-serif;color:#fff;font-weight:600;border-bottom:1px solid rgba(0,210,255,.25);padding-bottom:.6rem;text-shadow:0 0 10px rgba(0,210,255,.3)}

.page-text{font-size:1.15rem;line-height:1.85;white-space:pre-wrap}
.reader.paper .page-text{
  font-family:'EB Garamond',serif;
  color:#3c2a15;
  font-size:1.18rem;
  line-height:1.9;
  letter-spacing:.004em;
  text-align:justify;
  hyphens:auto;
  /* iron-gall ink bleeds into the fibers — a faint warm halo around every letter */
  text-shadow:
    0 .3px .3px rgba(64,38,16,.35),
    0 0 .8px rgba(90,54,22,.18);
  position:relative;z-index:4;
}
.reader.paper .page-text::first-letter{
  font-family:'Cinzel',serif;
  font-size:3.6rem;
  float:left;
  line-height:.78;
  padding:.34rem .52rem 0 0;
  margin-top:.1rem;
  color:#6a3812;
  text-shadow:
    0 1px 1px rgba(72,40,14,.35),
    0 0 3px rgba(120,60,20,.22);
}
.reader.holo-reader .page-text{font-family:'Share Tech Mono',monospace;font-size:1rem;line-height:1.9;color:#a8dcf0}

.page-img{max-width:100%;border-radius:8px;margin:1.2rem 0;display:block}
.reader.holo-reader .page-img{border:1px solid rgba(0,210,255,.3);box-shadow:0 0 20px rgba(0,210,255,.15)}
.reader.paper .page-img{border:1px solid rgba(120,90,50,.4);box-shadow:0 4px 16px rgba(80,50,20,.3);filter:sepia(.2)}

.page-empty{text-align:center;padding:3rem 1rem;opacity:.5;font-style:italic;font-size:1.1rem}

/* ═══════════ TORN PAGE ═══════════ */
/* Organic torn edges via SVG mask — sweeping curves + feTurbulence
   grain along the boundary. No sharp geometric zigzag; the sheet
   is torn along the fibers the way real paper actually rips. The
   base .reader.paper clip-path (deckle sides) still applies, so
   the left/right edges keep their natural irregularity. */
.page-body-wrap{position:relative}

.reader.paper.rip-top,
.reader.paper.rip-bottom,
.reader.paper.rip-both{

/* torn edges expose raw pulp: a pale fibrous lip along the rip */
.reader.paper.rip-top .reader-head{
  padding-top:2.6rem;
}
.reader.paper.rip-bottom .reader-body,
.reader.paper.rip-both .reader-body{
  padding-bottom:3.4rem;
}
.rip-fray{
  position:absolute;left:0;right:0;height:22px;pointer-events:none;z-index:5;
  background:linear-gradient(180deg, rgba(255,252,242,.75), rgba(214,192,150,.25) 60%, transparent);
  mix-blend-mode:screen;opacity:.55;
}
.rip-fray.top{top:0}
.rip-fray.bottom{bottom:0;transform:scaleY(-1)}

/* ═══════════ BLOOD ═══════════ */
/* multiply-blended so it soaks INTO the fibre instead of sitting on top */
.blood-layer{
  position:absolute;inset:0;pointer-events:none;z-index:6;
  mix-blend-mode:multiply;
}
.bl-pool{
  position:absolute;border-radius:48% 52% 44% 56% / 52% 46% 54% 48%;
  background:
    radial-gradient(circle at 38% 34%, rgba(96,8,10,.95), rgba(122,14,16,.8) 42%, rgba(138,32,26,.45) 72%, rgba(150,60,44,.12) 100%);
  filter:blur(.4px);
}
/* darker ring where it dried at the rim */
.bl-pool::after{
  content:'';position:absolute;inset:8%;border-radius:inherit;
  box-shadow:inset 0 0 6px rgba(70,4,6,.5);
}
.bl-speck{
  position:absolute;border-radius:46% 54% 50% 50% / 54% 48% 52% 46%;
  background:radial-gradient(circle at 40% 36%, rgba(104,10,12,.95), rgba(128,22,20,.6) 60%, rgba(140,44,34,.2));
}
.bl-run{
  position:absolute;border-radius:44% 44% 50% 50% / 6% 6% 94% 94%;
  background:linear-gradient(180deg, rgba(104,10,12,.72), rgba(120,20,18,.4) 55%, rgba(134,40,32,.06));
  filter:blur(.5px);
}
/* heavier levels bleed further into the page */
.blood-layer.lvl-2 .bl-pool{filter:blur(.6px)}
.blood-layer.lvl-3 .bl-pool{filter:blur(.8px)}
.blood-layer.lvl-3 .bl-speck{filter:blur(.2px)}
/* blood on the holo/grimm readers reads as a screen smear instead */
.reader.holo-reader .blood-layer{mix-blend-mode:screen;opacity:.5}
.reader.holo-reader .bl-pool{
  background:radial-gradient(circle at 38% 34%, rgba(180,20,30,.7), rgba(120,10,20,.35) 60%, transparent);
}

/* DM torn toggle in page fold */
.torn-toggle-row{display:flex;align-items:center;gap:.5rem;margin-top:.4rem;font-size:.75rem;color:#7a6248}
.torn-toggle-row label{display:flex;align-items:center;gap:.35rem;cursor:pointer;font-family:monospace}
.torn-select{font-family:monospace;font-size:.72rem;padding:.2rem .4rem;border:1px solid rgba(120,90,50,.35);border-radius:5px;background:rgba(0,0,0,.3);color:#c8b490}

/* ═══════════ PRIVATE NOTEBOOK — ENHANCED ═══════════ */
.private-lock-badge{
  display:inline-flex;align-items:center;gap:.35rem;
  font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:.12em;
  color:#c8a0ff;background:rgba(120,60,200,.12);
  border:1px solid rgba(160,90,255,.35);border-radius:999px;padding:.2rem .7rem;
  text-transform:uppercase;vertical-align:middle;margin-left:.5rem;
}
.private-lock-badge::before{content:'🔒 ';font-size:.7rem}
.book.private-book{
  border-color:rgba(160,90,255,.45)!important;
  box-shadow:0 12px 36px rgba(0,0,0,.5),0 0 28px rgba(140,80,255,.18),inset 0 0 40px rgba(140,80,255,.06)!important;
}
.book.private-book .book-title{color:#d4b0ff}
.book.private-book .book-meta{color:rgba(180,140,255,.6)}
.book.private-book .book-deco{color:rgba(160,100,255,.6)}
.book.private-book:hover{box-shadow:0 18px 48px rgba(0,0,0,.55),0 0 44px rgba(140,80,255,.28),inset 0 0 40px rgba(140,80,255,.08)!important}
.notes-edit-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem;padding-bottom:.8rem;border-bottom:1px dashed rgba(120,90,50,.3)}
.notes-edit-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:#3a2c1c}
.notes-security-bar{
  display:flex;align-items:center;gap:.5rem;padding:.45rem .8rem;border-radius:8px;
  background:rgba(100,60,180,.1);border:1px solid rgba(140,90,255,.3);
  font-family:'Share Tech Mono',monospace;font-size:.62rem;color:#c8a0ff;letter-spacing:.06em;
}
.notes-security-bar::before{content:'🔐';margin-right:.2rem}
.notes-mode-btn{font-size:.72rem;padding:.3rem .7rem;border:1px solid rgba(120,90,50,.4);border-radius:6px;background:rgba(160,120,60,.08);color:#5a4020;cursor:pointer;transition:all .14s}
.notes-mode-btn:hover{background:rgba(160,120,60,.18);border-color:rgba(120,90,50,.6)}

/* ═══════════ ADD-BOOK DIALOG ═══════════ */
.add-book-btn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;
  font-family:'Share Tech Mono',monospace;font-size:.72rem;font-weight:700;letter-spacing:.06em;
  padding:.55rem;border-radius:8px;cursor:pointer;margin-top:.5rem;
  background:rgba(0,210,255,.06);border:1px dashed rgba(0,210,255,.3);color:var(--aura);
  transition:all .16s;
}
.add-book-btn:hover{background:rgba(0,210,255,.14);border-style:solid;border-color:rgba(0,210,255,.5)}
.dm-book-item.delete-mode{background:rgba(255,60,80,.08);border-color:rgba(255,80,80,.3)}
.add-book-dialog{
  position:fixed;inset:0;z-index:2000;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity .18s;
}
.add-book-dialog.open{opacity:1;pointer-events:auto}
.add-book-box{
  width:min(480px,94vw);background:linear-gradient(180deg,rgba(12,18,32,.98),rgba(6,10,20,.99));
  border:1px solid rgba(0,210,255,.4);border-radius:16px;padding:1.6rem;
  box-shadow:0 40px 100px rgba(0,0,0,.7),0 0 80px -40px var(--aura);
  transform:translateY(12px) scale(.97);transition:transform .22s cubic-bezier(.2,.8,.2,1);
}
.add-book-dialog.open .add-book-box{transform:none}
.add-book-title{font-family:'Orbitron',sans-serif;font-size:.9rem;font-weight:800;letter-spacing:.1em;color:var(--aura);margin-bottom:1.2rem}
.add-book-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
.add-book-field label{display:block;font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted,#888);margin-bottom:.35rem}
.add-book-field input,.add-book-field select{width:100%;background:rgba(0,0,0,.5);border:1px solid rgba(0,210,255,.25);border-radius:8px;color:#cdd;padding:.55rem .7rem;font-family:'Share Tech Mono',monospace;font-size:.82rem}
.add-book-field input:focus,.add-book-field select:focus{border-color:rgba(0,210,255,.55);outline:none}
.add-book-foot{display:flex;gap:.6rem;justify-content:flex-end;margin-top:1.1rem}
.btn-cancel{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);color:var(--muted,#888);padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-size:.82rem;transition:all .14s}
.btn-cancel:hover{border-color:rgba(255,255,255,.25);color:#cdd}
.btn-create{background:linear-gradient(180deg,var(--aura),#0099cc);border:none;color:#021018;padding:.5rem 1.1rem;border-radius:8px;cursor:pointer;font-weight:700;font-size:.82rem;transition:transform .12s}
.btn-create:hover{transform:translateY(-1px)}

/* ═══════ GRIMM READER — bigger, cinematic threat-terminal ═══════ */
.reader.grimm-reader{
  width:min(1240px,100%);height:min(92vh,960px);
  background:
    radial-gradient(ellipse 60% 30% at 50% 0%, rgba(0,210,255,.12), transparent 60%),
    radial-gradient(ellipse 50% 40% at 100% 100%, rgba(255,40,70,.08), transparent 60%),
    linear-gradient(135deg, rgba(2,20,32,.98), rgba(1,5,11,.99)),
    repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,210,255,.025) 2px 3px);
  border:1px solid rgba(0,210,255,.5);
  box-shadow:0 50px 130px rgba(0,0,0,.75), 0 0 90px rgba(0,210,255,.2), inset 0 0 90px rgba(0,210,255,.05);
}
.reader.grimm-reader::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:6;
  border:1px solid transparent;
  background:
    linear-gradient(90deg,var(--aura),transparent 16%) top left/40px 2px no-repeat,
    linear-gradient(0deg,var(--aura),transparent 16%) top left/2px 40px no-repeat,
    linear-gradient(270deg,var(--aura),transparent 16%) top right/40px 2px no-repeat,
    linear-gradient(180deg,var(--aura),transparent 16%) top right/2px 40px no-repeat,
    linear-gradient(90deg,var(--aura),transparent 16%) bottom left/40px 2px no-repeat,
    linear-gradient(360deg,var(--aura),transparent 16%) bottom left/2px 40px no-repeat,
    linear-gradient(270deg,var(--aura),transparent 16%) bottom right/40px 2px no-repeat,
    linear-gradient(180deg,var(--aura),transparent 16%) bottom right/2px 40px no-repeat;
  opacity:.6;
}
.reader.grimm-reader .reader-head{
  padding:1.4rem 2rem;background:linear-gradient(90deg, rgba(0,210,255,.1), transparent 70%);
  border-bottom:1px solid rgba(0,210,255,.3);position:relative}
.reader.grimm-reader .reader-head::after{content:'';position:absolute;left:2rem;bottom:-1px;width:120px;height:2px;background:linear-gradient(90deg,var(--aura),transparent);box-shadow:0 0 10px var(--aura)}
.reader.grimm-reader .reader-book-title{font-family:'Orbitron',sans-serif;font-size:1.75rem;font-weight:800;letter-spacing:.04em;color:#eaf9ff;text-shadow:0 0 16px rgba(0,210,255,.55)}
.reader.grimm-reader .reader-head::before{
  content:'◈ GRIMM DATABASE · CLASSIFIED';position:absolute;top:.5rem;left:2rem;
  font-family:'Share Tech Mono',monospace;font-size:.56rem;letter-spacing:.22em;color:rgba(255,90,120,.7)}
.reader.grimm-reader .reader-book-title{margin-top:.7rem;display:inline-block}
.reader.grimm-reader .reader-toc{background:rgba(0,30,46,.45);border-right:1px solid rgba(0,210,255,.22);padding:1.4rem 1rem}
.reader.grimm-reader .reader-main{grid-template-columns:280px 1fr}
.reader.grimm-reader .reader-toc-title{font-family:'Share Tech Mono',monospace;color:var(--aura);opacity:.8;font-size:.62rem;letter-spacing:.2em;margin-bottom:.8rem}
.reader.grimm-reader .toc-item{color:#86b6cc;border:1px solid transparent;border-radius:6px;padding:.6rem .7rem;transition:all .15s}
.reader.grimm-reader .toc-name{font-family:'Share Tech Mono',monospace;font-size:.86rem;letter-spacing:.02em}
.reader.grimm-reader .toc-item::before{content:'▸ ';color:rgba(0,210,255,.4)}
.reader.grimm-reader .toc-item:hover{background:rgba(0,210,255,.1);color:#d6f3ff;border-color:rgba(0,210,255,.2)}
.reader.grimm-reader .toc-item.active{background:linear-gradient(90deg,rgba(0,210,255,.18),rgba(0,210,255,.04));border-color:rgba(0,210,255,.45);color:var(--aura);box-shadow:inset 2px 0 0 var(--aura)}
.reader.grimm-reader .reader-body{padding:2.6rem 3.4rem;color:#c8ecfa}
.reader.grimm-reader .page-title{font-family:'Orbitron',sans-serif;font-size:2.1rem;font-weight:700;color:#fff;
  border-bottom:1px solid rgba(0,210,255,.3);padding-bottom:.8rem;margin-bottom:1.6rem;letter-spacing:.02em;
  text-shadow:0 0 14px rgba(0,210,255,.4)}
.reader.grimm-reader .page-title::before{content:'THREAT FILE // ';font-family:'Share Tech Mono',monospace;font-size:.7rem;color:rgba(255,90,120,.65);letter-spacing:.18em;display:block;margin-bottom:.4rem;text-shadow:none}
.reader.grimm-reader .page-text{font-family:'Share Tech Mono',monospace;font-size:1.08rem;line-height:2.05;color:#b6e2f4;letter-spacing:.01em}
.reader.grimm-reader .page-img{border:1px solid rgba(0,210,255,.35);border-radius:6px;box-shadow:0 0 28px rgba(0,210,255,.18);margin:1.6rem 0}
.reader.grimm-reader .reader-close{width:42px;height:42px;font-size:1.3rem;background:rgba(0,210,255,.08);border-color:rgba(0,210,255,.35);color:var(--aura)}
.reader.grimm-reader .reader-close:hover{background:rgba(255,40,70,.15);border-color:rgba(255,90,120,.5);color:#ff90a8}
.reader.grimm-reader .reader-foot{padding:1.1rem 2rem;border-top:1px solid rgba(0,210,255,.2);background:rgba(0,20,32,.4);font-family:'Share Tech Mono',monospace}
.reader.grimm-reader::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:2;
  background:linear-gradient(180deg, transparent, rgba(0,210,255,.045), transparent);
  animation:holoScan 4.5s linear infinite;
}
@media(max-width:760px){
  .reader.grimm-reader .reader-main{grid-template-columns:1fr}
  .reader.grimm-reader .reader-body{padding:1.4rem 1.3rem}
  .reader.grimm-reader .page-title{font-size:1.5rem}
  .book.grimm{height:300px}
  .book.grimm .book-title{font-size:1.4rem}
}

/* reader footer / page nav */
.reader-foot{
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
  padding:1rem 1.6rem;position:relative;z-index:3;
}
.reader.paper .reader-foot{border-top:1px solid rgba(120,90,50,.3)}
.reader.holo-reader .reader-foot{border-top:1px solid rgba(0,210,255,.2)}
.page-nav-btn{
  font-family:'Share Tech Mono',monospace;font-size:.7rem;letter-spacing:.08em;
  padding:.5rem 1rem;border-radius:7px;cursor:pointer;border:1px solid;text-transform:uppercase;transition:all .15s;
}
.reader.paper .page-nav-btn{background:rgba(120,90,50,.12);border-color:rgba(120,90,50,.35);color:#4a3826}
.reader.paper .page-nav-btn:hover:not(:disabled){background:rgba(120,90,50,.25)}
.reader.holo-reader .page-nav-btn{background:rgba(0,210,255,.08);border-color:rgba(0,210,255,.3);color:var(--aura)}
.reader.holo-reader .page-nav-btn:hover:not(:disabled){background:rgba(0,210,255,.18)}
.page-nav-btn:disabled{opacity:.3;cursor:default}
.page-indicator{font-family:'Share Tech Mono',monospace;font-size:.72rem;letter-spacing:.12em}
.reader.paper .page-indicator{color:#5a4530}
.reader.holo-reader .page-indicator{color:var(--aura)}

/* page dots */
.page-dots{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;flex:1}
.page-dot{width:8px;height:8px;border-radius:50%;cursor:pointer;transition:all .15s;border:none}
.reader.paper .page-dot{background:rgba(120,90,50,.3)}
.reader.paper .page-dot.active{background:#6a4420;transform:scale(1.3)}
.reader.holo-reader .page-dot{background:rgba(0,210,255,.25)}
.reader.holo-reader .page-dot.active{background:var(--aura);box-shadow:0 0 8px var(--aura);transform:scale(1.3)}

/* ═══════════ DM PANEL ═══════════ */
.dm-overlay{
  position:fixed;inset:0;z-index:9500;display:flex;align-items:center;justify-content:center;
  background:rgba(2,1,8,.55);backdrop-filter:blur(8px) saturate(1.1);
  opacity:0;pointer-events:none;transition:opacity .3s;padding:1.5rem;
}
.dm-overlay.open{opacity:1;pointer-events:all}

.dm-login{
  width:min(400px,100%);padding:2.5rem 2rem;text-align:center;
  background:linear-gradient(145deg,rgba(10,6,20,.82),rgba(4,2,12,.82));
  backdrop-filter:blur(20px) saturate(1.2);
  border:1px solid rgba(0,210,255,.22);border-radius:16px;
  box-shadow:0 0 80px rgba(0,210,255,.1);
}
.dm-login-icon{font-size:2.5rem;margin-bottom:1rem;filter:drop-shadow(0 0 12px rgba(0,210,255,.4))}
.dm-login h2{font-family:'Orbitron',sans-serif;font-size:1.1rem;color:#fff;margin-bottom:.4rem;letter-spacing:.05em}
.dm-login p{font-size:.95rem;color:#8090a0;margin-bottom:1.4rem;font-style:italic}

.dm-panel{
  width:min(1100px,100%);height:min(90vh,860px);display:none;flex-direction:column;
  background:linear-gradient(145deg,rgba(6,4,14,.78),rgba(3,2,8,.82));
  backdrop-filter:blur(24px) saturate(1.2);
  border:1px solid rgba(0,210,255,.18);border-radius:16px;overflow:hidden;
  box-shadow:0 0 80px rgba(0,210,255,.1),0 32px 80px rgba(0,0,0,.5);
}
.dm-panel.open{display:flex}
.dm-panel-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.5rem;background:linear-gradient(90deg,rgba(0,0,0,.4),rgba(0,210,255,.03));
  border-bottom:1px solid rgba(0,210,255,.1);flex-shrink:0;
}
.dm-panel-head h2{font-family:'Orbitron',sans-serif;font-size:1rem;color:var(--aura);letter-spacing:.05em}

/* NEW layout: book list | workspace */
.dm-panel-layout{flex:1;display:grid;grid-template-columns:240px 1fr;overflow:hidden}
.dm-sidebar{display:flex;flex-direction:column;background:rgba(0,0,0,.15);border-right:1px solid rgba(0,210,255,.08)}
.dm-book-list{
  overflow-y:auto;padding:.8rem;flex:1;
  display:flex;flex-direction:column;gap:.3rem;
}
.dm-book-list::-webkit-scrollbar{width:5px}
.dm-book-list::-webkit-scrollbar-thumb{background:rgba(0,210,255,.2);border-radius:999px}
.dm-workspace{overflow-y:auto;padding:1.5rem}
.dm-workspace::-webkit-scrollbar{width:6px}
.dm-workspace::-webkit-scrollbar-thumb{background:rgba(0,210,255,.2);border-radius:999px}

/* book list items */
.dm-book-item{
  display:flex;align-items:center;gap:.6rem;padding:.7rem .8rem;border-radius:9px;cursor:pointer;
  border:1px solid transparent;color:#8090a0;transition:all .15s;text-align:left;
  background:rgba(0,0,0,.2);width:100%;font:inherit;
}
.dm-book-item:hover{background:rgba(0,210,255,.05);color:#c4d8f4}
.dm-book-item.active{background:rgba(0,210,255,.1);border-color:rgba(0,210,255,.3);color:var(--aura)}
.dm-book-item .bi-deco{font-size:1.2rem;flex-shrink:0}
.dm-book-item .bi-info{flex:1;min-width:0}
.dm-book-item .bi-name{font-family:'Cinzel',serif;font-size:.82rem;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dm-book-item .bi-count{font-family:'Share Tech Mono',monospace;font-size:.52rem;letter-spacing:.08em;opacity:.6;text-transform:uppercase;margin-top:.15rem}
.dm-book-item .bi-lock{font-size:.7rem;opacity:.7}

/* workspace header */
.ws-head{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.2rem;padding-bottom:1rem;border-bottom:1px solid rgba(0,210,255,.1)}
.ws-name-input{background:none;border:none;border-bottom:1px solid rgba(0,210,255,.25);color:#d0e8f6;font-family:'Share Tech Mono',monospace;font-size:1rem;font-weight:700;min-width:140px;flex:1;padding:.2rem .4rem;outline:none;transition:border-color .15s}
.ws-name-input:focus{border-color:rgba(0,210,255,.6)}
.ws-title{font-family:'Cinzel',serif;font-size:1.3rem;color:#e8dcc0;display:flex;align-items:center;gap:.6rem}
.ws-title .wsdeco{font-size:1.5rem}
.ws-empty{text-align:center;padding:4rem 1rem;color:#607080;font-style:italic;font-size:1.05rem}
.ws-empty-icon{font-size:3rem;opacity:.3;margin-bottom:1rem}

/* page list (folded) */
.ws-pages-head{display:flex;align-items:center;justify-content:space-between;margin:1.2rem 0 .7rem}
.ws-pages-title{font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:.12em;color:var(--aura);text-transform:uppercase}
.page-fold{
  border:1px solid rgba(0,210,255,.1);border-radius:9px;margin-bottom:.5rem;overflow:hidden;
  background:rgba(0,210,255,.02);
}
.page-fold-head{
  display:flex;align-items:center;gap:.7rem;padding:.7rem .9rem;cursor:pointer;
  background:rgba(0,0,0,.25);transition:background .15s;
}
.page-fold-head:hover{background:rgba(0,210,255,.05)}
.page-fold.open .page-fold-head{background:rgba(0,210,255,.07);border-bottom:1px solid rgba(0,210,255,.08)}
.pf-num{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:#607080;flex-shrink:0;min-width:48px;letter-spacing:.05em}
.pf-title{flex:1;font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:#c4d8f4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.pf-title.untitled{opacity:.4;font-style:italic}
.pf-chev{color:rgba(255,255,255,.3);font-size:.7rem;transition:transform .2s;flex-shrink:0}
.page-fold.open .pf-chev{transform:rotate(180deg)}
.page-fold-body{display:none;padding:1rem}
.page-fold.open .page-fold-body{display:block}

.dm-field{margin-bottom:.8rem}
.dm-field label{display:block;font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:.14em;color:rgba(0,210,255,.5);text-transform:uppercase;margin-bottom:.35rem}
.dm-field input,.dm-field textarea,.dm-field select{
  width:100%;padding:.6rem .8rem;border-radius:8px;
  background:rgba(0,0,0,.4);border:1px solid rgba(0,210,255,.12);color:#c4d8f4;
  font-family:'EB Garamond',serif;font-size:.95rem;transition:all .15s;
}
.dm-field textarea{min-height:90px;resize:vertical;font-size:1rem;line-height:1.5}
.dm-field textarea[data-f="text"]{min-height:320px;font-family:'EB Garamond',serif;font-size:1.12rem;line-height:1.75;padding:1.1rem}
.dm-field input:focus,.dm-field textarea:focus,.dm-field select:focus{
  outline:none;border-color:rgba(0,210,255,.5);box-shadow:0 0 0 2px rgba(0,210,255,.08)
}

/* access toggle pills */
.access-section{margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid rgba(0,210,255,.08)}
.access-title{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.12em;color:var(--aura);text-transform:uppercase;margin-bottom:.6rem}
.access-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.access-pill{
  display:flex;align-items:center;gap:.5rem;padding:.5rem .7rem;border-radius:7px;cursor:pointer;
  border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.3);
  font-family:'Share Tech Mono',monospace;font-size:.62rem;color:#8090a0;transition:all .15s;
}
.access-pill:has(input:checked){border-color:rgba(0,200,100,.5);background:rgba(0,200,100,.1);color:#5ed4a0}
.access-pill input{accent-color:#00c864}
.access-pill.everyone{grid-column:1/-1;border-color:rgba(0,210,255,.2)}
.access-pill.everyone:has(input:checked){border-color:rgba(0,210,255,.5);background:rgba(0,210,255,.1);color:var(--aura)}

/* DM page editor */
.dm-pages-title{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.12em;color:var(--aura);text-transform:uppercase;margin:1rem 0 .6rem}
.dm-page-row{
  border:1px solid rgba(0,210,255,.1);border-radius:9px;padding:.8rem;margin-bottom:.7rem;
  background:rgba(0,0,0,.25);
}
.dm-page-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.dm-page-num{font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:.1em;color:#607080;text-transform:uppercase}
.dm-empty{padding:1rem;text-align:center;color:#607080;font-style:italic;font-size:.95rem}

@media (max-width:640px){
  .shelf{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1.2rem}
  .book{height:220px}
  .reader-body{padding:1.5rem 1.4rem}
  .page-text{font-size:1.05rem}
  .access-grid{grid-template-columns:1fr}
  .dm-panel-layout{grid-template-columns:1fr}
  .dm-sidebar{max-height:160px;border-right:none;border-bottom:1px solid rgba(0,210,255,.08)}
  .dm-book-list{max-height:120px;flex-direction:row;overflow-x:auto;overflow-y:hidden}
  .dm-book-item{flex-shrink:0;min-width:140px}
  /* reader TOC becomes a slide-over on mobile */
  .reader-main{grid-template-columns:1fr}
  .reader-toc{position:absolute;left:0;top:0;bottom:0;width:240px;z-index:10;transform:translateX(-105%);transition:transform .25s}
  .reader.toc-open .reader-toc{transform:translateX(0);box-shadow:6px 0 24px rgba(0,0,0,.5)}
  .reader-toc-toggle{display:flex !important}
}

/* ── PRIVATE NOTES EDITOR ── */
.notes-edit-head{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
.notes-edit-title{font-family:'Cinzel',serif;font-size:1.2rem;color:#5a4530}
.notes-save-status{font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:.08em;color:#8a7050;text-transform:uppercase}
.private-notes-editor{
  width:100%;min-height:55vh;resize:vertical;
  font-family:'EB Garamond',serif;font-size:1.15rem;line-height:1.8;
  color:#3a2c1c;background:rgba(255,250,240,.5);
  border:1px solid rgba(120,90,50,.3);border-radius:10px;
  padding:1.3rem 1.5rem;outline:none;
}
.private-notes-editor:focus{border-color:rgba(120,90,50,.6);box-shadow:0 0 0 3px rgba(160,120,60,.12)}
.private-notes-editor::placeholder{color:rgba(90,69,48,.4);font-style:italic}
.notes-edit-hint{margin-top:.8rem;font-family:'EB Garamond',serif;font-size:.9rem;font-style:italic;color:#8a7050}
.notes-edit-hint code{background:rgba(120,90,50,.15);padding:.1rem .4rem;border-radius:4px;font-family:'Share Tech Mono',monospace;font-style:normal;font-size:.82rem}
.notes-edit-toolbar{display:flex;align-items:center;gap:.8rem}
.notes-mode-btn{font-family:'Share Tech Mono',monospace;font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;padding:.4rem .8rem;background:rgba(120,90,50,.12);border:1px solid rgba(120,90,50,.4);border-radius:5px;color:#6a4f30;cursor:pointer;transition:all .15s;white-space:nowrap}
.notes-mode-btn:hover{background:rgba(120,90,50,.25);color:#3a2c1c;transform:translateY(-1px)}
.reader.holo-reader .notes-mode-btn{color:#a8dcf0;border-color:rgba(80,180,220,.4);background:rgba(40,120,160,.15)}
.reader.holo-reader .notes-mode-btn:hover{background:rgba(40,120,160,.3);color:#dff4ff}
.notes-read-bar{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1.4rem;padding-bottom:.8rem;border-bottom:1px solid rgba(120,90,50,.2);flex-wrap:wrap}
.notes-read-label{font-family:'Share Tech Mono',monospace;font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;color:#8a7050}
.reader.holo-reader .notes-read-label{color:#7ab8d0}
.reader.holo-reader .notes-read-bar{border-bottom-color:rgba(80,180,220,.2)}


/* ═══════ RICH-TEXT TOOLBAR (DM editor) ═══════ */
.rt-toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:.25rem;padding:.4rem .5rem;margin-bottom:-1px;
  background:linear-gradient(180deg,rgba(0,210,255,.08),rgba(0,30,46,.5));
  border:1px solid rgba(0,210,255,.25);border-bottom:none;border-radius:8px 8px 0 0}
.rt-btn{min-width:30px;height:30px;padding:0 .55rem;display:inline-flex;align-items:center;justify-content:center;
  font-family:'Share Tech Mono',monospace;font-size:.82rem;color:#9fd4e8;cursor:pointer;
  background:rgba(0,210,255,.05);border:1px solid rgba(0,210,255,.2);border-radius:6px;transition:all .13s}
.rt-btn:hover{background:rgba(0,210,255,.18);border-color:rgba(0,210,255,.5);color:#fff;transform:translateY(-1px)}
.rt-btn:active{transform:translateY(0)}
.rt-btn b{font-weight:800}.rt-btn i{font-style:italic}.rt-btn u{text-decoration:underline}.rt-btn s{text-decoration:line-through}
.rt-sep{width:1px;height:20px;background:rgba(0,210,255,.25);margin:0 .25rem}
.dm-field textarea[data-f="text"]{border-radius:0 0 8px 8px}

/* ═══════ RENDERED RICH TEXT (reader pages) ═══════ */
.rt-content .rt-p{margin:0 0 .9rem}
.rt-content .rt-gap{height:.7rem}
.rt-content .rt-h1,.rt-content .rt-h2,.rt-content .rt-h3{margin:1.5rem 0 .8rem;line-height:1.2;font-weight:700}
.rt-content .rt-h1:first-child,.rt-content .rt-h2:first-child,.rt-content .rt-h3:first-child{margin-top:0}
.rt-content strong{font-weight:800}
.rt-content em{font-style:italic}
.rt-content u{text-decoration:underline;text-underline-offset:3px}
.rt-content s{text-decoration:line-through;opacity:.75}
.rt-content .rt-list{margin:.4rem 0 1rem;padding-left:1.4rem}
.rt-content .rt-list li{margin:.3rem 0}
.rt-content .rt-quote{margin:1rem 0;padding:.6rem 1.1rem;border-left:3px solid;font-style:italic;opacity:.9}
.rt-content .rt-hr{border:none;height:1px;margin:1.6rem 0}
.rt-content .rt-code{font-family:'Share Tech Mono',monospace;font-size:.92em;padding:.1em .4em;border-radius:4px}

/* paper reader rich-text theming */
.reader.paper .rt-content .rt-h1{font-family:'Cinzel',serif;font-size:2rem;color:#2a2014}
.reader.paper .rt-content .rt-h2{font-family:'Cinzel',serif;font-size:1.55rem;color:#3a2c1c}

// ── default books ──
function defaultBooks() {
  return [
    { id:'rowan',   name:"Rowan Rose's Notebook",          style:'notebook', deco:'📓', access:['all'], pages:[] },
    { id:'soul',    name:'Soul-Calming',                   style:'tome',     deco:'📖', access:['all'], pages:[] },

// players list pulled from campaign doc (for access control)

const $ = id => document.getElementById(id);

function splitNotePages(text){
  if(!text || !text.trim()) return [''];
  const norm = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const parts = norm.split(/^[ \t]*-{3,}[ \t]*$/m).map(s=>s.replace(/^\n+|\n+$/g,''));
  const filtered = parts.filter(p=>p.trim().length>0);
  return filtered.length ? filtered : [''];
}
const esc = s => String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

// Safe rich-text: escapes first, then applies a small, injection-proof markup set.
// Block: # / ## / ###  headers, > quote, --- divider, • or - bullet list.
// Inline: **bold**  *italic*  __underline__  ~~strike~~  `code`
function renderRichText(raw){
  const lines = String(raw||'').split('\n');
  const inline = (t)=>{
    t = esc(t);
    // code first (so its contents aren't re-formatted)
    t = t.replace(/`([^`]+)`/g, (m,x)=>`<code class="rt-code">${x}</code>`);
    t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/__([^_]+)__/g, '<u>$1</u>');
    t = t.replace(/~~([^~]+)~~/g, '<s>$1</s>');
    // italic: single * not adjacent to another * (avoid clashing with bold)
    t = t.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
    return t;
  };
  let html='', listOpen=false;
  const closeList=()=>{ if(listOpen){ html+='</ul>'; listOpen=false; } };
  for(let ln of lines){
    const t = ln.trimEnd();
    if(/^\s*(-{3,}|_{3,}|\*{3,})\s*$/.test(t)){ closeList(); html+='<hr class="rt-hr">'; continue; }
    let m;
    if((m=t.match(/^###\s+(.*)$/))){ closeList(); html+=`<h3 class="rt-h3">${inline(m[1])}</h3>`; }
    else if((m=t.match(/^##\s+(.*)$/))){ closeList(); html+=`<h2 class="rt-h2">${inline(m[1])}</h2>`; }
    else if((m=t.match(/^#\s+(.*)$/))){ closeList(); html+=`<h1 class="rt-h1">${inline(m[1])}</h1>`; }
    else if((m=t.match(/^>\s+(.*)$/))){ closeList(); html+=`<blockquote class="rt-quote">${inline(m[1])}</blockquote>`; }
    else if((m=t.match(/^\s*[-•*]\s+(.*)$/))){ if(!listOpen){ html+='<ul class="rt-list">'; listOpen=true; } html+=`<li>${inline(m[1])}</li>`; }
    else if(t===''){ closeList(); html+='<div class="rt-gap"></div>'; }
    else { closeList(); html+=`<p class="rt-p">${inline(t)}</p>`; }
  }
  closeList();
  return html;
}

// ── load players from campaign ──
async function loadPlayers() {
  try {
    const snap = await getDoc(doc(db,'campaigns','rwby-campaign'));
    if (snap.exists()) {
      const data = JSON.parse(snap.data().data);
      players = (data.characters||[])
        .map((c,idx)=>({idx, name:c.name||`Player ${idx+1}`, active:c.state==='active'}))
        .filter(p=>p.active);
    }
  } catch(e) { console.warn('Could not load players', e); }
}

// ── library sync ──
let _isEditing = false;       // true while DM is actively typing
let _pendingRemoteRender = false;
async function pushLibrary() {
  try { await setDoc(BOOKS_DOC, { data: JSON.stringify(library) }); }
  catch(e){ console.error('pushLibrary', e); }
}
function mergeLibrary(saved){
  // The book DEFINITIONS (name, deco, style, order) always come from defaultBooks()
  // in code. Only the per-book pages and access come from Firebase. This way,
  // editing names/decos/styles in defaultBooks() takes effect even after a save.
  const defs = defaultBooks();
  const savedById = {};
  (saved?.books || []).forEach(b => { savedById[b.id] = b; });
  return {
    books: defs.map(def => {
      const s = savedById[def.id];
      return {
        ...def,
        pages:  s?.pages  || def.pages  || [],
        access: s?.access || def.access || ['all'],
      };
    })
  };
}

function startLibraryListener() {
  onSnapshot(BOOKS_DOC, snap => {
    if (snap.exists()) {
      try {
        const parsed = JSON.parse(snap.data().data);
        if (parsed.books) {
          if (_isEditing) { _pendingRemoteRender = true; return; }
          library = mergeLibrary(parsed);
        }
      } catch(e){}
    } else {
      library = { books: defaultBooks() };
    }
    renderShelf();
    if (dmUnlocked && !_isEditing) { renderBookList(); renderWorkspace(); }
  }, ()=>{});
}

// which "player slot" am I? Books page doesn't claim characters,
// so a player sees books open to 'all' OR to any active character.
// (Access is enforced by the DM via the 'all' flag or per-character.)
// For simplicity: a non-DM viewer can open a book if access includes 'all'
// or if access includes ANY player index (DM decides per book who can see).
// Real per-player gating happens because each player knows which character is theirs;
// here we treat 'all' as open and specific lists as restricted-to-those-named.
let myCharIdx = (()=>{ const v = localStorage.getItem('rwby-my-idx'); return v!==null?Number(v):null; })();
const MY_PID = localStorage.getItem('rwby-pid'); // this browser's identity

// Personal private notes book (only this browser can load it)
let _privateBook = null;
async function loadPrivateNotes() {
  if (!MY_PID) return;
  let text = '';
  let bookName = 'My Notes';
  try {
    const snap = await getDoc(doc(db, 'rwby-private', MY_PID));
    if (snap.exists()) {
      const d = snap.data();
      text = d.text || '';
      bookName = d.bookName || 'My Notes';
    }
  } catch(e){ console.warn('loadPrivateNotes', e); }
  // Always create the private book so it can be edited even when empty.
  const chunks = splitNotePages(text);
  _privateBook = {
    id:'__private_notes__',
    name: bookName,
    style:'notebook',
    deco:'🔖',
    private:true,
    access:['__me__'],
    pages: chunks.map((t,i)=>({ id:'pn-'+i, title: i===0?'Notes':`Notes (cont. ${i+1})`, text:t.trim(), image:'' }))
  };
}

function canAccess(book) {
  if (book.private) return true; // your own private book — always readable by you
  if (dmUnlocked) return true;
  if (!book.access || book.access.includes('all')) return true;
  if (book.access.length === 0) return false; // locked to nobody
  if (myCharIdx !== null && book.access.includes(myCharIdx)) return true;
  return false;
}

// ════════════ SHELF ════════════
function renderShelf() {
  const shelf = $('shelf'); shelf.innerHTML = '';
  // Order: regular library books, then the viewer's Personal Notes, then Grimm Studies last (full-width centerpiece).
  const base = [...library.books];
  const grimmIdx = base.findIndex(b => b.style === 'grimm');
  const grimmBook = grimmIdx >= 0 ? base.splice(grimmIdx, 1)[0] : null;
  const allBooks = base;
  if (_privateBook) allBooks.push(_privateBook);   // Personal Notes sits above Grimm Studies
  if (grimmBook) allBooks.push(grimmBook);          // Grimm Studies always last
  allBooks.forEach(book => {
    const access = canAccess(book);
    const restricted = book.access && !book.access.includes('all') && !book.private;
    const el = document.createElement('div');
    el.className = `book ${book.style} ${access?'':'locked'} ${book.private?'private-book':''}`;
    if (book.style === 'grimm') {
      const parts = book.name.split('·');
      const mainTitle = (parts[0]||book.name).trim();
      const byline = (parts[1]||'').trim();
      const entryCount = book.pages.length;
      el.innerHTML = `
        ${dmUnlocked ? `<div class="book-access-badge ${restricted?'restricted':'open'}">${restricted?'Restricted':'Open'}</div>` : ''}
        <div class="grimm-hexbg"></div>
        <div class="grimm-beam"></div>
        <div class="grimm-vignette"></div>
        <span class="gc tl"></span><span class="gc tr"></span><span class="gc bl"></span><span class="gc br"></span>
        <div class="grimm-rail left"><span></span><span></span><span></span></div>
        <div class="grimm-rail right"><span></span><span></span><span></span></div>
        <div class="book-inner">
          <div class="grimm-topbar">
            <span class="gt-l">◈ GRIMM DATABASE</span>
            <span class="gt-c">REMNANT BESTIARY ARCHIVE</span>
            <span class="gt-id">CLASSIFIED // VYTAL</span>
          </div>
          <div class="grimm-center">
            <div class="grimm-sigil-wrap"><span class="grimm-ring"></span><span class="grimm-ring r2"></span><div class="grimm-sigil">${book.deco}</div></div>
            <div class="book-title" data-text="${esc(mainTitle)}">${esc(mainTitle)}</div>
            ${byline ? `<div class="grimm-byline">${esc(byline.replace(/^By\s+/i,'Compiled by '))}</div>` : ''}
            <div class="grimm-tags"><span>BEOWOLF</span><span>URSA</span><span>NEVERMORE</span><span>GOLIATH</span><span class="more">+${Math.max(0,entryCount)} FILES</span></div>
          </div>
          <div class="grimm-botbar">
            <span class="grimm-status">ARCHIVE LINKED</span>
            <span class="grimm-ticker"><span class="gtk">SCANNING REMNANT</span></span>
            <span class="grimm-count">${entryCount} ENTR${entryCount===1?'Y':'IES'} · OPEN ▸</span>
          </div>
        </div>
        ${access ? '' : `<div class="book-lock"><div class="book-lock-icon">🔒</div><div class="book-lock-text">Sealed</div></div>`}`;
    } else {
      el.innerHTML = `
        ${book.private ? `<div class="book-access-badge private">🔒 Private</div>` : (dmUnlocked ? `<div class="book-access-badge ${restricted?'restricted':'open'}">${restricted?'Restricted':'Open'}</div>` : '')}
        <div class="book-inner">
          <div class="book-deco">${book.deco}</div>
          <div class="book-title">${esc(book.name)}</div>
          <div class="book-meta">${book.pages.length} page${book.pages.length===1?'':'s'}</div>
        </div>
        ${access ? '' : `<div class="book-lock"><div class="book-lock-icon">🔒</div><div class="book-lock-text">Sealed</div></div>`}`;
    }
    if (access) el.addEventListener('click', ()=>openReader(book));
    shelf.appendChild(el);
  });
}

// ════════════ READER ════════════
let _readerBook = null;
let _readerPage = 0;
let _privateMode = 'edit';
function openReader(book) {
  _readerBook = book; _readerPage = 0;
  _privateMode = 'edit';
  const reader = $('reader');
  reader.className = `reader ${(book.style==='holo'||book.style==='grimm')?'holo-reader':'paper'}${book.style==='grimm'?' grimm-reader':''}${book.style==='notebook'?' notebook-reader':''}`;
  // rip is per-page and re-applied by renderReaderPage; never inherit it
  $('readerTitle').textContent = book.name;
  renderReaderToc();
  renderReaderPage();
  $('readerOverlay').classList.add('open');
}
function renderReaderToc() {
  const book = _readerBook; if(!book) return;
  const toc = $('readerToc');
  if (!book.pages.length) { toc.innerHTML = '<div class="reader-toc-title">No entries</div>'; return; }
  toc.innerHTML = `<div class="reader-toc-title">Contents · ${book.pages.length}</div>` +
    book.pages.map((pg,i)=>`
      <button class="toc-item ${i===_readerPage?'active':''}" data-toc="${i}">
        <span class="toc-num">${i+1}</span>
        <span class="toc-name ${pg.title?'':'untitled'}">${pg.title?esc(pg.title):'Untitled'}</span>
      </button>`).join('');
  toc.querySelectorAll('[data-toc]').forEach(b=>{
    b.addEventListener('click',()=>{ _readerPage=Number(b.dataset.toc); renderReaderPage(); $('reader').classList.remove('toc-open'); });
  });
}
// ── BLOOD SPLATTER ──────────────────────────────────────────
// Seeded so a given page always splatters identically — blood that
// reshuffled on every page turn would read as decoration, not damage.
function bloodRand(seed){
  const x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}
function bloodLayer(intensity, pageIdx){
  const lvl = Math.max(1, Math.min(3, Number(intensity)||1));
  const seedBase = (pageIdx + 1) * 977;
  const drops = [];

  // main pools — larger, irregular, soaked in
  const pools = lvl * 2;
  for (let i = 0; i < pools; i++) {
    const s = seedBase + i * 31;
    const x = 6 + bloodRand(s) * 88;
    const y = 6 + bloodRand(s + 1) * 88;
    const r = 26 + bloodRand(s + 2) * 70;
    const o = .30 + bloodRand(s + 3) * .34;
    const sx = .55 + bloodRand(s + 4) * .95;
    const sy = .5 + bloodRand(s + 5) * 1.0;
    const rot = Math.floor(bloodRand(s + 6) * 360);
    drops.push(`<span class="bl-pool" style="left:${x}%;top:${y}%;width:${r}px;height:${r}px;opacity:${o.toFixed(2)};transform:translate(-50%,-50%) rotate(${rot}deg) scale(${sx.toFixed(2)},${sy.toFixed(2)})"></span>`);
  }
  // fine spatter — the cast-off
  const specks = lvl * 26;
  for (let i = 0; i < specks; i++) {
    const s = seedBase + 500 + i * 17;
    const x = bloodRand(s) * 100;
    const y = bloodRand(s + 1) * 100;
    const r = 1.2 + bloodRand(s + 2) * 4.5;
    const o = .22 + bloodRand(s + 3) * .5;
    const sx = .5 + bloodRand(s + 4) * 1.4;
    const rot = Math.floor(bloodRand(s + 5) * 360);
    drops.push(`<span class="bl-speck" style="left:${x}%;top:${y}%;width:${r.toFixed(1)}px;height:${r.toFixed(1)}px;opacity:${o.toFixed(2)};transform:translate(-50%,-50%) rotate(${rot}deg) scaleX(${sx.toFixed(2)})"></span>`);
  }
  // runs where it soaked down the page
  const runs = lvl;
  for (let i = 0; i < runs; i++) {
    const s = seedBase + 900 + i * 41;
    const x = 10 + bloodRand(s) * 80;
    const y = 8 + bloodRand(s + 1) * 50;
    const h = 30 + bloodRand(s + 2) * 90;
    const w = 2 + bloodRand(s + 3) * 4;
    const o = .2 + bloodRand(s + 4) * .3;
    drops.push(`<span class="bl-run" style="left:${x}%;top:${y}%;width:${w.toFixed(1)}px;height:${h.toFixed(0)}px;opacity:${o.toFixed(2)}"></span>`);
  }
  return `<div class="blood-layer lvl-${lvl}" aria-hidden="true">${drops.join('')}</div>`;
}

function renderReaderPage() {
  const book = _readerBook; if(!book) return;
  const body = $('readerBody');
  const isPrivate = !!book.private;

  if (!book.pages.length && !isPrivate) {
    body.innerHTML = `<div class="page-empty">These pages are blank…</div>`;
    $('pageDots').innerHTML=''; $('prevPage').disabled=true; $('nextPage').disabled=true;
    return;
  }

  if (isPrivate && _privateMode === 'edit') {
    const fullText = book.pages.map(p=>p.text).join('\n\n---\n\n');
    body.innerHTML = `
      <div class="notes-edit-head">
        <span class="notes-edit-title">✎ My Personal Notes</span>
        <span class="notes-edit-toolbar">
          <span class="notes-save-status" id="notesSaveStatus">Editable</span>
          <button class="notes-mode-btn" id="notesReadBtn">📖 Read as pages</button>
        </span>
      </div>
      <div class="notes-security-bar">Stored in your private player vault · Encrypted to your device ID · Nobody else can open this</div>
      <textarea id="privateNotesEditor" class="private-notes-editor" placeholder="Write anything here… your private notes, theories, secrets. Use a line with just --- to split into pages.">${esc(fullText)}</textarea>
      <div class="notes-edit-hint">Tip: type a line containing only <code>---</code> on its own to break your notes into separate pages, then hit <strong>Read as pages</strong> to flip through them.</div>`;
    const ta = $('privateNotesEditor');
    ta.addEventListener('input', () => schedulePrivateSave(ta.value));
    $('notesReadBtn').addEventListener('click', ()=>{
      flushPrivateSave(ta.value);
      _privateMode = 'read'; _readerPage = 0; renderReaderPage();
    });
    $('pageDots').innerHTML=''; $('prevPage').disabled=true; $('nextPage').disabled=true;
    $('readerToc').innerHTML = `<div class="reader-toc-title">Personal Notes</div><div class="toc-item active"><span class="toc-num">✎</span><span class="toc-name">Editing</span></div>`;
    return;
  }

  _readerPage = Math.max(0, Math.min(_readerPage, book.pages.length-1));
  const page = book.pages[_readerPage];

  // The RIP is applied to the sheet itself, so the page's silhouette is torn.
  // It's per-page, so it has to be re-applied on every page turn.
  const reader = document.querySelector('.reader');
  if (reader) {
    reader.classList.remove('rip-top','rip-bottom','rip-both');
    if (page.torn === 'top')    reader.classList.add('rip-top');
    if (page.torn === 'bottom') reader.classList.add('rip-bottom');
    if (page.torn === 'both')   reader.classList.add('rip-both');
  }

  const blood = Number(page.blood) || 0;   // 0 = none, 1-3 = intensity
  body.innerHTML = `
    ${isPrivate ? `<div class="notes-read-bar"><span class="notes-read-label">📖 My Personal Notes · page ${_readerPage+1} of ${book.pages.length}</span><button class="notes-mode-btn" id="notesEditBtn">✎ Edit</button></div>` : ''}
    ${page.torn === 'top' || page.torn === 'both' ? '<div class="rip-fray top"></div>' : ''}
    ${blood ? bloodLayer(blood, _readerPage) : ''}
    <div class="page-body-wrap">
      ${page.title ? `<div class="page-title">${esc(page.title)}</div>` : ''}
      ${page.image ? `<img src="${page.image}" class="page-img" onerror="this.style.display='none'">` : ''}
      <div class="page-text rt-content">${renderRichText(page.text||'')}</div>
    </div>
    ${page.torn === 'bottom' || page.torn === 'both' ? '<div class="rip-fray bottom"></div>' : ''}`;
  body.scrollTop = 0;
  if (isPrivate) $('notesEditBtn')?.addEventListener('click', ()=>{ _privateMode='edit'; renderReaderPage(); });
  $('pageDots').innerHTML = book.pages.map((_,i)=>
    `<button class="page-dot ${i===_readerPage?'active':''}" data-i="${i}"></button>`).join('');
  $('pageDots').querySelectorAll('.page-dot').forEach(d=>
    d.addEventListener('click',()=>{ _readerPage=Number(d.dataset.i); renderReaderPage(); }));
  $('prevPage').disabled = _readerPage===0;
  $('nextPage').disabled = _readerPage===book.pages.length-1;
  if (isPrivate) {
    $('readerToc').innerHTML = `<div class="reader-toc-title">Personal Notes</div>` + book.pages.map((p,i)=>
      `<button class="toc-item ${i===_readerPage?'active':''}" data-toc="${i}"><span class="toc-num">${i+1}</span><span class="toc-name">${esc(p.title||('Page '+(i+1)))}</span></button>`).join('');
    $('readerToc').querySelectorAll('[data-toc]').forEach(b=>
      b.addEventListener('click',()=>{ _readerPage=Number(b.dataset.toc); renderReaderPage(); $('reader').classList.remove('toc-open'); }));
  } else {
    $('readerToc').querySelectorAll('[data-toc]').forEach(b=>
      b.classList.toggle('active', Number(b.dataset.toc)===_readerPage));
  }
}

// Save private notes back to Firestore (debounced)
let _privateSaveTimer = null;
function schedulePrivateSave(text) {
  const st = $('notesSaveStatus');
  if (st) { st.textContent = '✎ Unsaved…'; st.style.color = '#e0a830'; }
  clearTimeout(_privateSaveTimer);
  _privateSaveTimer = setTimeout(() => savePrivateNotes(text), 1000);
}
function flushPrivateSave(text) {
  clearTimeout(_privateSaveTimer);
  const chunks = splitNotePages(text);
  if (_privateBook) _privateBook.pages = chunks.map((t,i)=>({ id:'pn-'+i, title: i===0?'Notes':`Notes (cont. ${i+1})`, text:t.trim(), image:'' }));
  savePrivateNotes(text);
}
async function savePrivateNotes(text) {
  if (!MY_PID) return;
  try {
    const charName = (_privateBook?.name || 'My Notes').replace(/ · Notes$/,'');
    await setDoc(doc(db, 'rwby-private', MY_PID), {
      owner: MY_PID,
      bookName: _privateBook?.name || 'My Notes',
      character: charName,
      text: text,
      updated: Date.now()
    });
    // rebuild local pages so the shelf reflects new splits
    const chunks = splitNotePages(text);
    if (_privateBook) _privateBook.pages = chunks.map((t,i)=>({ id:'pn-'+i, title: i===0?'Notes':`Notes (cont. ${i+1})`, text:t.trim(), image:'' }));
    const st = $('notesSaveStatus');
    if (st) { st.textContent = '✓ Saved'; st.style.color = '#5ed4a0'; }
    renderShelf();
  } catch(e) {
    console.error('savePrivateNotes', e);
    const st = $('notesSaveStatus');
    if (st) { st.textContent = '⚠ Save failed'; st.style.color = '#ff8088'; }
  }
}
